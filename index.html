<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<title>CinéTV</title>
<link rel="manifest" href="manifest.json">
<meta name="theme-color" content="#0D0F14">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="CinéTV">
<link rel="apple-touch-icon" href="icon-192.png">
<link rel="icon" href="icon-192.png">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;600;700&family=Inter:wght@300;400;500;600&display=swap" rel="stylesheet">
<script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
<script src="https://accounts.google.com/gsi/client" async defer></script>
<style>
:root {
  --bg:#0D0F14; --surface:#161A23; --surface2:#1E2330; --surface3:#252C3D;
  --gold:#E8C46A; --gold-dim:#A8893A; --red:#C0392B; --green:#27AE60;
  --blue:#2980B9; --text:#E8E8E8; --text-dim:#9A9FAD; --border:#2A3045;
  --radius:8px; --radius-lg:14px;
  --font-display:'Playfair Display',serif; --font-ui:'Inter',sans-serif;
}
*{margin:0;padding:0;box-sizing:border-box;}
body{background:var(--bg);color:var(--text);font-family:var(--font-ui);display:flex;height:100vh;overflow:hidden;}
#sidebar{width:220px;min-width:220px;background:var(--surface);border-right:1px solid var(--border);display:flex;flex-direction:column;z-index:100;}
.sidebar-logo{padding:24px 20px 20px;border-bottom:1px solid var(--border);}
.sidebar-logo h1{font-family:var(--font-display);font-size:22px;color:var(--gold);letter-spacing:1px;}
.sidebar-logo span{font-size:11px;color:var(--text-dim);letter-spacing:2px;text-transform:uppercase;}
.nav-section{padding:16px 12px 8px;}
.drive-sync-section{margin-top:auto;padding:14px 12px;border-top:1px solid var(--border);display:flex;flex-direction:column;gap:8px;}
.drive-sync-status{font-size:11px;color:var(--text-dim);text-align:center;line-height:1.4;}
.drive-sync-status.ok{color:var(--green);}
.drive-sync-status.error{color:var(--red);}
.drive-sync-status.busy{color:var(--gold);}
.nav-label{font-size:10px;text-transform:uppercase;letter-spacing:2px;color:var(--text-dim);padding:0 8px 8px;}
.nav-item{display:flex;align-items:center;gap:10px;padding:10px 12px;border-radius:var(--radius);cursor:pointer;font-size:14px;color:var(--text-dim);transition:all .18s;margin-bottom:2px;}
.nav-item:hover{background:var(--surface2);color:var(--text);}
.nav-item.active{background:var(--surface3);color:var(--gold);}
.nav-item .icon{font-size:16px;width:20px;text-align:center;}
.film-strip{height:3px;background:repeating-linear-gradient(90deg,var(--gold) 0px,var(--gold) 8px,transparent 8px,transparent 14px);opacity:.35;margin:8px 0;}
#main{flex:1;display:flex;flex-direction:column;overflow:hidden;}
.topbar{height:52px;background:var(--surface);border-bottom:1px solid var(--border);display:flex;align-items:center;padding:0 24px;gap:16px;flex-shrink:0;}
.topbar-title{font-family:var(--font-display);font-size:18px;color:var(--text);flex:1;}
.topbar-actions{display:flex;gap:10px;}
#content{flex:1;overflow-y:auto;padding:24px;}
.hamburger-btn{display:none;flex-direction:column;justify-content:center;gap:4px;width:32px;height:32px;background:none;border:none;cursor:pointer;padding:0;flex-shrink:0;}
.hamburger-btn span{display:block;width:20px;height:2px;background:var(--gold);border-radius:2px;}
#sidebar-overlay{display:none;position:fixed;inset:0;background:rgba(0,0,0,.6);z-index:99;}

/* ============================================================
   RESPONSIVE — tablet & mobile
   Sidebar becomes an off-canvas drawer toggled by the hamburger button.
   Below 640px, grids/forms collapse to single columns and paddings shrink
   so content stays readable on a phone screen without horizontal scroll.
   ============================================================ */
@media(max-width:880px){
  .hamburger-btn{display:flex;}
  #sidebar{
    position:fixed; top:0; left:0; bottom:0;
    transform:translateX(-100%);
    transition:transform .25s ease;
  }
  #sidebar.open{transform:translateX(0);}
  #sidebar-overlay.open{display:block;}
  .topbar{padding:0 14px;}
  #content{padding:16px;}
}
@media(max-width:640px){
  .dash-split{grid-template-columns:1fr;}
  .form-row{grid-template-columns:1fr;}
  .stats-grid{grid-template-columns:repeat(2,1fr)!important;}
  div[style*="grid-template-columns:1fr 1fr 1fr"]{grid-template-columns:1fr 1fr!important;}
  div[style*="grid-template-columns:1fr 1fr;"]{grid-template-columns:1fr!important;}
  div[style*="grid-template-columns:repeat(4,1fr)"]{grid-template-columns:1fr 1fr!important;}
  div[style*="grid-template-columns:repeat(3,1fr)"]{grid-template-columns:1fr 1fr!important;}
  #content{padding:12px;}
  .topbar{padding:0 10px;gap:10px;}
  .topbar-title{font-size:16px;}
  .topbar-actions{flex-wrap:wrap;gap:6px;justify-content:flex-end;}
  .topbar-actions .btn{padding:7px 11px;font-size:12px;}
  .card{padding:14px;}
  .modal{max-width:100%;margin:0;border-radius:0;max-height:100vh;height:100%;}
  .modal-overlay{padding:0;}
  .media-row-main{padding:10px;flex-wrap:wrap;}
  .media-poster-thumb{width:30px;height:44px;}
  .media-info{margin-left:8px;min-width:0;}
  .media-title{font-size:13px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;}
  .media-meta{font-size:11px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;}
  .media-actions{gap:5px;padding:8px 0 0;flex-wrap:wrap;width:100%;justify-content:flex-end;}
  .media-actions .btn{padding:6px 9px;font-size:12px;}
  .saga-film-row{flex-wrap:wrap;}
  .data-table{font-size:12px;}
  .data-table th,.data-table td{padding:7px 8px;}
}
.btn{padding:8px 16px;border-radius:var(--radius);border:none;cursor:pointer;font-family:var(--font-ui);font-size:13px;font-weight:500;transition:all .15s;}
.btn:disabled{opacity:.5;cursor:not-allowed;}
.btn-primary{background:var(--gold);color:#0D0F14;}
.btn-primary:hover{background:#f0d080;}
.btn-secondary{background:var(--surface3);color:var(--text);border:1px solid var(--border);}
.btn-secondary:hover{background:var(--surface2);}
.btn-danger{background:var(--red);color:white;}
.btn-danger:hover{opacity:.85;}
.btn-green{background:var(--green);color:white;}
.btn-green:hover{opacity:.85;}
.btn-sm{padding:5px 11px;font-size:12px;}
.btn-xs{padding:3px 8px;font-size:11px;}
.card{background:var(--surface);border:1px solid var(--border);border-radius:var(--radius-lg);padding:20px;}
.card-title{font-family:var(--font-display);font-size:16px;color:var(--gold);margin-bottom:14px;display:flex;align-items:center;gap:8px;}
.stat-card{background:var(--surface);border:1px solid var(--border);border-radius:var(--radius-lg);padding:18px 20px;}
.stat-val{font-family:var(--font-display);font-size:28px;color:var(--gold);font-weight:700;}
.stat-label{font-size:12px;color:var(--text-dim);margin-top:2px;}
.data-table{width:100%;border-collapse:collapse;font-size:13px;}
.data-table th{text-align:left;padding:10px 12px;font-size:11px;text-transform:uppercase;letter-spacing:1px;color:var(--text-dim);border-bottom:1px solid var(--border);background:var(--surface2);}
.data-table td{padding:10px 12px;border-bottom:1px solid var(--border);}
.data-table tr:last-child td{border-bottom:none;}
.data-table tr:hover td{background:var(--surface2);}
.data-table .rank{color:var(--gold);font-weight:600;}
.tabs{display:flex;gap:4px;margin-bottom:20px;background:var(--surface2);border-radius:var(--radius);padding:4px;}
.tab-btn{padding:8px 18px;border-radius:6px;border:none;cursor:pointer;font-family:var(--font-ui);font-size:13px;font-weight:500;background:transparent;color:var(--text-dim);transition:all .15s;}
.tab-btn.active{background:var(--surface);color:var(--gold);}
.modal-overlay{position:fixed;inset:0;background:rgba(0,0,0,.75);display:flex;align-items:center;justify-content:center;z-index:1000;padding:20px;}
.modal{background:var(--surface);border:1px solid var(--border);border-radius:var(--radius-lg);width:100%;max-width:620px;max-height:90vh;overflow-y:auto;}
.modal-header{padding:20px 24px 16px;border-bottom:1px solid var(--border);display:flex;align-items:center;justify-content:space-between;}
.modal-title{font-family:var(--font-display);font-size:18px;color:var(--gold);}
.modal-body{padding:20px 24px;}
.modal-footer{padding:16px 24px;border-top:1px solid var(--border);display:flex;gap:10px;justify-content:flex-end;}
.close-btn{background:none;border:none;color:var(--text-dim);font-size:20px;cursor:pointer;}
.form-group{margin-bottom:16px;}
.form-label{display:block;font-size:12px;font-weight:500;color:var(--text-dim);margin-bottom:6px;text-transform:uppercase;letter-spacing:.8px;}
.form-input,.form-select,.form-textarea{width:100%;padding:10px 12px;background:var(--surface2);border:1px solid var(--border);border-radius:var(--radius);color:var(--text);font-family:var(--font-ui);font-size:14px;transition:border-color .15s;}
.form-input:focus,.form-select:focus,.form-textarea:focus{outline:none;border-color:var(--gold);}
.form-input.invalid{border-color:var(--red);}
.form-select option{background:var(--surface2);}
.form-textarea{resize:vertical;min-height:80px;}
.form-row{display:grid;grid-template-columns:1fr 1fr;gap:16px;}
.tag-input-wrap{display:flex;flex-wrap:wrap;gap:6px;padding:8px;background:var(--surface2);border:1px solid var(--border);border-radius:var(--radius);min-height:42px;cursor:text;position:relative;}
.tag-input-wrap.invalid{border-color:var(--red);}
.tag{background:var(--surface3);border:1px solid var(--gold-dim);color:var(--gold);padding:3px 10px;border-radius:20px;font-size:12px;display:flex;align-items:center;gap:5px;}
.tag-remove{cursor:pointer;color:var(--text-dim);font-size:14px;}
.tag-input{background:none;border:none;outline:none;color:var(--text);font-size:13px;flex:1;min-width:80px;font-family:var(--font-ui);}
.autocomplete-list{position:absolute;top:100%;left:0;right:0;background:var(--surface);border:1px solid var(--gold-dim);border-radius:var(--radius);z-index:200;max-height:160px;overflow-y:auto;margin-top:2px;}
.autocomplete-item{padding:8px 12px;cursor:pointer;font-size:13px;}
.autocomplete-item:hover{background:var(--surface3);color:var(--gold);}
.progress-bar{height:6px;background:var(--surface3);border-radius:3px;overflow:hidden;}
.progress-fill{height:100%;border-radius:3px;transition:width .3s;}
.progress-fill.gold{background:var(--gold);}
.progress-fill.green{background:var(--green);}
.badge{padding:2px 8px;border-radius:20px;font-size:11px;font-weight:500;display:inline-block;}
.badge-green{background:rgba(39,174,96,.2);color:#27AE60;border:1px solid rgba(39,174,96,.3);}
.badge-gold{background:rgba(232,196,106,.15);color:var(--gold);border:1px solid rgba(232,196,106,.25);}
.badge-red{background:rgba(192,57,43,.2);color:#E74C3C;border:1px solid rgba(192,57,43,.3);}
.badge-blue{background:rgba(41,128,185,.2);color:#5DADE2;border:1px solid rgba(41,128,185,.3);}
.badge-gray{background:rgba(150,150,150,.15);color:var(--text-dim);border:1px solid var(--border);}
.media-list{display:flex;flex-direction:column;gap:2px;}
.media-row{display:grid;align-items:center;background:var(--surface);border:1px solid var(--border);border-radius:var(--radius);padding:0;overflow:hidden;transition:border-color .15s;}
.media-row:hover{border-color:var(--gold-dim);}
.media-row-main{display:flex;align-items:center;gap:0;padding:10px 14px;cursor:pointer;}
.media-poster-thumb{width:36px;height:52px;border-radius:4px;object-fit:cover;background:var(--surface3);flex-shrink:0;display:flex;align-items:center;justify-content:center;color:var(--text-dim);font-size:18px;overflow:hidden;}
.media-poster-thumb img{width:100%;height:100%;object-fit:cover;border-radius:4px;}
.media-info{flex:1;margin-left:12px;}
.media-title{font-weight:600;font-size:14px;}
.media-meta{font-size:12px;color:var(--text-dim);margin-top:2px;}
.media-actions{display:flex;gap:6px;padding:0 10px;flex-shrink:0;}
.media-extra{padding:12px 14px 14px;border-top:1px solid var(--border);background:var(--surface2);}
.season-item{margin-bottom:8px;}
.season-header{display:flex;align-items:center;justify-content:space-between;padding:8px 12px;background:var(--surface3);border-radius:6px;cursor:pointer;}
.season-header:hover{background:var(--border);}
.ep-grid{display:flex;flex-wrap:wrap;gap:5px;padding:10px 0 4px 12px;}
.ep-btn{width:32px;height:32px;border-radius:6px;border:none;cursor:pointer;font-size:12px;font-weight:600;transition:all .15s;}
.ep-seen{background:var(--gold);color:#0D0F14;}
.ep-unseen{background:var(--surface3);color:var(--text-dim);border:1px solid var(--border);}
.ep-unseen:hover{border-color:var(--gold);color:var(--gold);}
.ep-row{display:flex;align-items:center;gap:10px;padding:7px 10px;border-radius:6px;cursor:pointer;transition:background .12s;font-size:13px;border:1px solid transparent;margin-bottom:3px;}
.ep-row-seen{background:rgba(232,196,106,.08);border-color:rgba(232,196,106,.15);}
.ep-row-unseen{background:var(--surface3);}
.ep-row:hover{border-color:var(--gold-dim);}
.ep-seen-dot{width:10px;height:10px;border-radius:50%;background:var(--gold);flex-shrink:0;}
.ep-unseen-dot{width:10px;height:10px;border-radius:50%;background:var(--surface);border:2px solid var(--border);flex-shrink:0;}
.ep-row-label{flex:1;}
.ep-row-date{font-size:11px;color:var(--text-dim);flex-shrink:0;}
::-webkit-scrollbar{width:6px;}
::-webkit-scrollbar-track{background:var(--surface);}
::-webkit-scrollbar-thumb{background:var(--surface3);border-radius:3px;}
.search-wrap{position:relative;}
.search-icon{position:absolute;left:10px;top:50%;transform:translateY(-50%);color:var(--text-dim);font-size:14px;pointer-events:none;}
.search-clear{position:absolute;right:10px;top:50%;transform:translateY(-50%);color:var(--text-dim);font-size:14px;cursor:pointer;display:none;padding:2px 4px;}
.search-clear:hover{color:var(--text);}
.search-wrap input{padding-right:30px;}
.drop-zone{border:2px dashed var(--border);border-radius:var(--radius-lg);padding:40px;text-align:center;cursor:pointer;transition:border-color .2s;}
.drop-zone:hover{border-color:var(--gold);}
.continue-card{background:var(--surface2);border:1px solid var(--border);border-radius:var(--radius);padding:14px 16px;display:flex;align-items:center;gap:14px;}
.continue-info{flex:1;}
.continue-title{font-weight:600;font-size:14px;}
.continue-ep{font-size:12px;color:var(--gold);margin-top:3px;}
.poster-upload-btn{cursor:pointer;}
.dash-split{display:grid;grid-template-columns:1fr 1fr;gap:20px;}
@media(max-width:1100px){.dash-split{grid-template-columns:1fr;}}
.dash-side{display:flex;flex-direction:column;gap:16px;}
.expand-icon{cursor:pointer;user-select:none;color:var(--gold);}
.show-more-btn{text-align:center;padding:8px;font-size:12px;color:var(--gold);cursor:pointer;border-top:1px solid var(--border);}
.show-more-btn:hover{background:var(--surface2);}
.saga-header-row{display:flex;align-items:center;justify-content:space-between;padding:12px 16px;cursor:pointer;background:var(--surface);border:none;border-radius:var(--radius-lg);}
.saga-header-row:hover{background:var(--surface2);}
.saga-film-row{display:flex;align-items:center;gap:12px;padding:10px;background:var(--surface2);border-radius:var(--radius);border:1px solid var(--border);}
.saga-film-poster{width:40px;height:58px;border-radius:4px;background:var(--surface3);display:flex;align-items:center;justify-content:center;font-size:18px;color:var(--text-dim);flex-shrink:0;overflow:hidden;}
.saga-film-poster img{width:100%;height:100%;object-fit:cover;border-radius:4px;}
.saga-film-info{flex:1;}
.saga-film-title{font-weight:600;font-size:14px;}
.saga-film-meta{font-size:12px;color:var(--text-dim);margin-top:2px;}
.saga-pick-row{display:flex;align-items:center;gap:10px;padding:8px 10px;border-radius:var(--radius);cursor:pointer;border:1px solid var(--border);transition:all .12s;}
.saga-pick-row:hover{border-color:var(--gold-dim);}
.saga-pick-check{font-size:16px;color:var(--gold);flex-shrink:0;width:20px;text-align:center;}
.tmdb-search-wrap{background:var(--surface2);border:1px solid var(--gold-dim);border-radius:var(--radius-lg);padding:14px;margin-bottom:18px;}
.tmdb-result-row{display:flex;align-items:center;gap:10px;padding:8px 10px;border-radius:var(--radius);background:var(--surface);border:1px solid var(--border);margin-bottom:5px;}
.tmdb-result-row:hover{border-color:var(--gold-dim);}
.tmdb-progress{font-size:12px;color:var(--gold);padding:8px;text-align:center;}
.genre-chip{background:rgba(232,196,106,.12);border:1px solid var(--gold-dim);color:var(--gold);padding:2px 9px;border-radius:14px;font-size:11px;display:inline-block;}
</style>
</head>
<body>
<nav id="sidebar">
  <div class="sidebar-logo"><h1>CinéTV</h1><span>Votre cinémathèque</span></div>
  <div class="film-strip"></div>
  <div class="nav-section">
    <div class="nav-label">Navigation</div>
    <div class="nav-item active" data-page="dashboard"><span class="icon">📊</span>Dashboard</div>
    <div class="nav-item" data-page="films"><span class="icon">🎬</span>Films</div>
    <div class="nav-item" data-page="sagas"><span class="icon">🎞️</span>Sagas</div>
    <div class="nav-item" data-page="series"><span class="icon">📺</span>Séries</div>
    <div class="nav-item" data-page="abandoned"><span class="icon">🗄️</span>Abandonnées</div>
    <div class="nav-item" data-page="watchlist"><span class="icon">🔖</span>Watchlist</div>
    <div class="nav-item" data-page="wrapped"><span class="icon">🎁</span>Bilan annuel</div>
    <div class="nav-item" data-page="import"><span class="icon">📥</span>Importation</div>
  </div>
  <div id="drive-sync-section" class="drive-sync-section">
    <div id="drive-sync-status" class="drive-sync-status">Non connecté</div>
    <button class="btn btn-secondary btn-sm" id="drive-sync-btn" onclick="handleDriveSyncClick()" style="width:100%">🔄 Synchroniser</button>
  </div>
</nav>
<div id="sidebar-overlay" onclick="closeSidebar()"></div>
<div id="main">
  <div class="topbar">
    <button id="hamburger-btn" class="hamburger-btn" onclick="toggleSidebar()" aria-label="Menu">
      <span></span><span></span><span></span>
    </button>
    <div class="topbar-title" id="topbar-title">Dashboard</div>
    <div class="topbar-actions" id="topbar-actions"></div>
  </div>
  <div id="content"></div>
</div>
<div id="modal-container"></div>

<script>
// ============================================================
// STATE & PERSISTENCE
// ============================================================
let DB = { films:[], series:[], watchlist:[], sagas:[], watchLog:[], wrappeds:[] };

function loadDB() {
  try {
    const s = localStorage.getItem('cinetv_db');
    if (s) DB = JSON.parse(s);
    if (!DB.films) DB.films = [];
    if (!DB.series) DB.series = [];
    if (!DB.watchlist) DB.watchlist = [];
    if (!DB.sagas) DB.sagas = [];
    if (!DB.watchLog) DB.watchLog = []; // entries: {type:'film'|'episode', date: ISO timestamp, filmId?, serieId?, seasonIndex?, episodeIndex?}
    if (!DB.wrappeds) DB.wrappeds = []; // saved annual recaps: {year, generatedAt, data:{...}}
    // Data saved before sync was introduced has no _lastModified — without
    // this, it would read as timestamp 0, making ANY remote file look
    // newer by comparison. This was the root cause of a real data-loss bug.
    if (!DB._lastModified) DB._lastModified = Date.now();
  } catch(e) {}
}
function saveDB() {
  DB._lastModified = Date.now();
  try { localStorage.setItem('cinetv_db', JSON.stringify(DB)); }
  catch(e) { alert('Erreur de sauvegarde : stockage plein ? Essayez de supprimer des posters lourds.'); }
}
loadDB();

let _id = Date.now();
function uid() { return 'id_' + (++_id); }

let _lastInteractedSerieId = null;

// ============================================================
// WATCH LOG — records the date a film/episode was marked as seen,
// used to build the end-of-year "Bilan annuel". Bulk actions (mass
// import, "tout vu"/"tout non vu") deliberately do NOT log anything,
// since they're historical catch-up, not a real viewing event "today".
// ============================================================
function logWatch(entry) {
  DB.watchLog.push({ date: new Date().toISOString(), ...entry });
}
function unlogWatch(matchFn) {
  // Used when un-marking something (e.g. toggling an episode back to unseen)
  // Remove the most recent matching entry only.
  for(let i=DB.watchLog.length-1;i>=0;i--){
    if(matchFn(DB.watchLog[i])) { DB.watchLog.splice(i,1); return; }
  }
}

// ============================================================
// UTILITIES
// ============================================================
function fmtDuration(totalMin) {
  totalMin = Math.floor(totalMin);
  const months = Math.floor(totalMin/(60*24*30));
  const days = Math.floor((totalMin%(60*24*30))/(60*24));
  const hours = Math.floor((totalMin%(60*24))/60);
  const mins = totalMin%60;
  let p=[];
  if(months) p.push(months+' mois');
  if(days) p.push(days+' j');
  if(hours) p.push(hours+'h');
  p.push(mins+'min');
  return p.join(' ');
}
function fmtH(totalMin) {
  const h=Math.floor(totalMin/60), m=totalMin%60;
  return h ? (m ? `${h}h${String(m).padStart(2,'0')}` : `${h}h`) : `${m} min`;
}
function parseNames(v) {
  if(Array.isArray(v)) return v.filter(Boolean);
  if(!v) return [];
  return String(v).split(',').map(s=>s.trim()).filter(Boolean);
}
function joinNames(arr) { return (arr||[]).join(', '); }
function esc(s) { return String(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;'); }

function serieSeenEps(s) {
  let t=0; (s.seasons||[]).forEach(sn=>(sn.episodes||[]).forEach(ep=>{if(ep.seen)t++;})); return t;
}
function serieTotalEps(s) {
  let t=0; (s.seasons||[]).forEach(sn=>{t+=(sn.episodes||[]).length;}); return t;
}
function serieSeenMin(s) { return serieSeenEps(s)*(s.episodeDuration||0); }
function serieTotalMin(s) { return serieTotalEps(s)*(s.episodeDuration||0); }

function knownPlatforms() {
  const set = new Set();
  DB.series.forEach(s => parseNames(s.platforms).forEach(p=>set.add(p)));
  DB.watchlist.filter(w=>w.type==='serie').forEach(w=>parseNames(w.platforms).forEach(p=>set.add(p)));
  return [...set].sort();
}

function seasonLabel(season, si) {
  return season.name ? `S${si+1} : ${season.name}` : `Saison ${si+1}`;
}

function decadeOf(year) {
  const y = parseInt(year);
  if(!y) return null;
  return Math.floor(y/10)*10;
}

const TMDB_KEY = '19c1d3df7bca218514137ed467e41fbd';
const TMDB_BASE = 'https://api.themoviedb.org/3';

async function tmdbFetch(path, params) {
  const url = new URL(TMDB_BASE + path);
  url.searchParams.set('api_key', TMDB_KEY);
  url.searchParams.set('language', 'fr-FR');
  if(params) Object.entries(params).forEach(([k,v])=>url.searchParams.set(k,v));
  const res = await fetch(url.toString());
  if(!res.ok) throw new Error('TMDB error '+res.status);
  return res.json();
}

// TMDB returns ISO 3166-1 country codes (e.g. "US", "GB", "FR"). This maps
// them to the short labels used throughout CinéTV — most notably "UK" instead
// of TMDB's "GB" for the United Kingdom, and "US" for the United States,
// to avoid ending up with two different labels for the same country.
const COUNTRY_CODE_MAP = {
  US: 'US', GB: 'UK', FR: 'France', DE: 'Allemagne', ES: 'Espagne', IT: 'Italie',
  JP: 'Japon', KR: 'Corée du Sud', CN: 'Chine', CA: 'Canada', BE: 'Belgique',
  NL: 'Pays-Bas', SE: 'Suède', NO: 'Norvège', DK: 'Danemark', FI: 'Finlande',
  IE: 'Irlande', CH: 'Suisse', AT: 'Autriche', PT: 'Portugal', PL: 'Pologne',
  RU: 'Russie', IN: 'Inde', AU: 'Australie', NZ: 'Nouvelle-Zélande',
  MX: 'Mexique', BR: 'Brésil', AR: 'Argentine', ZA: 'Afrique du Sud',
  HK: 'Hong Kong', TW: 'Taïwan', TH: 'Thaïlande', TR: 'Turquie', GR: 'Grèce',
  IL: 'Israël', EG: 'Égypte', IS: 'Islande'
};
function normalizeCountryCode(code) {
  if(!code) return '';
  const c = String(code).trim().toUpperCase();
  return COUNTRY_CODE_MAP[c] || c;
}
function normalizeCountryList(codes) {
  return (codes||[]).map(normalizeCountryCode).filter(Boolean);
}

async function tmdbSearchMovies(query) {
  const data = await tmdbFetch('/search/movie', {query, include_adult:'false'});
  return (data.results||[]).slice(0,8);
}
async function tmdbSearchSeries(query) {
  const data = await tmdbFetch('/search/tv', {query, include_adult:'false'});
  return (data.results||[]).slice(0,8);
}
async function tmdbMovieDetails(id) {
  const data = await tmdbFetch(`/movie/${id}`, {append_to_response:'credits'});
  const directors = (data.credits?.crew||[]).filter(c=>c.job==='Director').map(c=>c.name);
  const countries = normalizeCountryList((data.production_countries||[]).map(c=>c.iso_3166_1));
  const genres = (data.genres||[]).map(g=>g.name);
  return {
    title: data.title || data.original_title || '',
    year: data.release_date ? data.release_date.slice(0,4) : '',
    directors,
    countries,
    duration: data.runtime || 0,
    genres
  };
}
async function tmdbSeriesDetails(id) {
  const data = await tmdbFetch(`/tv/${id}`);
  const creators = (data.created_by||[]).map(c=>c.name);
  const rawCountries = (data.origin_country||[]).length ? data.origin_country : (data.production_countries||[]).map(c=>c.iso_3166_1);
  const countries = normalizeCountryList(rawCountries);
  const platforms = (data.networks||[]).map(n=>n.name);
  const firstYear = data.first_air_date ? data.first_air_date.slice(0,4) : '';
  const lastYear = data.last_air_date ? data.last_air_date.slice(0,4) : '';
  const isOngoing = data.status === 'Returning Series' || data.in_production;
  let years = firstYear;
  if(isOngoing) years = firstYear ? `${firstYear}-...` : '';
  else if(lastYear && lastYear!==firstYear) years = `${firstYear}-${lastYear}`;
  let status = 'terminee';
  if(isOngoing) status = 'encours';
  else if(data.status === 'Canceled') status = 'annulee';
  const seasonNumbers = (data.seasons||[]).filter(s=>s.season_number>0).map(s=>s.season_number);
  const genres = (data.genres||[]).map(g=>g.name);
  return {
    title: data.name || '',
    creators, countries, platforms, years, status,
    episodeDuration: (data.episode_run_time && data.episode_run_time[0]) || 0,
    tmdbId: id,
    seasonNumbers,
    genres
  };
}
async function tmdbSeasonDetails(tvId, seasonNumber) {
  const data = await tmdbFetch(`/tv/${tvId}/season/${seasonNumber}`);
  return {
    name: (data.name && !/^Saison\s+\d+$|^Season\s+\d+$/i.test(data.name.trim())) ? data.name : '',
    episodes: (data.episodes||[]).map(ep=>({
      title: ep.name || '',
      airdate: ep.air_date || '' // already YYYY-MM-DD, matches internal storage
    }))
  };
}

// Fetch every season's episodes for a series, sequentially, with progress callback.
async function tmdbFetchAllSeasons(tvId, seasonNumbers, onProgress) {
  const seasons = [];
  for(let i=0;i<seasonNumbers.length;i++){
    if(onProgress) onProgress(i+1, seasonNumbers.length);
    const sd = await tmdbSeasonDetails(tvId, seasonNumbers[i]);
    seasons.push({
      name: sd.name,
      episodes: sd.episodes.map(ep=>({seen:false, title:ep.title, airdate:ep.airdate}))
    });
  }
  return seasons;
}

// Lightweight genre-only fetch, used for retroactively backfilling genres
// on films/series that were added before this feature (or via Excel import).
async function tmdbFetchMovieGenres(title, year) {
  const results = await tmdbSearchMovies(title);
  if(!results.length) return null;
  // Prefer a result matching the year if we have one
  let best = results[0];
  if(year) {
    const match = results.find(r=>r.release_date && r.release_date.slice(0,4)===String(year));
    if(match) best = match;
  }
  const details = await tmdbFetch(`/movie/${best.id}`);
  return (details.genres||[]).map(g=>g.name);
}
async function tmdbFetchSerieGenres(title, years) {
  const results = await tmdbSearchSeries(title);
  if(!results.length) return null;
  let best = results[0];
  const firstYear = String(years||'').match(/\d{4}/);
  if(firstYear) {
    const match = results.find(r=>r.first_air_date && r.first_air_date.slice(0,4)===firstYear[0]);
    if(match) best = match;
  }
  const details = await tmdbFetch(`/tv/${best.id}`);
  return (details.genres||[]).map(g=>g.name);
}

function knownGenres() {
  const set = new Set();
  DB.films.forEach(f=>parseNames(f.genres).forEach(g=>set.add(g)));
  DB.series.forEach(s=>parseNames(s.genres).forEach(g=>set.add(g)));
  return [...set].sort();
}

// results list inside `containerId`. Calls onPick(result) when the user
// picks a result (result = raw TMDB object with .id, .title/.name, etc).
function renderTmdbSearchBox(containerId, type, onPick) {
  const container = document.getElementById(containerId);
  if(!container) return;
  container.innerHTML = `
    <div class="tmdb-search-wrap">
      <div class="search-wrap">
        <span class="search-icon">🔎</span>
        <input class="form-input" id="${containerId}-input" placeholder="Rechercher sur TMDB..." style="padding-left:34px">
        <span class="search-clear" id="${containerId}-clear">✕</span>
      </div>
      <div id="${containerId}-results" style="margin-top:8px"></div>
    </div>`;
  const input = document.getElementById(containerId+'-input');
  const clearBtn = document.getElementById(containerId+'-clear');
  const resultsEl = document.getElementById(containerId+'-results');
  let debounceTimer = null;

  async function doSearch(q) {
    if(!q.trim()){ resultsEl.innerHTML=''; return; }
    resultsEl.innerHTML = `<div style="font-size:12px;color:var(--text-dim);padding:8px">Recherche en cours...</div>`;
    try {
      const results = type==='movie' ? await tmdbSearchMovies(q) : await tmdbSearchSeries(q);
      if(!results.length){ resultsEl.innerHTML = `<div style="font-size:12px;color:var(--text-dim);padding:8px">Aucun résultat.</div>`; return; }
      resultsEl.innerHTML = results.map(r=>{
        const title = type==='movie' ? (r.title||r.original_title) : (r.name||r.original_name);
        const date = type==='movie' ? r.release_date : r.first_air_date;
        const year = date ? date.slice(0,4) : '?';
        return `<div class="tmdb-result-row" data-id="${r.id}">
          <div style="flex:1"><b style="font-size:13px">${esc(title)}</b> <span style="color:var(--text-dim);font-size:12px">(${year})</span></div>
          <button type="button" class="btn btn-secondary btn-xs">Choisir</button>
        </div>`;
      }).join('');
      resultsEl.querySelectorAll('.tmdb-result-row').forEach(row=>{
        row.querySelector('button').addEventListener('click', ()=>{
          const id = row.dataset.id;
          const picked = results.find(r=>String(r.id)===String(id));
          onPick(picked);
        });
      });
    } catch(e) {
      resultsEl.innerHTML = `<div style="font-size:12px;color:var(--red);padding:8px">Erreur de connexion à TMDB. Vérifiez votre connexion internet.</div>`;
    }
  }

  input.addEventListener('input', e=>{
    clearBtn.style.display = e.target.value ? 'block' : 'none';
    clearTimeout(debounceTimer);
    debounceTimer = setTimeout(()=>doSearch(e.target.value), 450);
  });
  clearBtn.addEventListener('click', ()=>{
    input.value=''; clearBtn.style.display='none'; resultsEl.innerHTML='';
  });
}

// All watchLog entries that fall within a given calendar year.
function watchLogForYear(year) {
  return DB.watchLog.filter(e => new Date(e.date).getFullYear() === year);
}

// Resolve a watchLog episode entry back to its title/duration/serie, safely
// (the underlying serie/episode might have been edited or deleted since).
function resolveEpisodeEntry(e) {
  const s = DB.series.find(x=>x.id===e.serieId);
  if(!s) return null;
  const season = s.seasons && s.seasons[e.seasonIndex];
  const ep = season && season.episodes && season.episodes[e.episodeIndex];
  if(!ep) return null;
  return { serie:s, season, ep, duration: s.episodeDuration||0 };
}
function resolveFilmEntry(e) {
  const f = DB.films.find(x=>x.id===e.filmId);
  return f || null;
}

const MONTH_NAMES_FR = ['janvier','février','mars','avril','mai','juin','juillet','août','septembre','octobre','novembre','décembre'];

function buildWrappedData(year) {
  const log = watchLogForYear(year);
  const filmEntries = log.filter(e=>e.type==='film').map(e=>({...e, film:resolveFilmEntry(e)})).filter(e=>e.film);
  const epEntries = log.filter(e=>e.type==='episode').map(e=>({...e, r:resolveEpisodeEntry(e)})).filter(e=>e.r);

  // Guard: nothing logged this year at all
  if(filmEntries.length===0 && epEntries.length===0) return null;

  const prevYearHasData = watchLogForYear(year-1).length > 0;

  // ---- 2) Consommation brute (films) ----
  const uniqueFilmIds = [...new Set(filmEntries.map(e=>e.filmId))];
  const filmsWatched = uniqueFilmIds.map(id=>DB.films.find(f=>f.id===id)).filter(Boolean);
  const filmCount = filmsWatched.length;
  const filmTotalMin = filmsWatched.reduce((a,f)=>a+(parseInt(f.duration)||0),0);
  const shortestFilm = filmsWatched.length ? filmsWatched.reduce((a,b)=>(parseInt(a.duration)||0)<=(parseInt(b.duration)||1e9)?a:b) : null;
  const longestFilm = filmsWatched.length ? filmsWatched.reduce((a,b)=>(parseInt(a.duration)||0)>=(parseInt(b.duration)||0)?a:b) : null;

  // ---- Episodes / series consumption this year ----
  // Group episode entries by serie
  const epBySerie = {};
  epEntries.forEach(e=>{
    if(!epBySerie[e.serieId]) epBySerie[e.serieId]=[];
    epBySerie[e.serieId].push(e);
  });
  const seriesWatchedIds = Object.keys(epBySerie);
  const seriesWatched = seriesWatchedIds.map(id=>DB.series.find(s=>s.id===id)).filter(Boolean);
  const totalEpisodesThisYear = epEntries.length;
  const totalEpisodeMin = epEntries.reduce((a,e)=>a + (e.r.duration||0), 0);
  // distinct seasons touched this year (season index per serie, deduped)
  const seasonsTouched = new Set();
  epEntries.forEach(e=>seasonsTouched.add(e.serieId+':'+e.seasonIndex));
  const seriesCount = seriesWatched.length;

  // Most-consumed series this year (by minutes watched this year, tie-break episodes)
  let mostWatchedSerie = null, mostWatchedSerieMin = -1, mostWatchedSerieEps = 0;
  seriesWatchedIds.forEach(id=>{
    const entries = epBySerie[id];
    const mins = entries.reduce((a,e)=>a+(e.r.duration||0),0);
    if(mins > mostWatchedSerieMin){ mostWatchedSerieMin = mins; mostWatchedSerie = DB.series.find(s=>s.id===id); mostWatchedSerieEps = entries.length; }
  });

  // ---- 3) Temps de visionnage ----
  const totalMin = filmTotalMin + totalEpisodeMin;
  const filmPct = totalMin ? Math.round(filmTotalMin/totalMin*100) : 0;
  const seriesPct = totalMin ? 100-filmPct : 0;

  // Monthly breakdown (by minutes), using watch action date
  const byMonth = Array(12).fill(0);
  filmEntries.forEach(e=>{ byMonth[new Date(e.date).getMonth()] += (parseInt(e.film.duration)||0); });
  epEntries.forEach(e=>{ byMonth[new Date(e.date).getMonth()] += (e.r.duration||0); });
  let maxMonth=0, minMonth=0;
  byMonth.forEach((v,i)=>{ if(v>byMonth[maxMonth]) maxMonth=i; });
  // min month: only consider months with at least some activity, else omit
  const activeMonths = byMonth.map((v,i)=>({i,v})).filter(m=>m.v>0);
  minMonth = activeMonths.length ? activeMonths.reduce((a,b)=>b.v<a.v?b:a).i : null;
  const peakMonthShare = totalMin ? Math.round(byMonth[maxMonth]/totalMin*100) : 0;

  // ---- 4) Genres ----
  const genreCount = {};
  filmsWatched.forEach(f=>parseNames(f.genres).forEach(g=>{ genreCount[g]=(genreCount[g]||0)+1; }));
  seriesWatched.forEach(s=>parseNames(s.genres).forEach(g=>{ genreCount[g]=(genreCount[g]||0)+1; }));
  const genresSorted = Object.entries(genreCount).sort((a,b)=>b[1]-a[1]);
  const top5Genres = genresSorted.slice(0,5);
  const dominantGenre = genresSorted.length ? genresSorted[0][0] : null;

  // ---- 5) Géographie ----
  const countryCount = {};
  filmsWatched.forEach(f=>parseNames(f.countries).forEach(c=>{ countryCount[c]=(countryCount[c]||0)+1; }));
  seriesWatched.forEach(s=>parseNames(s.countries).forEach(c=>{ countryCount[c]=(countryCount[c]||0)+1; }));
  const countriesSorted = Object.entries(countryCount).sort((a,b)=>b[1]-a[1]);
  const top5Countries = countriesSorted.slice(0,5);
  const totalCountryWorks = Object.values(countryCount).reduce((a,b)=>a+b,0);
  const dominantCountryPct = top5Countries.length && totalCountryWorks ? Math.round(top5Countries[0][1]/totalCountryWorks*100) : 0;
  // newly discovered countries: appear this year, never appeared in prior years' watchLog
  const priorLog = DB.watchLog.filter(e=>new Date(e.date).getFullYear() < year);
  const priorCountries = new Set();
  priorLog.forEach(e=>{
    if(e.type==='film'){ const f=resolveFilmEntry(e); if(f) parseNames(f.countries).forEach(c=>priorCountries.add(c)); }
    else { const r=resolveEpisodeEntry(e); if(r) parseNames(r.serie.countries).forEach(c=>priorCountries.add(c)); }
  });
  const newCountries = Object.keys(countryCount).filter(c=>!priorCountries.has(c));

  // ---- 6) Réalisateurs (films only — directors aren't tracked for series creators in stats the same way) ----
  const dirCount = {};
  filmsWatched.forEach(f=>parseNames(f.directors).forEach(d=>{ dirCount[d]=(dirCount[d]||0)+1; }));
  const dirsSorted = Object.entries(dirCount).sort((a,b)=>b[1]-a[1]);
  const top5Directors = dirsSorted.slice(0,5);
  const uniqueDirectorsCount = dirsSorted.length;
  const topDirCountValue = dirsSorted.length ? dirsSorted[0][1] : 0;
  const topDirectors = dirsSorted.filter(([,n])=>n===topDirCountValue).map(([d])=>d);
  const top3DirSum = dirsSorted.slice(0,3).reduce((a,[,n])=>a+n,0);
  const top3DirConcentration = filmCount ? Math.round(top3DirSum/filmCount*100) : 0;

  // ---- 7) Séries focus ----
  // Started this year: first episode (S1E1 specifically, or just earliest episode logged) watched this year AND
  // no prior-year log entries for that serie.
  const seriesStarted = seriesWatchedIds.filter(id=>{
    const priorHasThis = priorLog.some(e=>e.type==='episode' && e.serieId===id);
    return !priorHasThis;
  }).map(id=>DB.series.find(s=>s.id===id)).filter(Boolean);
  // Completed this year: serie reached 100% and its last episode's watch-log entry falls in this year
  const seriesCompleted = seriesWatchedIds.map(id=>DB.series.find(s=>s.id===id)).filter(s=>{
    if(!s) return false;
    const total = serieTotalEps(s), seen = serieSeenEps(s);
    if(total===0 || seen<total) return false;
    // find the last logged episode for this serie this year
    const entries = epBySerie[s.id];
    return entries && entries.length>0; // approximation: completed AND had activity this year
  });
  // Abandoned this year: series marked abandoned, with at least one episode logged this year (best-effort,
  // since we don't timestamp the abandon action itself)
  const seriesAbandonedCount = DB.series.filter(s=>s.abandoned && epBySerie[s.id]).length;
  const avgSeriesLength = seriesWatched.length ? Math.round(seriesWatched.reduce((a,s)=>a+serieTotalEps(s),0)/seriesWatched.length) : 0;

  // ---- 8) Sagas ----
  const sagaActivity = {}; // sagaId -> {filmsWatchedThisYear:[], total, label}
  (DB.sagas||[]).forEach(sg=>{
    const watchedIdsThisYear = uniqueFilmIds.filter(fid=>(sg.films||[]).some(sf=>sf.id===fid));
    if(watchedIdsThisYear.length){
      sagaActivity[sg.id] = { saga:sg, watchedThisYear:watchedIdsThisYear.length, total:sagaFilmCount(sg) };
    }
  });
  const sagasTouched = Object.values(sagaActivity);
  const sagasCompletedThisYear = sagasTouched.filter(x=>x.watchedThisYear>0 && x.total>0 &&
    x.saga.films.every(sf=>DB.films.find(f=>f.id===sf.id))); // fully seen now
  const sagasStartedNotCompleted = sagasTouched.filter(x=>!sagasCompletedThisYear.includes(x));
  const biggestSaga = sagasTouched.length ? sagasTouched.reduce((a,b)=>b.total>a.total?b:a).saga : null;
  // "most consumed in time": sum film durations watched this year per saga
  let mostTimeSaga = null, mostTimeSagaMin = -1;
  sagasTouched.forEach(x=>{
    const mins = x.saga.films.filter(sf=>uniqueFilmIds.includes(sf.id)).reduce((a,sf)=>a+(parseInt(sf.duration)||0),0);
    if(mins>mostTimeSagaMin){ mostTimeSagaMin=mins; mostTimeSaga=x.saga; }
  });
  const filmsInSagaIds = new Set();
  (DB.sagas||[]).forEach(sg=>(sg.films||[]).forEach(sf=>filmsInSagaIds.add(sf.id)));
  const isolatedFilmsCount = filmsWatched.filter(f=>!filmsInSagaIds.has(f.id)).length;
  const sagaFilmsCount = filmCount - isolatedFilmsCount;

  // ---- 9) Diversité / concentration ----
  const genresUniqueCount = genresSorted.length;
  const countriesUniqueCount = countriesSorted.length;
  // top10% concentration on combined works (films+series watched)
  const allWorksCount = filmCount + seriesCount;

  // ---- 12) Comparaison N vs N-1 ----
  let comparison = null;
  if(prevYearHasData) {
    const prevData = buildWrappedDataLight(year-1);
    comparison = {
      filmCountDelta: filmCount - prevData.filmCount,
      filmCountPct: prevData.filmCount ? Math.round((filmCount-prevData.filmCount)/prevData.filmCount*100) : null,
      seriesCountDelta: seriesCount - prevData.seriesCount,
      seriesCountPct: prevData.seriesCount ? Math.round((seriesCount-prevData.seriesCount)/prevData.seriesCount*100) : null,
      totalMinDelta: totalMin - prevData.totalMin,
      totalMinPct: prevData.totalMin ? Math.round((totalMin-prevData.totalMin)/prevData.totalMin*100) : null,
      genresUniqueDelta: genresUniqueCount - prevData.genresUniqueCount,
      countriesUniqueDelta: countriesUniqueCount - prevData.countriesUniqueCount,
      prevDominantGenre: prevData.dominantGenre,
      prevTop5Genres: prevData.top5Genres
    };
  }

  // Genre trending up/down vs last year (by rank/share movement)
  let genreUp = null, genreDown = null;
  if(comparison && comparison.prevTop5Genres) {
    const prevMap = Object.fromEntries(comparison.prevTop5Genres);
    let bestUp=-Infinity, bestDown=Infinity;
    genresSorted.forEach(([g,n])=>{
      const prevN = prevMap[g]||0;
      const delta = n - prevN;
      if(prevN>0 || n>0){
        if(delta>bestUp){ bestUp=delta; genreUp = delta>0 ? g : genreUp; }
        if(delta<bestDown){ bestDown=delta; genreDown = delta<0 ? g : genreDown; }
      }
    });
  }

  return {
    year, prevYearHasData,
    // section 2
    filmCount, filmTotalMin, shortestFilm, longestFilm,
    seriesCount, totalEpisodesThisYear, seasonsTouchedCount: seasonsTouched.size, totalEpisodeMin,
    mostWatchedSerie, mostWatchedSerieMin, mostWatchedSerieEps,
    // section 3
    totalMin, filmPct, seriesPct,
    byMonth, maxMonth, minMonth, peakMonthShare,
    // section 4
    top5Genres, dominantGenre, genresUniqueCount,
    // section 5
    top5Countries, dominantCountryPct, countriesUniqueCount, newCountries,
    // section 6
    top5Directors, topDirectors, topDirCountValue, uniqueDirectorsCount, top3DirConcentration,
    // section 7
    seriesStartedCount: seriesStarted.length, seriesCompletedCount: seriesCompleted.length,
    seriesAbandonedCount, avgSeriesLength,
    // section 8
    sagasTouchedCount: sagasTouched.length, sagasCompletedCount: sagasCompletedThisYear.length,
    sagasStartedNotCompletedCount: sagasStartedNotCompleted.length,
    biggestSaga, mostTimeSaga, mostTimeSagaMin, isolatedFilmsCount, sagaFilmsCount,
    // section 9
    allWorksCount,
    // section 12
    comparison, genreUp, genreDown
  };
}

// Lightweight version used only to compute prior-year comparison numbers
// (avoids infinite recursion / excess work — no need for full nested objects).
function buildWrappedDataLight(year) {
  const log = watchLogForYear(year);
  const filmEntries = log.filter(e=>e.type==='film').map(e=>resolveFilmEntry(e)).filter(Boolean);
  const epEntries = log.filter(e=>e.type==='episode').map(e=>resolveEpisodeEntry(e)).filter(Boolean);
  const uniqueFilmIds = [...new Set(log.filter(e=>e.type==='film').map(e=>e.filmId))];
  const filmsWatched = uniqueFilmIds.map(id=>DB.films.find(f=>f.id===id)).filter(Boolean);
  const seriesIds = new Set(log.filter(e=>e.type==='episode').map(e=>e.serieId));
  const seriesWatched = [...seriesIds].map(id=>DB.series.find(s=>s.id===id)).filter(Boolean);
  const filmTotalMin = filmsWatched.reduce((a,f)=>a+(parseInt(f.duration)||0),0);
  const epTotalMin = epEntries.reduce((a,r)=>a+(r.duration||0),0);
  const genreCount = {};
  filmsWatched.forEach(f=>parseNames(f.genres).forEach(g=>{ genreCount[g]=(genreCount[g]||0)+1; }));
  seriesWatched.forEach(s=>parseNames(s.genres).forEach(g=>{ genreCount[g]=(genreCount[g]||0)+1; }));
  const genresSorted = Object.entries(genreCount).sort((a,b)=>b[1]-a[1]);
  const countryCount = {};
  filmsWatched.forEach(f=>parseNames(f.countries).forEach(c=>{ countryCount[c]=(countryCount[c]||0)+1; }));
  seriesWatched.forEach(s=>parseNames(s.countries).forEach(c=>{ countryCount[c]=(countryCount[c]||0)+1; }));
  return {
    filmCount: filmsWatched.length,
    seriesCount: seriesWatched.length,
    totalMin: filmTotalMin + epTotalMin,
    genresUniqueCount: genresSorted.length,
    countriesUniqueCount: Object.keys(countryCount).length,
    dominantGenre: genresSorted.length ? genresSorted[0][0] : null,
    top5Genres: genresSorted.slice(0,5)
  };
}

// ---- Narrative generation: synthesis phrase + insights + closing statement ----
function buildWrappedNarrative(d) {
  const blocks = { opening:null, insights:[], highlights:[], closing:null };

  // ============================================================
  // OPENING — synthesis phrase, picks the best-fitting framing for the profile
  // ============================================================
  if(d.filmCount>0 && d.seriesCount>0) {
    const ratio = d.filmPct;
    if(ratio>=75) blocks.opening = `Une année résolument tournée vers le cinéma : les films ont occupé ${d.filmPct}% de votre temps de visionnage.`;
    else if(ratio>=60) blocks.opening = `Une année à dominante cinéma, avec ${d.filmPct}% du temps passé devant des films.`;
    else if(ratio<=25) blocks.opening = `Une année placée sous le signe des séries, qui ont représenté ${d.seriesPct}% de votre temps de visionnage.`;
    else if(ratio<=40) blocks.opening = `Une année à dominante séries, à ${d.seriesPct}% de votre temps total.`;
    else blocks.opening = `Une année parfaitement équilibrée entre films et séries, à ${d.filmPct}%/${d.seriesPct}%.`;
  } else if(d.filmCount>0) {
    blocks.opening = `Une année 100% cinéma — aucune série au compteur.`;
  } else if(d.seriesCount>0) {
    blocks.opening = `Une année 100% séries — aucun film au compteur.`;
  }

  // ============================================================
  // INSIGHTS — a wide pool of candidates, each only added if its own data
  // is actually present and meaningful. Capped at the end so the report
  // never feels overstuffed, but every candidate is independently guarded.
  // ============================================================
  const insightCandidates = [];

  if(d.comparison) {
    const c = d.comparison;
    if(c.seriesCountPct !== null && Math.abs(c.seriesCountPct)>=10) {
      insightCandidates.push({weight:8, text:`Vous avez regardé ${Math.abs(c.seriesCountPct)}% ${c.seriesCountPct>0?'de plus':'de moins'} de séries que l'an dernier.`});
    }
    if(c.filmCountPct !== null && Math.abs(c.filmCountPct)>=10) {
      insightCandidates.push({weight:8, text:`Côté films, ${c.filmCountPct>0?'une hausse':'une baisse'} de ${Math.abs(c.filmCountPct)}% par rapport à l'année précédente.`});
    }
    if(c.totalMinPct !== null && Math.abs(c.totalMinPct)>=10) {
      insightCandidates.push({weight:7, text:`Votre temps de visionnage total a ${c.totalMinPct>0?'augmenté':'diminué'} de ${Math.abs(c.totalMinPct)}% par rapport à l'an dernier.`});
    }
    if(c.genresUniqueDelta !== 0) {
      insightCandidates.push({weight:4, text:`Vous avez exploré ${Math.abs(c.genresUniqueDelta)} genre${Math.abs(c.genresUniqueDelta)>1?'s':''} ${c.genresUniqueDelta>0?'de plus':'de moins'} que l'an dernier.`});
    }
    if(c.countriesUniqueDelta !== 0) {
      insightCandidates.push({weight:4, text:`${Math.abs(c.countriesUniqueDelta)} pays de production ${c.countriesUniqueDelta>0?'supplémentaire(s)':'en moins'} découvert(s) cette année par rapport à l'an dernier.`});
    }
  }
  if(d.genreUp) insightCandidates.push({weight:6, text:`Le genre "${d.genreUp}" a particulièrement progressé dans votre consommation cette année.`});
  if(d.genreDown) insightCandidates.push({weight:5, text:`Le genre "${d.genreDown}" a nettement reculé par rapport à l'an dernier.`});
  if(d.newCountries.length) insightCandidates.push({weight:5, text:`Vous avez découvert ${d.newCountries.length} nouveau${d.newCountries.length>1?'x':''} pays de production cette année : ${d.newCountries.slice(0,5).join(', ')}.`});
  if(d.dominantCountryPct>=50 && d.top5Countries.length) insightCandidates.push({weight:6, text:`Les productions de ${d.top5Countries[0][0]} ont dominé votre année, avec ${d.dominantCountryPct}% de votre consommation.`});
  if(d.top3DirConcentration>=40 && d.uniqueDirectorsCount>=3) insightCandidates.push({weight:5, text:`Vos 3 réalisateurs les plus vus représentent à eux seuls ${d.top3DirConcentration}% de vos films de l'année.`});
  if(d.topDirectors.length===1 && d.topDirCountValue>=3) insightCandidates.push({weight:6, text:`${d.topDirectors[0]} a marqué votre année avec ${d.topDirCountValue} films vus.`});
  if(d.topDirectors.length>1 && d.topDirCountValue>=2) insightCandidates.push({weight:5, text:`Égalité en tête des réalisateurs cette année : ${d.topDirectors.join(', ')}, avec ${d.topDirCountValue} films chacun.`});
  if(d.seriesCompletedCount>=1) insightCandidates.push({weight:4, text:`Vous avez mené ${d.seriesCompletedCount} série${d.seriesCompletedCount>1?'s':''} jusqu'au bout cette année.`});
  if(d.seriesAbandonedCount>=1) insightCandidates.push({weight:3, text:`${d.seriesAbandonedCount} série${d.seriesAbandonedCount>1?'s ont été abandonnées':' a été abandonnée'} en cours de route.`});
  if(d.seriesStartedCount>=3) insightCandidates.push({weight:3, text:`Vous avez démarré ${d.seriesStartedCount} nouvelles séries cette année.`});
  if(d.sagasCompletedCount>=1) insightCandidates.push({weight:5, text:`${d.sagasCompletedCount} saga${d.sagasCompletedCount>1?'s bouclées':' bouclée'} entièrement cette année.`});
  if(d.sagasStartedNotCompletedCount>=1) insightCandidates.push({weight:3, text:`${d.sagasStartedNotCompletedCount} saga${d.sagasStartedNotCompletedCount>1?'s entamées restent':' entamée reste'} à terminer.`});
  if(d.isolatedFilmsCount>0 && d.sagaFilmsCount>0) {
    const sagaShare = Math.round(d.sagaFilmsCount/(d.isolatedFilmsCount+d.sagaFilmsCount)*100);
    if(sagaShare>=50) insightCandidates.push({weight:4, text:`${sagaShare}% de vos films cette année appartenaient à une saga.`});
  }
  if(d.shortestFilm && d.longestFilm && d.shortestFilm.id!==d.longestFilm.id) {
    const shortMin = parseInt(d.shortestFilm.duration)||0, longMin = parseInt(d.longestFilm.duration)||0;
    if(longMin >= shortMin*2 && shortMin>0) insightCandidates.push({weight:3, text:`Écart notable cette année : de ${fmtH(shortMin)} (${d.shortestFilm.title}) à ${fmtH(longMin)} (${d.longestFilm.title}).`});
  }
  if(d.avgSeriesLength>=50) insightCandidates.push({weight:3, text:`Vos séries suivies cette année comptent en moyenne ${d.avgSeriesLength} épisodes — du gros calibre.`});
  else if(d.avgSeriesLength>0 && d.avgSeriesLength<=10) insightCandidates.push({weight:2, text:`Format court à l'honneur : vos séries suivies font en moyenne ${d.avgSeriesLength} épisodes.`});

  insightCandidates.sort((a,b)=>b.weight-a.weight);
  blocks.insights = insightCandidates.slice(0,6).map(c=>c.text);

  // ============================================================
  // HIGHLIGHTS — "1-3 faits marquants", each strictly guarded so an empty
  // or undefined data point can never produce a hollow card.
  // ============================================================
  const highlightCandidates = [];

  if(d.longestFilm && d.longestFilm.title && (parseInt(d.longestFilm.duration)||0)>0) {
    highlightCandidates.push({weight:6, text:`Film le plus marquant (le plus long) : ${d.longestFilm.title} (${fmtH(parseInt(d.longestFilm.duration)||0)}).`});
  }
  if(d.biggestSaga && d.biggestSaga.name && sagaFilmCount(d.biggestSaga)>=2) {
    highlightCandidates.push({weight:5, text:`Plus grande saga vue : ${sagaLabel(d.biggestSaga)} ${d.biggestSaga.name} (${sagaFilmCount(d.biggestSaga)} films).`});
  }
  if(d.mostTimeSaga && d.mostTimeSaga.name && d.mostTimeSagaMin>0) {
    highlightCandidates.push({weight:5, text:`Marathon le plus long : la ${sagaLabel(d.mostTimeSaga).toLowerCase()} ${d.mostTimeSaga.name}, ${fmtDuration(d.mostTimeSagaMin)} cumulées.`});
  }
  if(d.peakMonthShare>=25 && d.maxMonth!==null) {
    highlightCandidates.push({weight:6, text:`Période intense : ${MONTH_NAMES_FR[d.maxMonth]} a concentré ${d.peakMonthShare}% de votre visionnage annuel.`});
  }
  if(d.mostWatchedSerie && d.mostWatchedSerie.title && d.mostWatchedSerieEps>=10) {
    highlightCandidates.push({weight:5, text:`Série marathon : ${d.mostWatchedSerie.title}, ${d.mostWatchedSerieEps} épisodes avalés cette année.`});
  }
  if(d.topDirectors.length===1 && d.topDirCountValue>=4) {
    highlightCandidates.push({weight:4, text:`Fidélité remarquée : ${d.topDirCountValue} films de ${d.topDirectors[0]} vus cette année.`});
  }
  if(d.dominantGenre && d.top5Genres.length && d.top5Genres[0][1]>=8) {
    highlightCandidates.push({weight:3, text:`Genre obsession de l'année : "${d.dominantGenre}", ${d.top5Genres[0][1]} œuvres au compteur.`});
  }

  highlightCandidates.sort((a,b)=>b.weight-a.weight);
  blocks.highlights = highlightCandidates.slice(0,3).map(c=>c.text);

  // ============================================================
  // CLOSING — built from independent qualifying clauses, each only added
  // when its underlying data supports it, then joined into one sentence.
  // The clause pool is large enough that two different profiles rarely
  // produce the exact same closing line.
  // ============================================================
  const clauses = [];

  // Balance film/série
  if(d.filmCount>0 && d.seriesCount>0) {
    if(d.filmPct>=70) clauses.push('nettement dominée par les films');
    else if(d.filmPct>=55) clauses.push('plutôt orientée cinéma');
    else if(d.seriesPct>=70) clauses.push('nettement dominée par les séries');
    else if(d.seriesPct>=55) clauses.push('plutôt orientée séries');
    else clauses.push('parfaitement équilibrée entre films et séries');
  } else if(d.filmCount>0) {
    clauses.push('entièrement consacrée au cinéma');
  } else if(d.seriesCount>0) {
    clauses.push('entièrement consacrée aux séries');
  }

  // Genre diversity
  if(d.genresUniqueCount>=10) clauses.push('une diversification remarquable des genres explorés');
  else if(d.genresUniqueCount>=6) clauses.push('une belle diversité de genres');
  else if(d.genresUniqueCount>0 && d.genresUniqueCount<=2) clauses.push('une consommation très concentrée sur un ou deux genres');

  // Geography
  if(d.countriesUniqueCount>=8) clauses.push('une ouverture marquée sur les productions internationales');
  else if(d.dominantCountryPct>=70 && d.top5Countries.length) clauses.push(`une consommation très centrée sur les productions de ${d.top5Countries[0][0]}`);

  // Volume trend (only if comparison data exists)
  if(d.comparison && d.comparison.totalMinPct!==null) {
    if(d.comparison.totalMinPct>=20) clauses.push('un volume de visionnage en forte hausse');
    else if(d.comparison.totalMinPct>=8) clauses.push('un volume de visionnage en légère hausse');
    else if(d.comparison.totalMinPct<=-20) clauses.push('un volume de visionnage en net recul');
    else if(d.comparison.totalMinPct<=-8) clauses.push('un volume de visionnage en léger recul');
    else clauses.push('un volume de visionnage globalement stable');
  }

  // Sagas
  if(d.sagasCompletedCount>=2) clauses.push(`${d.sagasCompletedCount} sagas menées à terme`);
  else if(d.sagasCompletedCount===1) clauses.push('une saga menée à terme');

  // Series commitment
  if(d.seriesAbandonedCount>=3) clauses.push('plusieurs séries laissées en cours de route');
  else if(d.seriesCompletedCount>=3 && d.seriesAbandonedCount===0) clauses.push('une belle constance dans le suivi des séries');

  if(clauses.length===0) {
    blocks.closing = `Année ${d.year} enregistrée — peu de données pour en tirer un profil marqué, mais chaque film et chaque épisode compte.`;
  } else if(clauses.length===1) {
    blocks.closing = `Année ${clauses[0]}.`;
  } else {
    const last = clauses[clauses.length-1];
    const rest = clauses.slice(0,-1);
    blocks.closing = `Année ${rest.join(', ')}, et ${last}.`;
  }

  return blocks;
}

function toggleMore(id, btn) {
  const el = document.getElementById('more-'+id);
  if(!el) return;
  const open = el.style.display!=='none';
  el.style.display = open ? 'none' : '';
  btn.textContent = open ? btn.textContent.replace('▲','▼') : btn.textContent.replace('▼','▲');
}
function toggleContinueMore() {
  const el = document.getElementById('continue-more-list');
  const btn = document.getElementById('continue-more-btn');
  if(!el||!btn) return;
  const open = el.style.display==='flex';
  el.style.display = open ? 'none' : 'flex';
  btn.textContent = open ? btn.textContent.replace('▲','▼') : btn.textContent.replace('▼','▲');
}
function toggleDir(i) {
  const row = document.getElementById('dir-exp-'+i);
  const icon = document.querySelector(`[data-dir="${i}"]`);
  if(row) { const open=row.style.display!=='none'; row.style.display=open?'none':''; icon.textContent=open?'▶':'▼'; }
}
function findNextEpisode(s) {
  for(let si=0;si<(s.seasons||[]).length;si++){
    const season=s.seasons[si];
    for(let ei=0;ei<(season.episodes||[]).length;ei++){
      if(!season.episodes[ei].seen) return {s:si+1,e:ei+1,si,ei};
    }
  }
  return null;
}
function dashMarkEpSeen(sid, si, ei) {
  const s = DB.series.find(x=>x.id===sid);
  if(!s) return;
  s.seasons[si].episodes[ei].seen = true;
  s.lastInteracted = Date.now();
  _lastInteractedSerieId = sid;
  logWatch({type:'episode', serieId:sid, seasonIndex:si, episodeIndex:ei});
  saveDB();
  render('dashboard');
}

function filmsPage(el, actions) {
  actions.innerHTML = `<button class="btn btn-primary" onclick="openFilmForm()">＋ Ajouter un film</button>`;
  let search='', sortMode='alpha-asc';

  function applySort(list) {
    if(sortMode==='alpha-asc') return list.sort((a,b)=>a.title.localeCompare(b.title,'fr'));
    if(sortMode==='alpha-desc') return list.sort((a,b)=>b.title.localeCompare(a.title,'fr'));
    if(sortMode==='year-asc') return list.sort((a,b)=>(parseInt(a.year)||0)-(parseInt(b.year)||0));
    if(sortMode==='year-desc') return list.sort((a,b)=>(parseInt(b.year)||0)-(parseInt(a.year)||0));
    return list;
  }
  const sortLabels = {'alpha-asc':'A → Z','alpha-desc':'Z → A','year-asc':'Année ↑','year-desc':'Année ↓'};

  function draw() {
    let list = applySort([...DB.films]);
    if(search) list = list.filter(f=>
      f.title.toLowerCase().includes(search.toLowerCase()) ||
      joinNames(parseNames(f.directors)).toLowerCase().includes(search.toLowerCase())
    );
    el.innerHTML = `
    <div style="display:flex;gap:10px;margin-bottom:16px;align-items:center;flex-wrap:wrap">
      ${searchBarHTML('film-search','Rechercher un film ou réalisateur...',search)}
      <div style="display:flex;gap:4px;flex-shrink:0">
        ${Object.entries(sortLabels).map(([m,l])=>`<button class="btn btn-sm ${sortMode===m?'btn-primary':'btn-secondary'}" onclick="setFilmSort('${m}')">${l}</button>`).join('')}
      </div>
    </div>
    <div style="font-size:12px;color:var(--text-dim);margin-bottom:12px">${list.length} film(s)</div>
    <div class="media-list">${list.map(f=>filmRow(f)).join('')}</div>`;

    wireSearchBar('film-search', search, v=>{ search=v; draw(); });
  }
  window.setFilmSort = m=>{ sortMode=m; draw(); };
  draw();
}

function filmSagaOf(filmId) {
  return (DB.sagas||[]).find(sg=>(sg.films||[]).some(sf=>sf.id===filmId));
}
function sagaFilmCount(saga) { return (saga.films||[]).length; }
function sagaLabel(saga) {
  const n = sagaFilmCount(saga);
  if(n===2) return 'Dilogie';
  if(n===3) return 'Trilogie';
  return 'Saga';
}

function filmRow(f) {
  const dirs = joinNames(parseNames(f.directors));
  const saga = filmSagaOf(f.id);
  const sagaBadge = saga ? `<span class="badge badge-gold saga-badge" onclick="event.stopPropagation();goToSaga('${saga.id}')" title="Voir la saga" style="cursor:pointer;margin-left:6px">${sagaLabel(saga)} ${esc(saga.name)}</span>` : '';
  const sagaSiblings = saga ? (saga.films||[]).filter(sf=>sf.id!==f.id) : [];
  return `<div class="media-row" id="frow-${f.id}">
    <div class="media-row-main" onclick="toggleFilmExtra('${f.id}')">
      <div class="media-poster-thumb">${f.poster?`<img src="${f.poster}" alt="">`:'🎬'}</div>
      <div class="media-info">
        <div class="media-title">${esc(f.title)}${sagaBadge}</div>
        <div class="media-meta">${esc(dirs)} • ${esc(f.year||'?')} • ${f.duration?f.duration+' min':'–'}</div>
      </div>
      <div class="media-actions" onclick="event.stopPropagation()">
        <button class="btn btn-secondary btn-xs" onclick="openFilmForm('${f.id}')">✏️</button>
        <button class="btn btn-danger btn-xs" onclick="deleteFilm('${f.id}')">🗑</button>
      </div>
    </div>
    <div id="fextra-${f.id}" style="display:none" class="media-extra">
      <div style="display:grid;grid-template-columns:1fr 1fr;gap:16px">
        <div><div class="form-label">Pays</div><div>${esc(joinNames(parseNames(f.countries)))||'–'}</div></div>
        <div><div class="form-label">Durée</div><div>${f.duration?f.duration+' min':'–'}</div></div>
      </div>
      <div style="margin-top:10px"><div class="form-label">Genre(s)</div><div>${parseNames(f.genres).length?esc(joinNames(parseNames(f.genres))):'–'}</div></div>
      ${sagaSiblings.length?`<div style="margin-top:10px"><div class="form-label">Autres films de la ${sagaLabel(saga)} ${esc(saga.name)}</div><div style="display:flex;flex-wrap:wrap;gap:6px;margin-top:4px">${sagaSiblings.map(sf=>{const seenF=!!DB.films.find(x=>x.id===sf.id);return `<span class="badge ${seenF?'badge-gold':'badge-gray'}">${esc(sf.title)}${sf.year?' ('+sf.year+')':''}</span>`;}).join('')}</div></div>`:''}
      ${f.notes?`<div style="margin-top:10px"><div class="form-label">Notes</div><div style="color:var(--text-dim);font-size:13px;white-space:pre-wrap">${esc(f.notes)}</div></div>`:''}
    </div>
  </div>`;
}

function toggleFilmExtra(id) {
  const el=document.getElementById('fextra-'+id);
  if(el) el.style.display=el.style.display==='none'?'block':'none';
}
function deleteFilm(id) {
  if(!confirm('Supprimer ce film ?')) return;
  const film = DB.films.find(f=>f.id===id);
  DB.films = DB.films.filter(f=>f.id!==id);
  // If this film belongs to a saga, keep it there but mark it back as "non vu"
  // instead of removing it from the saga entirely — the saga keeps its full
  // film list, just with this entry reverted to unseen.
  (DB.sagas||[]).forEach(sg=>{
    const sf = (sg.films||[]).find(x=>x.id===id);
    if(sf && film) {
      sf.title = film.title; sf.year = film.year; sf.directors = film.directors;
      sf.countries = film.countries; sf.duration = film.duration; sf.poster = film.poster;
      sf.unseen = true;
    }
  });
  saveDB(); render('films');
}

    try {
      const details = await tmdbMovieDetails(picked.id);
      document.getElementById('fm-title').value = details.title;
      document.getElementById('fm-year').value = details.year;
      if(details.duration) document.getElementById('fm-duration').value = details.duration;
      dirs.length = 0; details.directors.forEach(d=>dirs.push(d));
      renderTags('fm-dirs-wrap',dirs,'fm-dirs-input');
      countries.length = 0; details.countries.forEach(c=>countries.push(c));
      renderTags('fm-countries-wrap',countries,'fm-countries-input');
      genres.length = 0; (details.genres||[]).forEach(g=>genres.push(g));
      renderTags('fm-genres-wrap',genres,'fm-genres-input');
      renderTmdbSearchBox('fm-tmdb-box', 'movie', onTmdbMoviePick);
      document.getElementById('fm-tmdb-box').insertAdjacentHTML('afterbegin', `<div style="font-size:12px;color:var(--green);margin-bottom:8px">✓ Champs pré-remplis depuis TMDB — vérifiez avant d'enregistrer.</div>`);
    } catch(e) {
      box.innerHTML = `<div class="tmdb-search-wrap"><div style="color:var(--red);font-size:12px">Erreur lors de la récupération des détails.</div></div>`;
    }
  }
  renderTmdbSearchBox('fm-tmdb-box', 'movie', onTmdbMoviePick);
}

function handlePosterUpload(input, prevId) {
  const file = input.files[0]; if(!file) return;
  const reader = new FileReader();
  reader.onload = e => {
    const img = new Image();
    img.onload = () => {
      const canvas = document.createElement('canvas');
      const maxW = 400;
      const scale = Math.min(1, maxW/img.width);
      canvas.width = Math.round(img.width*scale);
      canvas.height = Math.round(img.height*scale);
      canvas.getContext('2d').drawImage(img,0,0,canvas.width,canvas.height);
      const data = canvas.toDataURL('image/jpeg',0.75);
      window._capturedPoster = data;
      const prev = document.getElementById(prevId);
      prev.innerHTML = `<img src="${data}" style="width:100%;height:100%;object-fit:cover">`;
      const delBtn = document.getElementById(prevId.replace('-prev','-del'));
      if(delBtn) delBtn.style.display='';
    };
    img.src = e.target.result;
  };
  reader.readAsDataURL(file);
}
function clearPosterBtn(prevId, delId) {
  window._capturedPoster = '';
  document.getElementById(prevId).innerHTML = '🎬';
  document.getElementById(delId).style.display='none';
}

function seriesPage(el, actions) {
  actions.innerHTML = `<button class="btn btn-primary" onclick="openSerieForm()">＋ Ajouter une série</button>`;
  let search='', sortMode='alpha-asc';
  let statusPriority = 'encours';

  const sortLabels = {
    'alpha-asc':'A → Z','alpha-desc':'Z → A',
    'year-asc':'Année ↑','year-desc':'Année ↓',
    'prog-asc':'% ↑','prog-desc':'% ↓',
    'status':'Statut'
  };
  const statusPriorityLabels = {encours:'En cours en 1er', terminee:'Terminée en 1er', annulee:'Annulée en 1er'};

  function applySort(list) {
    if(sortMode==='alpha-asc') return list.sort((a,b)=>a.title.localeCompare(b.title,'fr'));
    if(sortMode==='alpha-desc') return list.sort((a,b)=>b.title.localeCompare(a.title,'fr'));
    if(sortMode==='year-asc') return list.sort((a,b)=>(parseInt(a.years)||0)-(parseInt(b.years)||0));
    if(sortMode==='year-desc') return list.sort((a,b)=>(parseInt(b.years)||0)-(parseInt(a.years)||0));
    if(sortMode==='prog-asc') return list.sort((a,b)=>{
      const pa=serieTotalEps(a)?serieSeenEps(a)/serieTotalEps(a):0;
      const pb=serieTotalEps(b)?serieSeenEps(b)/serieTotalEps(b):0;
      return pa-pb;
    });
    if(sortMode==='prog-desc') return list.sort((a,b)=>{
      const pa=serieTotalEps(a)?serieSeenEps(a)/serieTotalEps(a):0;
      const pb=serieTotalEps(b)?serieSeenEps(b)/serieTotalEps(b):0;
      return pb-pa;
    });
    if(sortMode==='status'){
      const all = ['encours','terminee','annulee'];
      const ordered = [statusPriority, ...all.filter(s=>s!==statusPriority)];
      const order = {};
      ordered.forEach((s,i)=>order[s]=i);
      order[''] = 10;
      return list.sort((a,b)=>{
        const oa = order[a.status||'']??10;
        const ob = order[b.status||'']??10;
        if(oa!==ob) return oa-ob;
        return a.title.localeCompare(b.title,'fr');
      });
    }
    return list;
  }

  function draw() {
    let list = applySort(DB.series.filter(s=>!s.abandoned));
    if(search) list = list.filter(s=>s.title.toLowerCase().includes(search.toLowerCase()));

    const statusSubMenu = sortMode==='status' ? `
      <div style="display:flex;gap:4px;flex-wrap:wrap;margin-bottom:10px;padding:10px;background:var(--surface2);border-radius:var(--radius)">
        <span style="font-size:12px;color:var(--text-dim);align-self:center;margin-right:4px">Priorité :</span>
        ${Object.entries(statusPriorityLabels).map(([k,l])=>`
          <button class="btn btn-xs ${statusPriority===k?'btn-primary':'btn-secondary'}" onclick="setStatusPriority('${k}')">${l}</button>
        `).join('')}
      </div>` : '';

    el.innerHTML = `
    <div style="display:flex;gap:10px;margin-bottom:10px;align-items:center;flex-wrap:wrap">
      ${searchBarHTML('serie-search','Rechercher une série...',search)}
    </div>
    <div style="display:flex;gap:4px;flex-wrap:wrap;margin-bottom:8px">
      ${Object.entries(sortLabels).map(([m,l])=>`<button class="btn btn-sm ${sortMode===m?'btn-primary':'btn-secondary'}" onclick="setSerieSort('${m}')">${l}</button>`).join('')}
    </div>
    ${statusSubMenu}
    <div style="font-size:12px;color:var(--text-dim);margin-bottom:12px">${list.length} série(s)</div>
    <div class="media-list" id="series-list">${list.map(s=>serieRow(s,true)).join('')}</div>`;

    wireSearchBar('serie-search', search, v=>{ search=v; draw(); });
  }
  window.setSerieSort = m=>{ sortMode=m; draw(); };
  window.setStatusPriority = p=>{ statusPriority=p; draw(); };
  window._seriesPageDraw = draw;
  draw();
}
