// ============================================================
// SERIE FORM (with season naming + airdate cascade tools)
// ============================================================
function openSerieFormFromDetail(id) {
  window._serieDetailOrigin = id;
  closeModal();
  openSerieForm(id);
}

function openSerieForm(id) {
  window._capturedPoster = undefined;
  const serie = id ? DB.series.find(s=>s.id===id) : null;
  if(serie) window._capturedPoster = serie.poster||'';
  const creators = serie ? parseNames(serie.creators) : [];
  const countries = serie ? parseNames(serie.countries) : [];
  const platforms = serie ? parseNames(serie.platforms) : [];
  const genres = serie ? parseNames(serie.genres) : [];
  let tmdbId = serie ? (serie.tmdbId||null) : null;
  let seasons = serie ? JSON.parse(JSON.stringify(serie.seasons||[])) : [];

  function addWeek(dateStr) {
    const m = String(dateStr).match(/^(\d{4})-(\d{2})-(\d{2})$/);
    if(!m) return '';
    const d = new Date(Date.UTC(parseInt(m[1]),parseInt(m[2])-1,parseInt(m[3])));
    d.setUTCDate(d.getUTCDate()+7);
    return `${d.getUTCFullYear()}-${String(d.getUTCMonth()+1).padStart(2,'0')}-${String(d.getUTCDate()).padStart(2,'0')}`;
  }
  const isValidDate = (s) => /^\d{4}-\d{2}-\d{2}$/.test(String(s||''));
  // Internal storage stays YYYY-MM-DD (sortable, used for the +1 week math).
  // Display/input uses DD-MM-YYYY.
  function isoToDisplay(iso) {
    const m = String(iso||'').match(/^(\d{4})-(\d{2})-(\d{2})$/);
    return m ? `${m[3]}-${m[2]}-${m[1]}` : (iso||'');
  }
  function displayToIso(disp) {
    const m = String(disp||'').trim().match(/^(\d{2})-(\d{2})-(\d{4})$/);
    return m ? `${m[3]}-${m[2]}-${m[1]}` : '';
  }

  function renderSeasonsEditor() {
    const wrap=document.getElementById('fm-seasons-editor'); if(!wrap) return;
    wrap.innerHTML = seasons.map((season,si)=>`
      <div style="background:var(--surface3);border-radius:8px;padding:12px;margin-bottom:10px">
        <div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:10px">
          <b>Saison ${si+1}</b>
          <button class="btn btn-danger btn-xs" onclick="removeSeason(${si})">Supprimer</button>
        </div>
        <div class="form-row" style="margin-bottom:10px">
          <div>
            <label class="form-label" style="margin-bottom:4px">Nom de la saison <small style="color:var(--text-dim)">(optionnel)</small></label>
            <input class="form-input" style="padding:6px 10px;font-size:13px" placeholder="Ex: Les Origines" value="${esc(season.name||'')}" oninput="setSeasonName(${si},this.value)">
          </div>
          <div>
            <label class="form-label" style="margin-bottom:4px">Nb épisodes</label>
            <input type="number" min="1" class="form-input" style="padding:6px 10px;font-size:13px" value="${season.episodes.length}" onchange="resizeSeason(${si},this.value)">
          </div>
        </div>
        <div style="font-size:12px;color:var(--text-dim);margin-bottom:8px">(vus : ${season.episodes.filter(e=>e.seen).length})</div>
        <button class="btn btn-secondary btn-xs" onclick="toggleEpDetails(${si})">
          ${season._showDetails?'▼ Masquer titres/dates':'▶ Titres & dates (optionnel)'}
        </button>
        <div id="ep-details-${si}" style="display:${season._showDetails?'block':'none'};margin-top:10px">
          <div style="font-size:12px;color:var(--text-dim);margin-bottom:8px">Format date : JJ-MM-AAAA</div>
          <div style="display:flex;gap:14px;margin-bottom:10px;flex-wrap:wrap">
            <label style="display:flex;align-items:center;gap:6px;font-size:12px;cursor:pointer">
              <input type="checkbox" id="opt-sameday-${si}" ${season._sameDay?'checked':''} onchange="toggleSameDay(${si},this.checked)">
              Même date pour toute la saison
            </label>
            <label style="display:flex;align-items:center;gap:6px;font-size:12px;cursor:pointer">
              <input type="checkbox" id="opt-weekly-${si}" ${season._weekly?'checked':''} onchange="toggleWeekly(${si},this.checked)">
              +1 semaine entre chaque épisode
            </label>
          </div>
          ${season.episodes.map((ep,ei)=>`
            <div style="display:grid;grid-template-columns:28px 1fr 1fr;gap:6px;align-items:center;margin-bottom:6px">
              <span style="font-size:12px;color:var(--text-dim);text-align:right">E${ei+1}</span>
              <input class="form-input" style="padding:5px 8px;font-size:12px" placeholder="Titre" value="${esc(ep.title||'')}" oninput="setEpField(${si},${ei},'title',this.value)">
              <input class="form-input" style="padding:5px 8px;font-size:12px" placeholder="Date (JJ-MM-AAAA)" value="${esc(isoToDisplay(ep.airdate))}" onchange="setEpDate(${si},${ei},this.value)">
            </div>`).join('')}
        </div>
      </div>`).join('')
    + `<button class="btn btn-secondary btn-sm" onclick="addSeason()" style="margin-top:4px">＋ Ajouter une saison</button>`;
  }

  window.toggleEpDetails=(si)=>{ seasons[si]._showDetails=!seasons[si]._showDetails; renderSeasonsEditor(); };
  window.setEpField=(si,ei,f,v)=>{ seasons[si].episodes[ei][f]=v; };
  window.setSeasonName=(si,v)=>{ seasons[si].name=v; };
  window.addSeason=()=>{ seasons.push({episodes:[{seen:false,title:'',airdate:''}],_showDetails:false}); renderSeasonsEditor(); };
  window.removeSeason=(si)=>{ seasons.splice(si,1); renderSeasonsEditor(); };
  window.resizeSeason=(si,n)=>{
    n=Math.max(1,parseInt(n)||1);
    const cur=seasons[si].episodes;
    while(cur.length<n) cur.push({seen:false,title:'',airdate:''});
    while(cur.length>n) cur.pop();
    renderSeasonsEditor();
  };
  window.toggleSameDay=(si,checked)=>{ seasons[si]._sameDay=checked; if(checked) seasons[si]._weekly=false; renderSeasonsEditor(); };
  window.toggleWeekly=(si,checked)=>{ seasons[si]._weekly=checked; if(checked) seasons[si]._sameDay=false; renderSeasonsEditor(); };

  window.setEpDate = (si, ei, val) => {
    const season = seasons[si];
    const iso = displayToIso(val);
    if(val.trim() && !iso) {
      // Invalid format typed — keep raw text so user can fix it, don't crash cascade logic
      season.episodes[ei].airdate = '';
      alert('Format de date invalide. Utilisez JJ-MM-AAAA (ex: 11-06-2026).');
      renderSeasonsEditor();
      return;
    }
    season.episodes[ei].airdate = iso;
    if(!isValidDate(iso)) { renderSeasonsEditor(); return; }

    if(season._sameDay) {
      const apply = () => {
        season.episodes.forEach(ep=>{ ep.airdate = iso; });
        renderSeasonsEditor();
      };
      const hasOtherDates = season.episodes.some((ep,idx)=>idx!==ei && ep.airdate && ep.airdate!==iso);
      if(hasOtherDates) {
        if(confirm('Certains épisodes ont déjà une date différente. Les écraser avec cette date pour toute la saison ?')) apply();
        else renderSeasonsEditor();
      } else apply();
      return;
    }

    if(season._weekly) {
      let cascade = (fromIdx, overwriteThrough) => {
        let curDate = season.episodes[fromIdx].airdate;
        for(let idx=fromIdx+1; idx<season.episodes.length; idx++) {
          const next = season.episodes[idx];
          const computed = addWeek(curDate);
          if(next.airdate && isValidDate(next.airdate) && next.airdate !== computed && !overwriteThrough) {
            if(confirm(`L'épisode E${idx+1} a déjà une date (${isoToDisplay(next.airdate)}). Continuer en l'écrasant avec la cascade hebdomadaire ?`)) {
              cascade(fromIdx, true);
            }
            return;
          }
          next.airdate = computed;
          curDate = computed;
        }
      };
      cascade(ei, false);
      renderSeasonsEditor();
      return;
    }
    renderSeasonsEditor();
  };

  createModal(serie?'Modifier la série':'Ajouter une série', `
    <div id="sm-tmdb-box"></div>
    <div class="form-group"><label class="form-label">Titre *</label><input class="form-input" id="sm-title" value="${esc(serie?.title||'')}"></div>
    <div class="form-group">
      <label class="form-label">Créateur(s) * <small style="color:var(--text-dim)">(Entrée)</small></label>
      <div class="tag-input-wrap" id="sm-creators-wrap" onclick="document.getElementById('sm-creators-input').focus()"><input class="tag-input" id="sm-creators-input" placeholder="Ajouter un nom..."></div>
    </div>
    <div class="form-row">
      <div class="form-group"><label class="form-label">Année(s) * <small style="color:var(--text-dim)">"2020-..." si en cours</small></label><input class="form-input" id="sm-years" value="${esc(serie?.years||'')}"></div>
      <div class="form-group"><label class="form-label">Statut *</label>
        <select class="form-select" id="sm-status">
          <option value="">–</option>
          <option value="encours" ${serie?.status==='encours'?'selected':''}>En cours</option>
          <option value="terminee" ${serie?.status==='terminee'?'selected':''}>Terminée</option>
          <option value="annulee" ${serie?.status==='annulee'?'selected':''}>Annulée</option>
        </select>
      </div>
    </div>
    <div class="form-group">
      <label class="form-label">Chaîne / Plateforme(s) * <small style="color:var(--text-dim)">(Entrée)</small></label>
      <div class="tag-input-wrap" id="sm-platforms-wrap" style="position:relative" onclick="document.getElementById('sm-platforms-input').focus()">
        <input class="tag-input" id="sm-platforms-input" placeholder="Netflix, HBO..." autocomplete="off">
      </div>
    </div>
    <div class="form-group">
      <label class="form-label">Pays * <small style="color:var(--text-dim)">(Entrée)</small></label>
      <div class="tag-input-wrap" id="sm-countries-wrap" onclick="document.getElementById('sm-countries-input').focus()"><input class="tag-input" id="sm-countries-input" placeholder="Ajouter un pays..."></div>
    </div>
    <div class="form-group">
      <label class="form-label">Genre(s) <small style="color:var(--text-dim)">(optionnel, recommandé — Entrée)</small></label>
      <div class="tag-input-wrap" id="sm-genres-wrap" onclick="document.getElementById('sm-genres-input').focus()">
        <input class="tag-input" id="sm-genres-input" placeholder="Drame, Comédie...">
      </div>
    </div>
    <div class="form-group"><label class="form-label">Durée moy. épisode (min) *</label><input class="form-input" id="sm-dur" type="number" value="${esc(serie?.episodeDuration||'')}"></div>
    <div class="form-group"><label class="form-label">Saisons & Épisodes *</label><div id="fm-seasons-editor"></div></div>
    <div class="form-group">
      <label class="form-label">Poster</label>
      <div style="display:flex;align-items:center;gap:12px">
        <div id="sm-poster-prev" style="width:60px;height:88px;background:var(--surface3);border-radius:6px;display:flex;align-items:center;justify-content:center;color:var(--text-dim);font-size:24px;overflow:hidden">
          ${serie?.poster?`<img src="${serie.poster}" style="width:100%;height:100%;object-fit:cover">`:'📺'}
        </div>
        <label class="btn btn-secondary poster-upload-btn">📷 Choisir<input type="file" accept="image/*" style="display:none" onchange="handlePosterUpload(this,'sm-poster-prev')"></label>
        <button class="btn btn-danger btn-sm" id="sm-poster-del" onclick="clearPosterBtn('sm-poster-prev','sm-poster-del')" style="${serie?.poster?'':'display:none'}">Supprimer</button>
      </div>
    </div>
  `, () => {
    const title=document.getElementById('sm-title').value.trim();
    const years=document.getElementById('sm-years').value.trim();
    const status=document.getElementById('sm-status').value;
    const epDur=document.getElementById('sm-dur').value.trim();
    let valid=true;
    if(!title){ document.getElementById('sm-title').classList.add('invalid'); valid=false; } else document.getElementById('sm-title').classList.remove('invalid');
    if(creators.length===0){ document.getElementById('sm-creators-wrap').classList.add('invalid'); valid=false; } else document.getElementById('sm-creators-wrap').classList.remove('invalid');
    if(!years){ document.getElementById('sm-years').classList.add('invalid'); valid=false; } else document.getElementById('sm-years').classList.remove('invalid');
    if(!status){ document.getElementById('sm-status').classList.add('invalid'); valid=false; } else document.getElementById('sm-status').classList.remove('invalid');
    if(platforms.length===0){ document.getElementById('sm-platforms-wrap').classList.add('invalid'); valid=false; } else document.getElementById('sm-platforms-wrap').classList.remove('invalid');
    if(countries.length===0){ document.getElementById('sm-countries-wrap').classList.add('invalid'); valid=false; } else document.getElementById('sm-countries-wrap').classList.remove('invalid');
    if(!epDur){ document.getElementById('sm-dur').classList.add('invalid'); valid=false; } else document.getElementById('sm-dur').classList.remove('invalid');
    const totalEps=seasons.reduce((a,sn)=>a+sn.episodes.length,0);
    if(totalEps===0){ alert('La série doit avoir au moins un épisode.'); valid=false; }
    if(!valid) return false;

    const cleanSeasons = seasons.map(sn=>({
      name: sn.name||'',
      episodes: sn.episodes.map(ep=>({seen:ep.seen||false,title:ep.title||'',airdate:ep.airdate||''}))
    }));
    const poster=window._capturedPoster!==undefined?window._capturedPoster:(serie?.poster||'');

    if(serie){
      cleanSeasons.forEach((newSn,si)=>{
        const oldSn=serie.seasons&&serie.seasons[si];
        if(oldSn) newSn.episodes.forEach((ep,ei)=>{ if(oldSn.episodes[ei]){ ep.seen=oldSn.episodes[ei].seen; } });
      });
      Object.assign(serie,{title,creators:[...creators],countries:[...countries],platforms:[...platforms],genres:[...genres],tmdbId,years,status,episodeDuration:parseInt(epDur),seasons:cleanSeasons,poster});
    } else {
      DB.series.push({id:uid(),title,creators:[...creators],countries:[...countries],platforms:[...platforms],genres:[...genres],tmdbId,years,status,episodeDuration:parseInt(epDur),seasons:cleanSeasons,poster,abandoned:false,lastInteracted:0});
    }
    saveDB(); closeModal();
    const originSerieId = window._serieDetailOrigin || null;
    window._serieDetailOrigin = null;
    if(originSerieId) {
      openSerieDetailModal(originSerieId);
      return;
    }
    const cur=document.querySelector('.nav-item.active')?.dataset.page||'series';
    if(cur==='series'&&window._seriesPageDraw) window._seriesPageDraw();
    else render(cur);
  });

  renderTags('sm-creators-wrap',creators,'sm-creators-input');
  renderTags('sm-countries-wrap',countries,'sm-countries-input');
  renderTags('sm-platforms-wrap',platforms,'sm-platforms-input');
  renderTags('sm-genres-wrap',genres,'sm-genres-input');
  setupTagInput('sm-creators-input','sm-creators-wrap',creators);
  setupTagInput('sm-countries-input','sm-countries-wrap',countries);
  setupTagInputWithAutocomplete('sm-platforms-input','sm-platforms-wrap',platforms,knownPlatforms);
  setupTagInputWithAutocomplete('sm-genres-input','sm-genres-wrap',genres,knownGenres);
  renderSeasonsEditor();

  // --- TMDB search & full season import ---
  async function onTmdbSeriePick(picked) {
    const box = document.getElementById('sm-tmdb-box');
    box.innerHTML = `<div class="tmdb-search-wrap"><div class="tmdb-progress">Récupération des informations de la série...</div></div>`;
    try {
      const details = await tmdbSeriesDetails(picked.id);
      document.getElementById('sm-title').value = details.title;
      document.getElementById('sm-years').value = details.years;
      document.getElementById('sm-status').value = details.status;
      if(details.episodeDuration) document.getElementById('sm-dur').value = details.episodeDuration;
      creators.length = 0; details.creators.forEach(c=>creators.push(c));
      renderTags('sm-creators-wrap',creators,'sm-creators-input');
      countries.length = 0; details.countries.forEach(c=>countries.push(c));
      renderTags('sm-countries-wrap',countries,'sm-countries-input');
      platforms.length = 0; details.platforms.forEach(p=>platforms.push(p));
      renderTags('sm-platforms-wrap',platforms,'sm-platforms-input');
      genres.length = 0; (details.genres||[]).forEach(g=>genres.push(g));
      renderTags('sm-genres-wrap',genres,'sm-genres-input');
      tmdbId = details.tmdbId;

      // Now fetch every season's episodes — this is the slow part, show progress.
      box.innerHTML = `<div class="tmdb-search-wrap"><div class="tmdb-progress" id="sm-tmdb-progress">Récupération des saisons (0/${details.seasonNumbers.length})...</div></div>`;
      const fetchedSeasons = await tmdbFetchAllSeasons(details.tmdbId, details.seasonNumbers, (done,total)=>{
        const p = document.getElementById('sm-tmdb-progress');
        if(p) p.textContent = `Récupération des saisons (${done}/${total})...`;
      });
      // Preserve any "seen" flags already set for matching season/episode indices
      fetchedSeasons.forEach((newSn,si)=>{
        const oldSn = seasons[si];
        if(oldSn) newSn.episodes.forEach((ep,ei)=>{ if(oldSn.episodes[ei]) ep.seen = oldSn.episodes[ei].seen; });
      });
      seasons.length = 0;
      fetchedSeasons.forEach(sn=>seasons.push(sn));
      renderSeasonsEditor();

      renderTmdbSearchBox('sm-tmdb-box', 'tv', onTmdbSeriePick);
      document.getElementById('sm-tmdb-box').insertAdjacentHTML('afterbegin', `<div style="font-size:12px;color:var(--green);margin-bottom:8px">✓ Série, saisons et épisodes pré-remplis depuis TMDB — vérifiez avant d'enregistrer.</div>`);
    } catch(e) {
      box.innerHTML = `<div class="tmdb-search-wrap"><div style="color:var(--red);font-size:12px">Erreur lors de la récupération des détails.</div></div>`;
    }
  }
  renderTmdbSearchBox('sm-tmdb-box', 'tv', onTmdbSeriePick);
}

function watchlistPage(el, actions) {
  if(!window._wlTab) window._wlTab='films';

  actions.innerHTML = `
    <button class="btn btn-secondary" onclick="openWatchlistForm('film')" style="margin-right:4px">＋ Film</button>
    <button class="btn btn-primary" onclick="openWatchlistForm('serie')">＋ Série</button>`;

  function draw() {
    const tab=window._wlTab;
    const wFilms=(DB.watchlist||[]).filter(w=>w.type==='film');
    const wSeries=(DB.watchlist||[]).filter(w=>w.type==='serie');
    const list=tab==='films'?wFilms:wSeries;
    el.innerHTML=`
    <div class="tabs">
      <button class="tab-btn ${tab==='films'?'active':''}" onclick="setWLTab('films')">🎬 Films (${wFilms.length})</button>
      <button class="tab-btn ${tab==='series'?'active':''}" onclick="setWLTab('series')">📺 Séries (${wSeries.length})</button>

    ${list.length===0?`<div style="text-align:center;padding:60px 20px;color:var(--text-dim)">
      <div style="font-size:40px;margin-bottom:12px">🔖</div>
      <div style="font-size:15px;margin-bottom:6px">Aucun ${tab==='films'?'film':'série'} en watchlist</div>
      <div style="font-size:13px">Ajoutez des titres à regarder prochainement.</div>
    </div>`:`<div class="media-list">${list.map(w=>watchlistRow(w)).join('')}</div>`}`;
  }
  window.setWLTab=(t)=>{ window._wlTab=t; draw(); };
  window._wlDraw=draw;
  draw();
}

function watchlistRow(w) {
  const meta=[];
  if(w.year) meta.push(w.year);
  if(w.creators && w.creators.length) meta.push(joinNames(w.creators));
  else if(w.director) meta.push(w.director);
  if(w.platforms && w.platforms.length) meta.push(joinNames(parseNames(w.platforms)));
  else if(w.platform) meta.push(w.platform);
  return `<div class="media-row" id="wrow-${w.id}">
    <div class="media-row-main" style="cursor:default">
      <div class="media-poster-thumb" style="font-size:20px">${w.type==='film'?'🎬':'📺'}</div>
      <div class="media-info" style="margin-left:12px">
        <div class="media-title">${esc(w.title)}</div>
        <div class="media-meta">${meta.map(esc).join(' • ')||'–'}</div>
        ${w.notes?`<div style="font-size:11px;color:var(--text-dim);margin-top:3px;font-style:italic">${esc(w.notes)}</div>`:''}
      </div>
      <div class="media-actions">
        <button class="btn btn-green btn-xs" onclick="convertWatchlist('${w.id}')">✓ Vu</button>
        <button class="btn btn-secondary btn-xs" onclick="editWatchlist('${w.id}')">✏️</button>
        <button class="btn btn-danger btn-xs" onclick="deleteWatchlist('${w.id}')">🗑</button>
      </div>
    </div>
  </div>`;
}

    <div class="form-row">

      </div>
    </div>
    ${t==='serie'?`<div class="form-group">
      <label class="form-label">Chaîne / Plateforme(s) <small style="color:var(--text-dim)">(optionnel, Entrée)</small></label>
      <div class="tag-input-wrap" id="wl-platforms-wrap" style="position:relative" onclick="document.getElementById('wl-platforms-input').focus()"><input class="tag-input" id="wl-platforms-input" placeholder="Netflix..."></div>
    </div>`:''}
    <div class="form-group"><label class="form-label">Note <small style="color:var(--text-dim)">(optionnel)</small></label><input class="form-input" id="wl-notes" value="${esc(item?.notes||'')}" placeholder="Recommandé par..."></div>
  `,()=>{
    const title=document.getElementById('wl-title')?.value?.trim();
    if(!title){ document.getElementById('wl-title').classList.add('invalid'); return false; }
    const year=document.getElementById('wl-year')?.value?.trim();
    const notes=document.getElementById('wl-notes')?.value?.trim();
    if(!DB.watchlist) DB.watchlist=[];
    if(item){ Object.assign(item,{title,year,creators:[...wlCreators],platforms:[...wlPlatforms],notes,tmdbId:wlTmdbId}); }
    else { DB.watchlist.push({id:uid(),type:t,title,year,creators:[...wlCreators],platforms:[...wlPlatforms],notes,tmdbId:wlTmdbId}); }
    saveDB(); closeModal();
    if(window._wlDraw) window._wlDraw();
  });
  renderTags('wl-creators-wrap',wlCreators,'wl-creators-input');
  setupTagInput('wl-creators-input','wl-creators-wrap',wlCreators);
  if(t==='serie'){
    renderTags('wl-platforms-wrap',wlPlatforms,'wl-platforms-input');
    setupTagInputWithAutocomplete('wl-platforms-input','wl-platforms-wrap',wlPlatforms,knownPlatforms);
  }

  // TMDB search — pre-fills title/year/creators here, and remembers the
  // tmdbId so that converting this watchlist entry to a watched film/series
  // later can pull ALL details (country, duration, genres, seasons...)
  // automatically instead of re-searching from scratch.
  async function onWlTmdbPick(picked) {
    const box = document.getElementById('wl-tmdb-box');
    box.innerHTML = `<div class="tmdb-search-wrap"><div class="tmdb-progress">Récupération des informations...</div></div>`;
    try {
      if(t==='film') {
        const details = await tmdbMovieDetails(picked.id);
        document.getElementById('wl-title').value = details.title;
        document.getElementById('wl-year').value = details.year;
        wlCreators.length = 0; details.directors.forEach(d=>wlCreators.push(d));
        renderTags('wl-creators-wrap',wlCreators,'wl-creators-input');
      } else {
        const details = await tmdbSeriesDetails(picked.id);
        document.getElementById('wl-title').value = details.title;
        document.getElementById('wl-year').value = details.years;
        wlCreators.length = 0; details.creators.forEach(c=>wlCreators.push(c));
        renderTags('wl-creators-wrap',wlCreators,'wl-creators-input');
        wlPlatforms.length = 0; details.platforms.forEach(p=>wlPlatforms.push(p));
        renderTags('wl-platforms-wrap',wlPlatforms,'wl-platforms-input');
      }
      wlTmdbId = picked.id;
      renderTmdbSearchBox('wl-tmdb-box', t==='film'?'movie':'tv', onWlTmdbPick);
      document.getElementById('wl-tmdb-box').insertAdjacentHTML('afterbegin', `<div style="font-size:12px;color:var(--green);margin-bottom:8px">✓ Champs pré-remplis — toutes les infos seront récupérées automatiquement quand vous marquerez "Vu".</div>`);
    } catch(e) {
      box.innerHTML = `<div class="tmdb-search-wrap"><div style="color:var(--red);font-size:12px">Erreur lors de la récupération des détails.</div></div>`;
    }
  }
  renderTmdbSearchBox('wl-tmdb-box', t==='film'?'movie':'tv', onWlTmdbPick);
}

function editWatchlist(id) {
  const w=(DB.watchlist||[]).find(x=>x.id===id);
  if(w) openWatchlistForm(w.type,id);
}
function deleteWatchlist(id) {
  if(!confirm('Supprimer de la watchlist ?')) return;
  DB.watchlist=(DB.watchlist||[]).filter(w=>w.id!==id);
  saveDB(); if(window._wlDraw) window._wlDraw();
}

// "Marquer vu" depuis la watchlist : l'item est retiré temporairement, mais
// restauré si l'utilisateur clique Annuler ou ✕ sans valider le formulaire.
function convertWatchlist(id) {
  const w=(DB.watchlist||[]).find(x=>x.id===id); if(!w) return;
  window._wlPendingConvert = {id, item: JSON.parse(JSON.stringify(w))};
  DB.watchlist=DB.watchlist.filter(x=>x.id!==id);
  saveDB();
  if(w.type==='film'){
    document.querySelectorAll('.nav-item').forEach(x=>x.classList.remove('active'));
    document.querySelector('[data-page="films"]').classList.add('active');
    document.getElementById('topbar-title').textContent='Films';
    render('films');
    setTimeout(()=>openWatchlistToFilmForm(w),50);
  } else {
    document.querySelectorAll('.nav-item').forEach(x=>x.classList.remove('active'));
    document.querySelector('[data-page="series"]').classList.add('active');
    document.getElementById('topbar-title').textContent='Séries';
    render('series');
    setTimeout(()=>openWatchlistToSerieForm(w),50);
  }
}

function restoreWatchlistIfPending() {
  if(window._wlPendingConvert) {
    const {item} = window._wlPendingConvert;
    if(!DB.watchlist.find(w=>w.id===item.id)) {
      DB.watchlist.push(item);
      saveDB();
    }
    window._wlPendingConvert = null;
  }
}

function openWatchlistToSerieForm(w) {
  window._capturedPoster='';
  const creators=parseNames(w.creators||w.director||[]);
  const countries=[];
  const platforms=parseNames(w.platforms||w.platform||[]);
  const genres=[];
  let seasons=[];

  function rse(){
    const wrap=document.getElementById('fm-seasons-editor'); if(!wrap) return;
    wrap.innerHTML=seasons.map((season,si)=>`
      <div style="background:var(--surface3);border-radius:8px;padding:12px;margin-bottom:10px">
        <div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:8px"><b>${esc(seasonLabel(season,si))}</b><button class="btn btn-danger btn-xs" onclick="removeSeason(${si})">Supprimer</button></div>
        <div style="display:flex;align-items:center;gap:10px">
          <label class="form-label" style="margin:0">Épisodes :</label>
          <input type="number" min="1" class="form-input" style="width:80px;padding:6px 10px" value="${season.episodes.length}" onchange="resizeSeason(${si},this.value)">
        </div>
      </div>`).join('')
    +`<button class="btn btn-secondary btn-sm" onclick="addSeason()">＋ Saison</button>`;
  }
  window.addSeason=()=>{ seasons.push({episodes:[{seen:false,title:'',airdate:''}]}); rse(); };
  window.removeSeason=(si)=>{ seasons.splice(si,1); rse(); };
  window.resizeSeason=(si,n)=>{ n=Math.max(1,parseInt(n)||1); const c=seasons[si].episodes; while(c.length<n)c.push({seen:false,title:'',airdate:''}); while(c.length>n)c.pop(); rse(); };

  let tmdbId = w.tmdbId || null;

  createModal('Ajouter la série (vue)',`
    <div style="background:rgba(232,196,106,.08);border:1px solid rgba(232,196,106,.2);border-radius:8px;padding:10px 14px;margin-bottom:16px;font-size:13px;color:var(--gold)" id="wl2s-banner">
      ${w.tmdbId ? '✓ Série déplacée depuis la watchlist — récupération des informations TMDB...' : '✓ Série déplacée depuis la watchlist'}
    </div>
    <div class="form-group"><label class="form-label">Titre *</label><input class="form-input" id="sm-title" value="${esc(w.title||'')}"></div>
    <div class="form-group"><label class="form-label">Créateur(s) *</label><div class="tag-input-wrap" id="sm-creators-wrap" onclick="document.getElementById('sm-creators-input').focus()"><input class="tag-input" id="sm-creators-input" placeholder="Ajouter..."></div></div>
    <div class="form-row">
      <div class="form-group"><label class="form-label">Année(s) *</label><input class="form-input" id="sm-years" value="${esc(w.year||'')}"></div>
      <div class="form-group"><label class="form-label">Statut *</label><select class="form-select" id="sm-status"><option value="">–</option><option value="encours">En cours</option><option value="terminee">Terminée</option><option value="annulee">Annulée</option></select></div>
    </div>
    <div class="form-group"><label class="form-label">Chaîne / Plateforme *</label><div class="tag-input-wrap" id="sm-platforms-wrap" style="position:relative" onclick="document.getElementById('sm-platforms-input').focus()"><input class="tag-input" id="sm-platforms-input" placeholder="Netflix..."></div></div>
    <div class="form-group"><label class="form-label">Pays *</label><div class="tag-input-wrap" id="sm-countries-wrap" onclick="document.getElementById('sm-countries-input').focus()"><input class="tag-input" id="sm-countries-input" placeholder="Ajouter..."></div></div>
    <div class="form-group"><label class="form-label">Genre(s) <small style="color:var(--text-dim)">(optionnel)</small></label><div class="tag-input-wrap" id="sm-genres-wrap" onclick="document.getElementById('sm-genres-input').focus()"><input class="tag-input" id="sm-genres-input" placeholder="Ajouter..."></div></div>
    <div class="form-group"><label class="form-label">Durée moy. épisode (min) *</label><input class="form-input" id="sm-dur" type="number"></div>
    <div class="form-group"><label class="form-label">Saisons & Épisodes *</label><div id="fm-seasons-editor"></div></div>
  `,()=>{
    const title=document.getElementById('sm-title').value.trim();
    const years=document.getElementById('sm-years').value.trim();
    const status=document.getElementById('sm-status').value;
    const epDur=document.getElementById('sm-dur').value.trim();
    let valid=true;
    if(!title){ document.getElementById('sm-title').classList.add('invalid'); valid=false; }
    if(creators.length===0){ document.getElementById('sm-creators-wrap').classList.add('invalid'); valid=false; }
    if(!years){ document.getElementById('sm-years').classList.add('invalid'); valid=false; }
    if(!status){ document.getElementById('sm-status').classList.add('invalid'); valid=false; }
    if(platforms.length===0){ document.getElementById('sm-platforms-wrap').classList.add('invalid'); valid=false; }
    if(countries.length===0){ document.getElementById('sm-countries-wrap').classList.add('invalid'); valid=false; }
    if(!epDur){ document.getElementById('sm-dur').classList.add('invalid'); valid=false; }
    const totalEps=seasons.reduce((a,sn)=>a+sn.episodes.length,0);
    if(totalEps===0){ alert('La série doit avoir au moins un épisode.'); valid=false; }
    if(!valid) return false;
    const poster=window._capturedPoster||'';
    const cleanSeasons = seasons.map(sn=>({name:sn.name||'', episodes:sn.episodes.map(ep=>({seen:false,title:ep.title||'',airdate:ep.airdate||''}))}));
    DB.series.push({id:uid(),title,creators:[...creators],countries:[...countries],platforms:[...platforms],genres:[...genres],years,status,episodeDuration:parseInt(epDur),seasons:cleanSeasons,poster,abandoned:false,lastInteracted:0,tmdbId});
    window._wlPendingConvert = null;
    saveDB(); closeModal(); render('series');
  });
  renderTags('sm-creators-wrap',creators,'sm-creators-input');
  renderTags('sm-countries-wrap',countries,'sm-countries-input');
  renderTags('sm-platforms-wrap',platforms,'sm-platforms-input');
  renderTags('sm-genres-wrap',genres,'sm-genres-input');
  setupTagInput('sm-creators-input','sm-creators-wrap',creators);
  setupTagInput('sm-countries-input','sm-countries-wrap',countries);
  setupTagInputWithAutocomplete('sm-platforms-input','sm-platforms-wrap',platforms,knownPlatforms);
  setupTagInputWithAutocomplete('sm-genres-input','sm-genres-wrap',genres,knownGenres);
  rse();

  // If this watchlist entry was added via TMDB search, fetch the full series
  // details AND every season's episodes right away — the whole point of
  // having searched TMDB in the watchlist is to avoid re-doing this by hand.
  if(w.tmdbId) {
    (async () => {
      try {
        const details = await tmdbSeriesDetails(w.tmdbId);
        document.getElementById('sm-status').value = details.status;
        if(details.episodeDuration) document.getElementById('sm-dur').value = details.episodeDuration;
        if(details.countries.length){ countries.length=0; details.countries.forEach(c=>countries.push(c)); renderTags('sm-countries-wrap',countries,'sm-countries-input'); }
        if(details.platforms.length){ platforms.length=0; details.platforms.forEach(p=>platforms.push(p)); renderTags('sm-platforms-wrap',platforms,'sm-platforms-input'); }
        if(details.genres?.length){ genres.length=0; details.genres.forEach(g=>genres.push(g)); renderTags('sm-genres-wrap',genres,'sm-genres-input'); }

        const banner = document.getElementById('wl2s-banner');
        if(banner) banner.textContent = `✓ Récupération des saisons (0/${details.seasonNumbers.length})...`;
        const fetchedSeasons = await tmdbFetchAllSeasons(details.tmdbId, details.seasonNumbers, (done,total)=>{
          const b = document.getElementById('wl2s-banner');
          if(b) b.textContent = `✓ Récupération des saisons (${done}/${total})...`;
        });
        seasons.length = 0;
        fetchedSeasons.forEach(sn=>seasons.push(sn));
        rse();
        if(banner) banner.textContent = '✓ Série, saisons et épisodes récupérés depuis TMDB — vérifiez avant d\'enregistrer.';
      } catch(e) {
        const banner = document.getElementById('wl2s-banner');
        if(banner) banner.textContent = '✓ Série déplacée depuis la watchlist (récupération TMDB indisponible — complétez manuellement).';
      }
    })();
  }
}

function wrappedPage(el, actions) {
  const now = new Date();
  const currentYear = now.getFullYear();
  // Available only from Dec 31 onward for the current year's recap generation,
  // but past saved wrappeds remain viewable any time.
  const canGenerateToday = (now.getMonth()===11 && now.getDate()===31);

  let viewingYear = null; // null = list view

  function draw() {
    if(viewingYear !== null) { drawSingleWrapped(viewingYear); return; }
    drawList();
  }

  function drawList() {
    actions.innerHTML = '';
    const saved = [...(DB.wrappeds||[])].sort((a,b)=>b.year-a.year);
    const hasCurrentYearData = watchLogForYear(currentYear).length > 0;
    const alreadyGenerated = saved.some(w=>w.year===currentYear);

    el.innerHTML = `
    <div class="film-strip" style="margin-bottom:20px"></div>
    ${canGenerateToday && hasCurrentYearData && !alreadyGenerated ? `
      <div class="card" style="margin-bottom:20px;border-color:var(--gold-dim)">
        <div class="card-title">🎁 Votre bilan ${currentYear} est prêt !</div>
        <div style="color:var(--text-dim);font-size:13px;margin-bottom:14px">Générez votre bilan annuel maintenant. Les données de visionnage de l'année seront ensuite réinitialisées pour ${currentYear+1}.</div>
        <button class="btn btn-primary" onclick="generateWrapped(${currentYear})">✨ Générer mon bilan ${currentYear}</button>
      </div>` : ''}
    ${saved.length===0 ? `
      <div style="text-align:center;padding:80px 20px;color:var(--text-dim)">
        <div style="font-size:48px;margin-bottom:16px">🎁</div>
        <div style="font-size:17px;margin-bottom:8px;color:var(--text)">Aucun bilan pour le moment</div>
        <div style="font-size:14px">Le prochain sera disponible le 31 décembre.</div>
      </div>
    ` : `
      <div class="card-title" style="font-size:16px;margin-bottom:14px">📚 Bilans disponibles</div>
      <div style="display:flex;flex-direction:column;gap:10px">
        ${saved.map(w=>`
          <div class="saga-header-row" onclick="viewWrapped(${w.year})" style="cursor:pointer">
            <div>
              <div style="font-family:var(--font-display);font-size:17px;color:var(--gold)">Bilan annuel ${w.year}</div>
              <div style="font-size:12px;color:var(--text-dim);margin-top:2px">${w.data.filmCount} film(s) • ${w.data.totalEpisodesThisYear} épisode(s) • généré le ${new Date(w.generatedAt).toLocaleDateString('fr-FR')}</div>
            </div>
            <span style="color:var(--gold)">▶</span>
          </div>
        `).join('')}
      </div>
      ${!alreadyGenerated ? `<div style="text-align:center;padding:20px;color:var(--text-dim);font-size:13px;margin-top:10px">Le prochain bilan sera disponible le 31 décembre.</div>` : ''}
    `}`;
  }

  function drawSingleWrapped(year) {
    const saved = (DB.wrappeds||[]).find(w=>w.year===year);
    if(!saved) { viewingYear=null; drawList(); return; }
    actions.innerHTML = `<button class="btn btn-secondary" onclick="backToWrappedList()">← Retour</button>`;
    el.innerHTML = renderWrappedReport(saved.data, saved.narrative);
  }

  window.viewWrapped = (year)=>{ viewingYear=year; draw(); };
  window.backToWrappedList = ()=>{ viewingYear=null; draw(); };
  window.generateWrapped = (year)=>{
    const data = buildWrappedData(year);
    if(!data){ alert("Pas assez de données pour générer un bilan cette année."); return; }
    const narrative = buildWrappedNarrative(data);
    if(!confirm(`Générer le bilan ${year} ? Seuls les visionnages enregistrés jusqu'à maintenant seront inclus — tout ce que vous marquerez comme vu après cette génération comptera pour le bilan ${year+1} (vos films/séries eux-mêmes restent intacts, seules les dates de visionnage de ${year} sont réinitialisées).`)) return;
    DB.wrappeds.push({ year, generatedAt: new Date().toISOString(), data, narrative });
    // Reset only this year's watch log entries — never touches films/series/sagas data.
    DB.watchLog = DB.watchLog.filter(e=>new Date(e.date).getFullYear() !== year);
    saveDB();
    startWrappedReveal(data, narrative);
  };

  window._wrappedPageDraw = draw;
  draw();
}

function statPill(label, value) {
  if(value===null || value===undefined || value==='') return '';
  return `<div class="stat-card"><div class="stat-val" style="font-size:22px">${value}</div><div class="stat-label">${esc(label)}</div></div>`;
}

function wrappedSection(title, innerHTML) {
  if(!innerHTML || !innerHTML.trim()) return '';
  return `<div class="card" style="margin-bottom:16px">
    <div class="card-title">${title}</div>
    ${innerHTML}
  </div>`;
}

// Builds the wrapped content as a list of {html} slides — the opening hero
// card and the closing statement are returned separately since they bookend
// the animated slideshow rather than being slides themselves.
function buildWrappedSlides(d, narrative) {
  const heroHTML = `
    <div style="text-align:center;padding:30px 20px;margin-bottom:24px;background:linear-gradient(135deg, var(--surface2), var(--surface3));border-radius:var(--radius-lg);border:1px solid var(--gold-dim)">
      <div style="font-size:13px;letter-spacing:3px;text-transform:uppercase;color:var(--gold-dim);margin-bottom:6px">CinéTV</div>
      <div style="font-family:var(--font-display);font-size:32px;color:var(--gold);margin-bottom:14px">Bilan annuel ${d.year}</div>
      ${narrative.opening ? `<div style="font-size:15px;color:var(--text);max-width:560px;margin:0 auto;font-style:italic">"${esc(narrative.opening)}"</div>` : ''}
    </div>
  `;

  const slides = [];

  // ---- 1) Intro — chiffre global ----
  let introHTML = `<div style="text-align:center;padding:10px 0 20px">
    <div style="font-family:var(--font-display);font-size:52px;color:var(--gold);line-height:1">${d.filmCount + d.seriesCount}</div>
    <div style="font-size:14px;color:var(--text-dim);margin-top:6px;letter-spacing:1px;text-transform:uppercase">œuvres cette année</div>
    <div style="font-size:28px;color:var(--text);margin-top:18px;font-family:var(--font-display)">${fmtDuration(d.totalMin)}</div>
    <div style="font-size:13px;color:var(--text-dim);margin-top:4px">de visionnage</div>
  </div>
  <div style="display:flex;gap:0;margin-top:16px;border-radius:8px;overflow:hidden;height:10px">
    <div style="background:var(--gold);width:${d.filmPct}%;transition:width .5s"></div>
    <div style="background:var(--surface3);flex:1"></div>
  </div>
  <div style="display:flex;justify-content:space-between;font-size:12px;color:var(--text-dim);margin-top:6px">
    <span>🎬 Films ${d.filmPct}%</span>
    <span>📺 Séries ${d.seriesPct}%</span>
  </div>`;
  slides.push(wrappedSection('✨ Ton année en un coup d\'œil', introHTML));

  // ---- 2) Films ----
  if(d.filmCount > 0) {
    let filmsHTML = `<div class="stats-grid" style="display:grid;grid-template-columns:repeat(auto-fit,minmax(120px,1fr));gap:12px;margin-bottom:16px">`;
    filmsHTML += statPill('Films vus', d.filmCount);
    filmsHTML += statPill('Durée totale', fmtDuration(d.filmTotalMin));
    filmsHTML += `</div>`;

    // Réalisateur fétiche
    if(d.topDirectors.length) {
      filmsHTML += `<div style="padding:12px 14px;background:var(--surface2);border-left:3px solid var(--gold);border-radius:6px;margin-bottom:10px">
        <div style="font-size:11px;color:var(--text-dim);text-transform:uppercase;letter-spacing:1px;margin-bottom:4px">Réalisateur fétiche</div>
        <div style="font-size:16px;font-weight:600;color:var(--gold)">${d.topDirectors.map(esc).join(', ')}</div>
        <div style="font-size:12px;color:var(--text-dim);margin-top:2px">${d.topDirCountValue} film${d.topDirCountValue>1?'s':''} cette année</div>
      </div>`;
    }

    // Genre dominant films
    if(d.dominantGenre) {
      filmsHTML += `<div style="padding:12px 14px;background:var(--surface2);border-left:3px solid var(--gold-dim);border-radius:6px;margin-bottom:10px">
        <div style="font-size:11px;color:var(--text-dim);text-transform:uppercase;letter-spacing:1px;margin-bottom:4px">Genre dominant</div>
        <div style="font-size:16px;font-weight:600">${esc(d.dominantGenre)}</div>
      </div>`;
    }

    // Film le plus long / plus court
    if(d.longestFilm || d.shortestFilm) {
      filmsHTML += `<div style="display:grid;grid-template-columns:1fr 1fr;gap:8px;margin-top:4px">`;
      if(d.longestFilm) filmsHTML += `<div style="padding:10px 12px;background:var(--surface2);border-radius:6px;font-size:12px">
        <div style="color:var(--text-dim);margin-bottom:3px">⏳ Le plus long</div>
        <div style="font-weight:600;white-space:nowrap;overflow:hidden;text-overflow:ellipsis">${esc(d.longestFilm.title)}</div>
        <div style="color:var(--gold)">${fmtH(parseInt(d.longestFilm.duration)||0)}</div>
      </div>`;
      if(d.shortestFilm) filmsHTML += `<div style="padding:10px 12px;background:var(--surface2);border-radius:6px;font-size:12px">
        <div style="color:var(--text-dim);margin-bottom:3px">⚡ Le plus court</div>
        <div style="font-weight:600;white-space:nowrap;overflow:hidden;text-overflow:ellipsis">${esc(d.shortestFilm.title)}</div>
        <div style="color:var(--gold)">${fmtH(parseInt(d.shortestFilm.duration)||0)}</div>
      </div>`;
      filmsHTML += `</div>`;
    }
    slides.push(wrappedSection('🎬 Films', filmsHTML));
  }

  // ---- 3) Séries ----
  if(d.seriesCount > 0) {
    let seriesHTML = `<div class="stats-grid" style="display:grid;grid-template-columns:repeat(auto-fit,minmax(120px,1fr));gap:12px;margin-bottom:16px">`;
    seriesHTML += statPill('Séries suivies', d.seriesCount);
    seriesHTML += statPill('Épisodes vus', d.totalEpisodesThisYear);
    seriesHTML += statPill('Durée totale', fmtDuration(d.totalEpisodeMin));
    seriesHTML += `</div>`;

    // Série #1 en épisodes
    if(d.mostWatchedSerieByEps) {
      seriesHTML += `<div style="padding:12px 14px;background:var(--surface2);border-left:3px solid var(--gold);border-radius:6px;margin-bottom:10px">
        <div style="font-size:11px;color:var(--text-dim);text-transform:uppercase;letter-spacing:1px;margin-bottom:4px">La plus regardée (épisodes)</div>
        <div style="font-size:16px;font-weight:600;color:var(--gold)">${esc(d.mostWatchedSerieByEps.title)}</div>
        <div style="font-size:12px;color:var(--text-dim);margin-top:2px">${d.mostWatchedSerieByEpsCount} épisode${d.mostWatchedSerieByEpsCount>1?'s':''}</div>
      </div>`;
    }

    // Série #1 en durée (si différente)
    if(d.mostWatchedSerieByMin && (!d.mostWatchedSerieByEps || d.mostWatchedSerieByMin.id !== d.mostWatchedSerieByEps.id)) {
      seriesHTML += `<div style="padding:12px 14px;background:var(--surface2);border-left:3px solid var(--gold-dim);border-radius:6px;margin-bottom:10px">
        <div style="font-size:11px;color:var(--text-dim);text-transform:uppercase;letter-spacing:1px;margin-bottom:4px">La plus regardée (durée)</div>
        <div style="font-size:16px;font-weight:600">${esc(d.mostWatchedSerieByMin.title)}</div>
        <div style="font-size:12px;color:var(--text-dim);margin-top:2px">${fmtDuration(d.mostWatchedSerieByMinVal)}</div>
      </div>`;
    }

    // Barres de progression pour toutes les séries vues
    if(d.seriesWatchedThisYear && d.seriesWatchedThisYear.length) {
      const maxEps = d.seriesWatchedThisYear[0].eps;
      seriesHTML += `<div style="display:flex;flex-direction:column;gap:10px;margin-top:8px">`;
      d.seriesWatchedThisYear.forEach(({title, eps}) => {
        const pct = maxEps ? Math.round(eps/maxEps*100) : 0;
        seriesHTML += `<div>
          <div style="display:flex;justify-content:space-between;font-size:13px;margin-bottom:3px">
            <span style="white-space:nowrap;overflow:hidden;text-overflow:ellipsis;max-width:75%">${esc(title)}</span>
            <span style="color:var(--text-dim);flex-shrink:0">${eps} ép.</span>
          </div>
          <div class="progress-bar"><div class="progress-fill gold" style="width:${pct}%"></div></div>
        </div>`;
      });
      seriesHTML += `</div>`;
    }

    slides.push(wrappedSection('📺 Séries', seriesHTML));
  }

  // ---- 4) Sagas ----
  if(d.sagasTouchedCount > 0) {
    let sagaHTML = `<div class="stats-grid" style="display:grid;grid-template-columns:repeat(auto-fit,minmax(120px,1fr));gap:12px;margin-bottom:14px">`;
    sagaHTML += statPill('Sagas vues', d.sagasTouchedCount);
    sagaHTML += statPill('Complétées', d.sagasCompletedCount);
    sagaHTML += `</div>`;
    if(d.biggestSaga) sagaHTML += `<div style="padding:12px 14px;background:var(--surface2);border-left:3px solid var(--gold);border-radius:6px;margin-bottom:8px">
      <div style="font-size:11px;color:var(--text-dim);text-transform:uppercase;letter-spacing:1px;margin-bottom:4px">Plus grande saga vue</div>
      <div style="font-size:15px;font-weight:600">${sagaLabel(d.biggestSaga)} ${esc(d.biggestSaga.name)}</div>
      <div style="font-size:12px;color:var(--text-dim);margin-top:2px">${sagaFilmCount(d.biggestSaga)} films</div>
    </div>`;
    if(d.mostTimeSaga) sagaHTML += `<div style="padding:12px 14px;background:var(--surface2);border-left:3px solid var(--gold-dim);border-radius:6px">
      <div style="font-size:11px;color:var(--text-dim);text-transform:uppercase;letter-spacing:1px;margin-bottom:4px">Saga la plus consommée</div>
      <div style="font-size:15px;font-weight:600">${sagaLabel(d.mostTimeSaga)} ${esc(d.mostTimeSaga.name)}</div>
      <div style="font-size:12px;color:var(--text-dim);margin-top:2px">${fmtDuration(d.mostTimeSagaMin)}</div>
    </div>`;
    slides.push(wrappedSection('🎞️ Sagas', sagaHTML));
  }

  // ---- 5) Mois le plus actif ----
  if(d.maxMonth !== null) {
    let moisHTML = `<div style="text-align:center;padding:16px 0">
      <div style="font-size:13px;color:var(--text-dim);text-transform:uppercase;letter-spacing:1px;margin-bottom:8px">Ton mois le plus actif</div>
      <div style="font-family:var(--font-display);font-size:36px;color:var(--gold)">${MONTH_NAMES_FR[d.maxMonth]}</div>
      <div style="font-size:14px;color:var(--text-dim);margin-top:8px">${d.peakMonthShare}% de ton visionnage annuel</div>
    </div>`;
    slides.push(wrappedSection('📅 Rythme', moisHTML));
  }

  // ---- 6) Insights & faits marquants ----
  const allNotes = [...(narrative.insights||[]), ...(narrative.highlights||[])];
  if(allNotes.length) {
    let notesHTML = `<div style="display:flex;flex-direction:column;gap:10px">`;
    allNotes.forEach((n, i) => {
      const isHighlight = i >= (narrative.insights||[]).length;
      notesHTML += `<div style="padding:10px 14px;background:${isHighlight?'rgba(232,196,106,.08)':'var(--surface2)'};border-left:3px solid ${isHighlight?'var(--gold)':'var(--gold-dim)'};border-radius:6px;font-size:13px">${isHighlight?'⭐ ':'💡 '}${esc(n)}</div>`;
    });
    notesHTML += `</div>`;
    slides.push(wrappedSection('💡 Le saviez-vous ?', notesHTML));
  }

  const closingHTML = narrative.closing ? `
    <div style="text-align:center;padding:26px 20px;margin-top:8px;background:var(--surface2);border-radius:var(--radius-lg);border:1px solid var(--border)">
      <div style="font-family:var(--font-display);font-size:18px;color:var(--gold);font-style:italic">"${esc(narrative.closing)}"</div>
    </div>
  ` : '';

  return { heroHTML, slides, closingHTML };
}



// Static full report (used when re-consulting a past bilan) — same content
// as the slideshow, just all stitched together on one scrollable page.
function renderWrappedReport(d, narrative) {
  const { heroHTML, slides, closingHTML } = buildWrappedSlides(d, narrative);
  return heroHTML + slides.join('') + closingHTML;
}

// ============================================================
// WRAPPED REVEAL ANIMATION — shown once, right after generating a new
// bilan, presenting the hero card then each slide one at a time with
// Précédent/Suivant navigation and a fade/slide transition between them.
// The final "page" is the full static report (renderWrappedReport),
// exactly what gets saved and re-shown when revisiting past bilans.
// ============================================================
function startWrappedReveal(d, narrative, onClose) {
  const { heroHTML, slides, closingHTML } = buildWrappedSlides(d, narrative);
  // The reveal sequence: hero card, then each stat slide, then the closing
  // statement, then finally the full static report as the "landing" page.
  const sequence = [heroHTML, ...slides, closingHTML].filter(Boolean);
  let idx = 0;

  const overlay = document.createElement('div');
  overlay.id = 'wrapped-reveal-overlay';
  overlay.innerHTML = `
    <div id="wrapped-reveal-card">
      <div id="wrapped-reveal-content"></div>
      <div id="wrapped-reveal-nav">
        <button class="btn btn-secondary btn-sm" id="wrapped-reveal-prev">← Précédent</button>
        <div id="wrapped-reveal-dots"></div>
        <button class="btn btn-primary btn-sm" id="wrapped-reveal-next">Suivant →</button>
      </div>
      <button class="btn btn-secondary btn-sm" id="wrapped-reveal-skip">Passer au bilan complet</button>
    </div>
  `;
  document.body.appendChild(overlay);

  const contentEl = overlay.querySelector('#wrapped-reveal-content');
  const dotsEl = overlay.querySelector('#wrapped-reveal-dots');
  const prevBtn = overlay.querySelector('#wrapped-reveal-prev');
  const nextBtn = overlay.querySelector('#wrapped-reveal-next');
  const skipBtn = overlay.querySelector('#wrapped-reveal-skip');

  dotsEl.innerHTML = sequence.map((_,i)=>`<span class="wrapped-dot" data-i="${i}"></span>`).join('');

  function renderSlide(direction) {
    contentEl.classList.remove('slide-in-left','slide-in-right');
    contentEl.innerHTML = sequence[idx];
    void contentEl.offsetWidth; // force reflow so the animation class re-triggers
    contentEl.classList.add(direction==='back' ? 'slide-in-left' : 'slide-in-right');

    prevBtn.style.visibility = idx===0 ? 'hidden' : 'visible';
    const isLast = idx===sequence.length-1;
    nextBtn.textContent = isLast ? '✓ Terminer' : 'Suivant →';
    dotsEl.querySelectorAll('.wrapped-dot').forEach((dot,i)=>dot.classList.toggle('active', i===idx));
  }

  prevBtn.addEventListener('click', ()=>{ if(idx>0){ idx--; renderSlide('back'); } });
  nextBtn.addEventListener('click', ()=>{
    if(idx<sequence.length-1){ idx++; renderSlide('forward'); }
    else closeWrappedReveal();
  });
  skipBtn.addEventListener('click', closeWrappedReveal);

  function closeWrappedReveal() {
    overlay.remove();
    if(onClose) { onClose(); return; }
    // Default behavior (real bilan generation): land on the saved,
    // scrollable full report — same content shown when revisiting later.
    const cur = document.querySelector('.nav-item.active')?.dataset.page;
    if(cur==='wrapped' && window._wrappedPageDraw) window._wrappedPageDraw();
  }

  renderSlide('forward');
}

function manualGenerateWrapped() {
  const year = parseInt(document.getElementById('manual-wrapped-year').value);
  const log = document.getElementById('manual-wrapped-log');
  if(!year){ log.innerHTML = '<span style="color:var(--red)">Année invalide.</span>'; return; }
  const data = buildWrappedData(year);
  if(!data){ log.innerHTML = `<span style="color:var(--red)">Aucune donnée de visionnage enregistrée pour ${year}.</span>`; return; }
  const narrative = buildWrappedNarrative(data);
  // Pure preview: does NOT touch DB.watchLog and does NOT save into DB.wrappeds.
  // This lets you check the report looks right without consuming the year's
  // data — the real bilan still gets generated normally on Dec 31, complete.
  log.innerHTML = `<span style="color:var(--green)">✓ Aperçu généré — animation lancée ci-dessous, exactement comme pour un vrai bilan.</span>`;
  window._previewWrappedYear = year;
  window._previewWrappedData = data;
  window._previewWrappedNarrative = narrative;
  // Same reveal animation as the real Dec 31 bilan; once finished (or skipped),
  // land on the same static, scrollable preview modal as before — so the test
  // tool shows the full real experience end to end: animation, then full report.
  startWrappedReveal(data, narrative, () => renderWrappedPreviewModal(year, data, narrative));
}

function renderWrappedPreviewModal(year, data, narrative) {
  document.getElementById('modal-container').innerHTML = `
  <div class="modal-overlay" id="modal-overlay" onclick="if(event.target.id==='modal-overlay')closeModal()">
    <div class="modal" style="max-width:780px">
      <div class="modal-header">
        <div class="modal-title">🔍 Aperçu — Bilan ${year} (non enregistré)</div>
        <button class="close-btn" onclick="closeModal()">✕</button>
      </div>
      <div class="modal-body">
        <div style="background:rgba(232,196,106,.08);border:1px solid rgba(232,196,106,.2);border-radius:8px;padding:10px 14px;margin-bottom:16px;font-size:13px;color:var(--gold)">
          Aperçu uniquement — vos dates de visionnage ${year} restent intactes. Le vrai bilan sera généré normalement le 31 décembre avec toutes les données de l'année.
        </div>
        ${renderWrappedReport(data, narrative)}
      </div>
      <div class="modal-footer">
        <button class="btn btn-secondary" onclick="closeModal()">Fermer</button>
      </div>
    </div>
  </div>`;
}

// Retroactively fetch genres for films/series that don't have any yet.
// Sequential requests (one title lookup per item) with a visible progress log,
// so the person can see it's working without hammering TMDB all at once.
async function backfillInfo(kind) {
  const log = document.getElementById('genre-backfill-log');
  const items = kind==='films' ? DB.films : DB.series;

  if(!items.length) { log.innerHTML = `<span style="color:var(--text-dim)">Aucun ${kind==='films'?'film':'série'} enregistré.</span>`; return; }

  let done=0, found=0, notFound=0;
  const conflicts = []; // {item, field, oldVal, newVal} — collected, asked about once at the end
  log.innerHTML = `<div class="tmdb-progress">0 / ${items.length} traité(s)...</div>`;

  for(const item of items) {
    try {
      const names = kind==='films' ? parseNames(item.directors) : parseNames(item.creators);
      const details = kind==='films'
        ? await tmdbFetchFullMovieDetails(item.title, item.year, names)
        : await tmdbFetchFullSerieDetails(item.title, item.years, names);

      if(!details) { notFound++; done++; continue; }
      found++;

      // For each field: if empty locally, fill it directly. If it already has
      // a value AND TMDB disagrees, queue a conflict instead of overwriting.
      const checkField = (field, newVal, isList) => {
        if(newVal===undefined || newVal===null || (isList && !newVal.length) || (!isList && !newVal)) return;
        const curVal = item[field];
        const curEmpty = isList ? !parseNames(curVal).length : !curVal;
        if(curEmpty) {
          item[field] = newVal;
        } else {
          const curStr = isList ? joinNames(parseNames(curVal)) : String(curVal);
          const newStr = isList ? joinNames(newVal) : String(newVal);
          if(curStr.toLowerCase().trim() !== newStr.toLowerCase().trim()) {
            conflicts.push({item, field, oldVal: curStr, newVal, newStr});
          }
        }
      };

      if(kind==='films') {
        checkField('countries', details.countries, true);
        checkField('duration', details.duration, false);
        checkField('genres', details.genres, true);
      } else {
        checkField('countries', details.countries, true);
        checkField('platforms', details.platforms, true);
        checkField('episodeDuration', details.episodeDuration, false);
        checkField('genres', details.genres, true);
      }
    } catch(e) { notFound++; }
    done++;
    log.innerHTML = `<div class="tmdb-progress">${done} / ${items.length} traité(s) — ${found} trouvé(s), ${notFound} non trouvé(s)</div>`;
    saveDB();
  }

  let applyAllApplied = false;
  if(conflicts.length) {
    log.innerHTML = `<span style="color:var(--gold)">${conflicts.length} différence(s) trouvée(s) entre vos données et TMDB.</span>`;
    const applyAll = confirm(
      `TMDB a trouvé ${conflicts.length} information(s) différente(s) de ce qui est déjà enregistré (ex: ${conflicts.slice(0,3).map(c=>`${c.field} de "${c.item.title}": "${c.oldVal}" → "${c.newStr}"`).join(' ; ')}${conflicts.length>3?'...':''}).\n\n` +
      `Cliquez OK pour remplacer ces valeurs par celles de TMDB, ou Annuler pour garder vos données actuelles inchangées (seuls les champs vides ont été complétés).`
    );
    if(applyAll) {
      conflicts.forEach(c=>{ c.item[c.field] = c.newVal; });
      saveDB();
      applyAllApplied = true;
    }
  }

  log.innerHTML = `<span style="color:var(--green)">✓ Terminé : ${found} trouvé(s) sur TMDB, ${notFound} non trouvé(s)${conflicts.length?`, ${conflicts.length} différence(s) ${applyAllApplied?'appliquée(s)':'ignorée(s)'}`:''}.</span>`;
  const cur = document.querySelector('.nav-item.active')?.dataset.page;
  if(cur==='dashboard') render('dashboard');
}

function setupDrop(dropId,inputId,handler){
  const drop=document.getElementById(dropId); if(!drop) return;
  drop.addEventListener('dragover',e=>{e.preventDefault();drop.style.borderColor='var(--gold)';});
  drop.addEventListener('dragleave',()=>{drop.style.borderColor='';});
  drop.addEventListener('drop',e=>{e.preventDefault();drop.style.borderColor='';const f=e.dataTransfer.files[0];if(f)handler(f);});
}
function importFilms(input){if(input.files[0])importFilmsFromFile(input.files[0]);}
function importSeries(input){if(input.files[0])importSeriesFromFile(input.files[0]);}

function readXLSX(file,cb){
  const reader=new FileReader();
  reader.onload=e=>{
    const wb=XLSX.read(e.target.result,{type:'binary'});
    const ws=wb.Sheets[wb.SheetNames[0]];
    const data=XLSX.utils.sheet_to_json(ws,{header:1,defval:''});
    cb(data);
  };
  reader.readAsBinaryString(file);
}

function importFilmsFromFile(file){
  const log=document.getElementById('film-import-log');
  log.innerHTML='<span style="color:var(--text-dim)">Lecture...</span>';
  readXLSX(file,rows=>{
    let added=0,skipped=0;
    const dataRows=rows.filter(r=>r.some(c=>String(c).trim()));
    const start=(String(dataRows[0]?.[0])||'').toLowerCase().includes('titre')?1:0;
    for(let i=start;i<dataRows.length;i++){
      const [title,director,year,country,duration]=dataRows[i];
      const t=String(title||'').trim(); if(!t){skipped++;continue;}
      DB.films.push({id:uid(),title:t,directors:parseNames(String(director||'')),year:String(year||'').trim(),countries:parseNames(String(country||'')),genres:[],duration:parseInt(duration)||0,notes:'',poster:''});
      added++;
    }
    saveDB();
    log.innerHTML=`<span style="color:var(--green)">✓ ${added} film(s) importé(s)</span>${skipped?` <span style="color:var(--text-dim)">(${skipped} ignorée(s))</span>`:''}`;
  });
}

function importSeriesFromFile(file){
  const log=document.getElementById('serie-import-log');
  log.innerHTML='<span style="color:var(--text-dim)">Lecture...</span>';
  readXLSX(file,rows=>{
    let queue=[];
    const dataRows=rows.filter(r=>r.some(c=>String(c).trim()));
    const start=(String(dataRows[0]?.[0])||'').toLowerCase().includes('titre')?1:0;
    for(let i=start;i<dataRows.length;i++){
      const [title,creator,years,platform,country,nbSeasons,nbEpisodes,epDur,status]=dataRows[i];
      const t=String(title||'').trim(); if(!t) continue;
      queue.push({id:uid(),title:t,creators:parseNames(String(creator||'')),years:String(years||'').trim(),platforms:parseNames(String(platform||'')),countries:parseNames(String(country||'')),genres:[],nbSeasons:parseInt(nbSeasons)||1,nbEpisodes:parseInt(nbEpisodes)||0,episodeDuration:parseInt(epDur)||0,status:normalizeStatus(String(status||'')),seasons:[],poster:'',abandoned:false,lastInteracted:0});
    }
    if(!queue.length){log.innerHTML='<span style="color:var(--red)">Aucune donnée.</span>';return;}
    log.innerHTML=`<span style="color:var(--text-dim)">${queue.length} série(s) à configurer...</span>`;
    processSerieQueue(queue,0,log);
  });
}

function processSerieQueue(queue,idx,log){
  if(idx>=queue.length){queue.forEach(s=>DB.series.push(s));saveDB();log.innerHTML=`<span style="color:var(--green)">✓ ${queue.length} série(s) importée(s)</span>`;return;}
  const s=queue[idx];
  if(s.nbSeasons===1){s.seasons=[{name:'',episodes:Array(s.nbEpisodes).fill(null).map(()=>({seen:false,title:'',airdate:''}))}];processSerieQueue(queue,idx+1,log);return;}
  openSeasonDistribModal(s,()=>processSerieQueue(queue,idx+1,log));
}

function openSeasonDistribModal(s,onDone){
  let inputs=[];
  function renderInputs(){
    const wrap=document.getElementById('sd-inputs'); if(!wrap) return;
    wrap.innerHTML=inputs.map((v,i)=>`
      <div style="display:flex;align-items:center;gap:10px;margin-bottom:8px">
        <span style="width:80px;font-size:13px">Saison ${i+1}</span>
        <input type="number" min="0" class="form-input" style="width:100px;padding:7px 10px" value="${v}" data-si="${i}" oninput="updateSDInput(${i},this.value)">
        <span style="font-size:12px;color:var(--text-dim)">épisodes</span>
      </div>`).join('')+`<div id="sd-total-check" style="font-size:13px;margin-top:8px"></div>`;
    updateSDCheck();
  }
  window.updateSDInput=(i,v)=>{inputs[i]=parseInt(v)||0;updateSDCheck();};
  window.updateSDCheck=()=>{
    const total=inputs.reduce((a,b)=>a+b,0);
    const el=document.getElementById('sd-total-check'); if(!el) return;
    const ok=total===s.nbEpisodes;
    el.innerHTML=`Total : <b style="color:${ok?'var(--green)':'var(--red)'}">${total}/${s.nbEpisodes}</b> ${ok?'✓':'— doit correspondre'}`;
  };
  inputs=Array(s.nbSeasons).fill(0); if(s.nbSeasons>0) inputs[0]=s.nbEpisodes;
  createModal(`Configurer : ${s.title}`,`
    <div style="color:var(--text-dim);margin-bottom:14px;font-size:13px">Répartissez les <b style="color:var(--gold)">${s.nbEpisodes} épisodes</b> sur <b style="color:var(--gold)">${s.nbSeasons} saisons</b>.</div>
    <div id="sd-inputs"></div>

    const total=inputs.reduce((a,b)=>a+b,0);
    if(total!==s.nbEpisodes){alert(`Total (${total}) ≠ épisodes (${s.nbEpisodes}).`);return false;}
    s.seasons=inputs.map(n=>({name:'',episodes:Array(n).fill(null).map(()=>({seen:false,title:'',airdate:''}))}));
    closeModal(); onDone();
  },false);
  renderInputs();
}

function normalizeStatus(s){
  s=s.toLowerCase().trim();
  if(s.includes('cours')||s.includes('ongoing')||s.includes('running')) return 'encours';
  if(s.includes('annul')||s.includes('cancel')) return 'annulee';
  return 'terminee';
}
async function exportDB(){
  const json = JSON.stringify(DB,null,2);
  const filename = 'cinetv_backup.json';
  const blob = new Blob([json], {type:'application/json'});

  // On mobile, a plain <a download> click silently saves to the default
  // downloads folder with no confirmation dialog — surprising and easy to
  // lose track of. Where supported, use the native Web Share sheet instead:
  // it shows the OS's real "Enregistrer dans Fichiers / Partager" picker.
  if (navigator.canShare) {
    try {
      const file = new File([blob], filename, {type:'application/json'});
      if (navigator.canShare({ files:[file] })) {
        await navigator.share({ files:[file], title:'Sauvegarde CinéTV', text:'Export des données CinéTV' });
        return;
      }
    } catch(e) {
      // User cancelled the share sheet, or share failed — fall through to
      // the classic download link rather than leaving them with nothing.
      if (e && e.name === 'AbortError') return; // explicit cancel: do nothing further
    }
  }

  // Desktop / unsupported browsers: classic download link, which DOES show
  // a proper save dialog (or goes to Downloads, depending on browser settings).
  const a=document.createElement('a');
  a.href=URL.createObjectURL(blob);
  a.download=filename;
  a.click();
}
function restoreDB(input){if(!input.files[0]) return;if(!confirm('Remplacer toutes les données ?')) return;const r=new FileReader();r.onload=e=>{try{DB=JSON.parse(e.target.result);saveDB();alert('Données restaurées.');render('dashboard');}catch(ex){alert('Fichier invalide.');}};r.readAsText(input.files[0]);}
function clearDB(){if(!confirm('Effacer définitivement toutes les données ?')) return;DB={films:[],series:[],watchlist:[],sagas:[],watchLog:[],wrappeds:[]};saveDB();render('import');}

      <span style="width:1px;background:var(--border);margin:2px 4px"></span>

      ${Object.entries(typeFilterLabels).map(([k,l])=>`<button class="btn btn-xs ${typeFilter===k?'btn-primary':'btn-secondary'}" onclick="setSagaTypeFilter('${k}')">${l}</button>`).join('')}
    </div>
    ${!sagas.length ? `<div style="text-align:center;padding:60px 20px;color:var(--text-dim)">
        <div style="font-size:40px;margin-bottom:12px">🎞️</div>
        <div style="font-size:15px;margin-bottom:6px">Aucune saga ${search||typeFilter!=='all'?'trouvée':'créée'}</div>
        <div style="font-size:13px">${search||typeFilter!=='all'?'Essayez un autre filtre ou terme de recherche.':"Créez une saga ou ajoutez un film à une saga depuis le formulaire film."}</div>
      </div>` :
    `<div style="display:flex;flex-direction:column;gap:12px">${sagas.map(sg=>sagaCard(sg)).join('')}</div>`}`;

  const isOpen = window._openSagaCards.has(sg.id);

  const filmItems = films.map((sf,idx)=>{
    const seenFilm = DB.films.find(f=>f.id===sf.id);

    return `<div class="saga-film-row" id="sfrow-${sg.id}-${idx}">
      <div class="saga-film-poster">
        ${(seenFilm?.poster)||sf.poster ? `<img src="${(seenFilm?.poster)||sf.poster}" alt="">` : '🎬'}
      </div>

        <div class="saga-film-title">${esc(sf.title)} ${isSeen?'<span class="badge badge-green" style="font-size:10px">Vu</span>':'<span class="badge badge-gray" style="font-size:10px">Non vu</span>'}</div>

      </div>

function toggleSagaCard(id) {
  if(window._openSagaCards.has(id)) window._openSagaCards.delete(id);
  else window._openSagaCards.add(id);
  // Preserve the card's position on screen instead of letting the page jump to top
  const cardEl = document.getElementById('saga-'+id);
  const offsetBefore = cardEl ? cardEl.getBoundingClientRect().top : null;
  if(window._sagasPageDraw) window._sagasPageDraw();
  if(offsetBefore !== null) {
    const cardAfter = document.getElementById('saga-'+id);
    if(cardAfter) {
      const offsetAfter = cardAfter.getBoundingClientRect().top;
      const scrollContainer = document.getElementById('content');
      scrollContainer.scrollTop += (offsetAfter - offsetBefore);
    }
  }
}

function toggleSagaFilmSeen(sagaId, filmId) {
  const saga=(DB.sagas||[]).find(sg=>sg.id===sagaId); if(!saga) return;
  const sf=saga.films.find(f=>f.id===filmId); if(!sf) return;
  const existing = DB.films.find(f=>f.id===filmId);
  if(existing) {
    // Seen -> Non vu: remove from main films list
    if(!confirm(`Marquer "${sf.title}" comme non vu ? Il sera retiré de votre liste de films et des statistiques.`)) return;
    sf.title = existing.title; sf.year = existing.year; sf.directors = existing.directors;
    sf.countries = existing.countries; sf.duration = existing.duration; sf.poster = existing.poster;
    DB.films = DB.films.filter(f=>f.id!==filmId);
    sf.unseen = true;
    saveDB();

    // fields (pays, durée...) get completed before it enters the cinémathèque.
    openSagaFilmCompletionForm(sagaId, filmId);

}

window.handleModalSave=function(){
  const result=window._modalSave&&window._modalSave();
  if(result===false) return;
  if(window._modalAutoClose!==false) closeModal();
};
function overlayClick(e){if(e.target.id==='modal-overlay') cancelModal();}
function cancelModal(){
  restoreWatchlistIfPending();

  const originSerieId = window._serieDetailOrigin || null;

// If a saga was just created and the "add films" step is cancelled before any
// film was added, delete that saga — it should never exist with 0 films.
// Existing sagas are never touched by this (window._pendingNewSagaId is only
// set right after a brand-new saga creation, and cleared once a film is added).
function discardEmptyPendingSaga(){
  if(window._pendingNewSagaId){
    const sg = (DB.sagas||[]).find(x=>x.id===window._pendingNewSagaId);
    if(sg && (!sg.films || sg.films.length===0)){
      DB.sagas = DB.sagas.filter(x=>x.id!==window._pendingNewSagaId);
      saveDB();
    }
    window._pendingNewSagaId = null;
  }
}
