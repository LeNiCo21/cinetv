// Refresh a series from TMDB: re-fetches series-level info (status, years...)
// cheaply (1 call), then only fetches season data for seasons that are NEW
// (season count grew) or whose episode count on TMDB differs from what we
// have locally (mid-season episode drops). Seasons we already have fully
// matching episode counts are left untouched — this keeps the "seen" flags
// intact and avoids re-fetching saisons we already know about.
async function refreshSerieFromTmdb(sid) {
  const s = DB.series.find(x=>x.id===sid); if(!s || !s.tmdbId) return;
  const btn = event?.target;
  const originalHTML = btn ? btn.innerHTML : null;
  if(btn){ btn.disabled = true; btn.innerHTML = '⏳'; }
  try {
    const data = await tmdbFetch(`/tv/${s.tmdbId}`);
    const creators = (data.created_by||[]).map(c=>c.name);
    const platforms = (data.networks||[]).map(n=>n.name);
    const firstYear = data.first_air_date ? data.first_air_date.slice(0,4) : '';
    const lastYear = data.last_air_date ? data.last_air_date.slice(0,4) : '';
    const isOngoing = data.status === 'Returning Series' || data.in_production;
    let years = firstYear;
    if(isOngoing) years = firstYear ? `${firstYear}-...` : '';
    else if(lastYear && lastYear!==firstYear) years = `${firstYear}-${lastYear}`;
    let status = 'terminee';
    if(isOngoing) status = 'encours';
    else if(data.status === 'Canceled') status = 'annulee';
    const tmdbSeasonList = (data.seasons||[]).filter(sn=>sn.season_number>0);

    // Determine which seasons need fetching: new ones, or ones whose
    // episode_count on TMDB differs from what we currently have stored.
    const toFetch = [];
    tmdbSeasonList.forEach((tsn, idx) => {
      const local = s.seasons[idx];
      if(!local || (local.episodes||[]).length !== tsn.episode_count) {
        toFetch.push(tsn.season_number);
      }
    });

    let addedSeasons = 0, addedEpisodes = 0;
    if(toFetch.length) {
      for(const seasonNum of toFetch) {
        const sd = await tmdbSeasonDetails(s.tmdbId, seasonNum);
        const idx = seasonNum - 1;
        const existing = s.seasons[idx];
        const newEpisodes = sd.episodes.map((ep,ei)=>({
          seen: existing && existing.episodes[ei] ? existing.episodes[ei].seen : false,
          title: ep.title,
          airdate: ep.airdate
        }));
        if(!existing) { addedSeasons++; addedEpisodes += newEpisodes.length; }
        else if(newEpisodes.length > existing.episodes.length) { addedEpisodes += (newEpisodes.length - existing.episodes.length); }
        s.seasons[idx] = { name: sd.name, episodes: newEpisodes };
      }
    }

    s.creators = creators.length ? creators : s.creators;
    s.platforms = platforms.length ? platforms : s.platforms;
    s.years = years || s.years;
    s.status = status || s.status;
    saveDB();

    if(addedSeasons || addedEpisodes) {
      alert(`Série mise à jour : ${addedSeasons ? addedSeasons+' nouvelle(s) saison(s)' : ''}${addedSeasons&&addedEpisodes?', ':''}${addedEpisodes ? addedEpisodes+' nouvel(aux) épisode(s)' : ''}.`);
    } else {
      alert('Série déjà à jour — aucune nouveauté détectée sur TMDB.');
    }
    const cur = document.querySelector('.nav-item.active')?.dataset.page||'series';
    if(cur==='series'&&window._seriesPageDraw) window._seriesPageDraw();
    else render(cur);
  } catch(e) {
    alert('Erreur lors de la connexion à TMDB. Vérifiez votre connexion internet.');
    if(btn){ btn.disabled=false; btn.innerHTML = originalHTML; }
  }
}

function inlineMarkEpSeen(sid, si, ei) {
  const s = DB.series.find(x=>x.id===sid); if(!s) return;
  s.seasons[si].episodes[ei].seen = true;
  s.lastInteracted = Date.now(); _lastInteractedSerieId = sid;
  logWatch({type:'episode', serieId:sid, seasonIndex:si, episodeIndex:ei});
  saveDB();
  updateSerieRowProgress(sid);
  const bar = document.getElementById('next-ep-bar-'+sid);
  if(bar){
    const next = findNextEpisode(s);
    if(!next){
      bar.outerHTML = `<div style="font-size:11px;color:var(--green);margin-top:4px" id="next-ep-bar-${sid}">✓ Série complète</div>`;
    } else {
      const ep = s.seasons[next.si]?.episodes[next.ei];
      const label = ep?.title ? `S${next.s}E${next.e} — ${ep.title}` : `S${next.s}E${next.e}`;
      bar.innerHTML = `<span style="font-size:11px;color:var(--gold)">▶ ${esc(label)}</span>
        <button class="btn btn-primary btn-xs" onclick="event.stopPropagation();inlineMarkEpSeen('${sid}',${next.si},${next.ei})">✓ Vu</button>`;
    }
  }
}

function updateSerieRowProgress(sid){
  const s=DB.series.find(x=>x.id===sid); if(!s) return;
  const row=document.getElementById('srow-'+sid); if(!row) return;
  const seen=serieSeenEps(s), total=serieTotalEps(s);
  const pct=total?Math.round(seen/total*100):0;
  const pf=row.querySelector('.progress-fill');
  const pl=row.querySelector('.progress-bar + div');
  if(pf){pf.style.width=pct+'%'; pf.className='progress-fill '+(pct===100?'green':'gold');}
  if(pl) pl.textContent=`${seen}/${total} épisodes — ${pct}%`;
}

// ============================================================
// SEASONS TREE — persistent open/closed state per season (fix: clicking
// an episode no longer collapses the season, because we patch the DOM
// in place instead of rebuilding the whole tree HTML).
// ============================================================
const _openSeasons = new Set();

function seasonYearLabel(season) {
  const dates=(season.episodes||[]).map(e=>e.airdate).filter(Boolean);
  if(!dates.length) return '';
  const years=dates.map(d=>{ const m=String(d).match(/(\d{4})/); return m?m[1]:null; }).filter(Boolean);
  if(!years.length) return '';
  const minY=Math.min(...years.map(Number)), maxY=Math.max(...years.map(Number));
  return minY===maxY?` (${minY})`:` (${minY}-${maxY})`;
}
function fmtAirdate(d) {
  if(!d) return '';
  const iso=String(d).match(/^(\d{4})-(\d{2})-(\d{2})$/);
  if(iso){ const months=['jan.','fév.','mars','avr.','mai','juin','juil.','août','sep.','oct.','nov.','déc.']; return `${parseInt(iso[3])} ${months[parseInt(iso[2])-1]} ${iso[1]}`; }
  return d;
}

function seasonsTree(s) {
  if(!s.seasons||s.seasons.length===0) return '<div style="color:var(--text-dim);font-size:13px">Aucune saison configurée.</div>';
  return s.seasons.map((season,si)=>{
    const key = `${s.id}-${si}`;
    const isOpen = _openSeasons.has(key);
    const seen=season.episodes.filter(e=>e.seen).length, total=season.episodes.length;
    const pct=total?Math.round(seen/total*100):0;
    const yearLabel=seasonYearLabel(season);
    const hasDetails=season.episodes.some(e=>e.title||e.airdate);
    const epsHTML = hasDetails
      ? season.episodes.map((ep,ei)=>{
          const label=ep.title?`E${ei+1} — ${ep.title}`:`Épisode ${ei+1}`;
          const dateStr=ep.airdate?fmtAirdate(ep.airdate):'';
          return `<div class="ep-row ${ep.seen?'ep-row-seen':'ep-row-unseen'}" onclick="toggleEp('${s.id}',${si},${ei})" title="${ep.airdate?'Diffusé le '+fmtAirdate(ep.airdate):''}">
            <span class="${ep.seen?'ep-seen-dot':'ep-unseen-dot'}"></span>
            <span class="ep-row-label">${esc(label)}</span>
            ${dateStr?`<span class="ep-row-date">${esc(dateStr)}</span>`:''}
          </div>`;
        }).join('')
      : `<div class="ep-grid">${season.episodes.map((ep,ei)=>`
          <button class="ep-btn ${ep.seen?'ep-seen':'ep-unseen'}" onclick="toggleEp('${s.id}',${si},${ei})" title="S${si+1}E${ei+1}">${ei+1}</button>
        `).join('')}</div>`;
    return `<div class="season-item">
      <div class="season-header" onclick="toggleSeasonEps('${s.id}',${si})">
        <span>${esc(seasonLabel(season,si))}${esc(yearLabel)} <span style="color:var(--text-dim);font-size:12px">(${seen}/${total} — ${pct}%)</span></span>
        <span id="sicon-${s.id}-${si}">${isOpen?'▼':'▶'}</span>
      </div>
      <div id="season-eps-${s.id}-${si}" style="display:${isOpen?'block':'none'}">
        ${epsHTML}
        <div style="display:flex;gap:6px;padding:6px 0 4px ${hasDetails?'0':'12px'}">
          <button class="btn btn-secondary btn-xs" onclick="markSeasonAll('${s.id}',${si},true)">✓ Tout vu</button>
          <button class="btn btn-secondary btn-xs" onclick="markSeasonAll('${s.id}',${si},false)">✗ Tout non vu</button>
        </div>
      </div>
    </div>`;
  }).join('');
}

function toggleSeasonEps(sid,si) {
  const key = `${sid}-${si}`;
  const el=document.getElementById(`season-eps-${sid}-${si}`);
  const icon=document.getElementById(`sicon-${sid}-${si}`);
  if(el){
    const open=el.style.display!=='none';
    el.style.display=open?'none':'block';
    icon.textContent=open?'▶':'▼';
    if(open) _openSeasons.delete(key); else _openSeasons.add(key);
  }
}

function toggleEp(sid,si,ei) {
  const s=DB.series.find(x=>x.id===sid); if(!s) return;
  const nowSeen = !s.seasons[si].episodes[ei].seen;
  s.seasons[si].episodes[ei].seen = nowSeen;
  s.lastInteracted=Date.now(); _lastInteractedSerieId=sid;
  if(nowSeen) {
    logWatch({type:'episode', serieId:sid, seasonIndex:si, episodeIndex:ei});
  } else {
    unlogWatch(e=>e.type==='episode' && e.serieId===sid && e.seasonIndex===si && e.episodeIndex===ei);
  }
  saveDB();
  patchEpisodeUI(s, si, ei);
  updateSerieRowProgress(sid);
}

function patchEpisodeUI(s, si, ei) {
  const season = s.seasons[si];
  const ep = season.episodes[ei];
  const seen=season.episodes.filter(e=>e.seen).length, total=season.episodes.length;
  const pct=total?Math.round(seen/total*100):0;
  const header = document.querySelector(`#season-eps-${s.id}-${si}`)?.previousElementSibling;
  if(header){
    const span = header.querySelector('span');
    if(span) span.innerHTML = `${esc(seasonLabel(season,si))}${esc(seasonYearLabel(season))} <span style="color:var(--text-dim);font-size:12px">(${seen}/${total} — ${pct}%)</span>`;
  }
  const hasDetails=season.episodes.some(e=>e.title||e.airdate);
  if(hasDetails){
    const rows = document.querySelectorAll(`#season-eps-${s.id}-${si} .ep-row`);
    const row = rows[ei];
    if(row){
      row.className = `ep-row ${ep.seen?'ep-row-seen':'ep-row-unseen'}`;
      const dot = row.querySelector('span');
      if(dot) dot.className = ep.seen?'ep-seen-dot':'ep-unseen-dot';
    }
  } else {
    const btns = document.querySelectorAll(`#season-eps-${s.id}-${si} .ep-btn`);
    const btn = btns[ei];
    if(btn) btn.className = `ep-btn ${ep.seen?'ep-seen':'ep-unseen'}`;
  }
}

function markSerieAll(sid,seen) {
  const s=DB.series.find(x=>x.id===sid); if(!s) return;
  s.seasons.forEach(sn=>sn.episodes.forEach(ep=>ep.seen=seen));
  s.lastInteracted=Date.now(); _lastInteractedSerieId=sid;
  saveDB();
  const tree=document.getElementById('seasons-tree-'+sid);
  if(tree) tree.innerHTML=seasonsTree(s);
  updateSerieRowProgress(sid);
}

function markSeasonAll(sid,si,seen) {
  const s=DB.series.find(x=>x.id===sid); if(!s) return;
  s.seasons[si].episodes.forEach(ep=>ep.seen=seen);
  s.lastInteracted=Date.now(); _lastInteractedSerieId=sid;
  saveDB();
  const tree=document.getElementById('seasons-tree-'+sid);
  if(tree) tree.innerHTML=seasonsTree(s);
  updateSerieRowProgress(sid);
}

function toggleSerieExtra(id) {
  const el=document.getElementById('sextra-'+id);
  if(el) el.style.display=el.style.display==='none'?'block':'none';
}

}

// ============================================================
// SERIE FORM (with season naming + airdate cascade tools)
// ============================================================
function openSerieForm(id) {
  window._capturedPoster = undefined;
  const serie = id ? DB.series.find(s=>s.id===id) : null;
  if(serie) window._capturedPoster = serie.poster||'';
  const creators = serie ? parseNames(serie.creators) : [];
  const countries = serie ? parseNames(serie.countries) : [];
  const platforms = serie ? parseNames(serie.platforms) : [];
  const genres = serie ? parseNames(serie.genres) : [];
  let tmdbId = serie ? (serie.tmdbId||null) : null;
  let seasons = serie ? JSON.parse(JSON.stringify(serie.seasons||[])) : [];

  function addWeek(dateStr) {
    const m = String(dateStr).match(/^(\d{4})-(\d{2})-(\d{2})$/);
    if(!m) return '';
    const d = new Date(Date.UTC(parseInt(m[1]),parseInt(m[2])-1,parseInt(m[3])));
    d.setUTCDate(d.getUTCDate()+7);
    return `${d.getUTCFullYear()}-${String(d.getUTCMonth()+1).padStart(2,'0')}-${String(d.getUTCDate()).padStart(2,'0')}`;
  }
  const isValidDate = (s) => /^\d{4}-\d{2}-\d{2}$/.test(String(s||''));
  // Internal storage stays YYYY-MM-DD (sortable, used for the +1 week math).
  // Display/input uses DD-MM-YYYY.
  function isoToDisplay(iso) {
    const m = String(iso||'').match(/^(\d{4})-(\d{2})-(\d{2})$/);
    return m ? `${m[3]}-${m[2]}-${m[1]}` : (iso||'');
  }
  function displayToIso(disp) {
    const m = String(disp||'').trim().match(/^(\d{2})-(\d{2})-(\d{4})$/);
    return m ? `${m[3]}-${m[2]}-${m[1]}` : '';
  }

  function renderSeasonsEditor() {
    const wrap=document.getElementById('fm-seasons-editor'); if(!wrap) return;
    wrap.innerHTML = seasons.map((season,si)=>`
      <div style="background:var(--surface3);border-radius:8px;padding:12px;margin-bottom:10px">
        <div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:10px">
          <b>Saison ${si+1}</b>
          <button class="btn btn-danger btn-xs" onclick="removeSeason(${si})">Supprimer</button>
        </div>
        <div class="form-row" style="margin-bottom:10px">
          <div>
            <label class="form-label" style="margin-bottom:4px">Nom de la saison <small style="color:var(--text-dim)">(optionnel)</small></label>
            <input class="form-input" style="padding:6px 10px;font-size:13px" placeholder="Ex: Les Origines" value="${esc(season.name||'')}" oninput="setSeasonName(${si},this.value)">
          </div>
          <div>
            <label class="form-label" style="margin-bottom:4px">Nb épisodes</label>
            <input type="number" min="1" class="form-input" style="padding:6px 10px;font-size:13px" value="${season.episodes.length}" onchange="resizeSeason(${si},this.value)">
          </div>
        </div>
        <div style="font-size:12px;color:var(--text-dim);margin-bottom:8px">(vus : ${season.episodes.filter(e=>e.seen).length})</div>
        <button class="btn btn-secondary btn-xs" onclick="toggleEpDetails(${si})">
          ${season._showDetails?'▼ Masquer titres/dates':'▶ Titres & dates (optionnel)'}
        </button>
        <div id="ep-details-${si}" style="display:${season._showDetails?'block':'none'};margin-top:10px">
          <div style="font-size:12px;color:var(--text-dim);margin-bottom:8px">Format date : JJ-MM-AAAA</div>
          <div style="display:flex;gap:14px;margin-bottom:10px;flex-wrap:wrap">
            <label style="display:flex;align-items:center;gap:6px;font-size:12px;cursor:pointer">
              <input type="checkbox" id="opt-sameday-${si}" ${season._sameDay?'checked':''} onchange="toggleSameDay(${si},this.checked)">
              Même date pour toute la saison
            </label>
            <label style="display:flex;align-items:center;gap:6px;font-size:12px;cursor:pointer">
              <input type="checkbox" id="opt-weekly-${si}" ${season._weekly?'checked':''} onchange="toggleWeekly(${si},this.checked)">
              +1 semaine entre chaque épisode
            </label>
          </div>
          ${season.episodes.map((ep,ei)=>`
            <div style="display:grid;grid-template-columns:28px 1fr 1fr;gap:6px;align-items:center;margin-bottom:6px">
              <span style="font-size:12px;color:var(--text-dim);text-align:right">E${ei+1}</span>
              <input class="form-input" style="padding:5px 8px;font-size:12px" placeholder="Titre" value="${esc(ep.title||'')}" oninput="setEpField(${si},${ei},'title',this.value)">
              <input class="form-input" style="padding:5px 8px;font-size:12px" placeholder="Date (JJ-MM-AAAA)" value="${esc(isoToDisplay(ep.airdate))}" onchange="setEpDate(${si},${ei},this.value)">
            </div>`).join('')}
        </div>
      </div>`).join('')
    + `<button class="btn btn-secondary btn-sm" onclick="addSeason()" style="margin-top:4px">＋ Ajouter une saison</button>`;
  }

  window.toggleEpDetails=(si)=>{ seasons[si]._showDetails=!seasons[si]._showDetails; renderSeasonsEditor(); };
  window.setEpField=(si,ei,f,v)=>{ seasons[si].episodes[ei][f]=v; };
  window.setSeasonName=(si,v)=>{ seasons[si].name=v; };
  window.addSeason=()=>{ seasons.push({episodes:[{seen:false,title:'',airdate:''}],_showDetails:false}); renderSeasonsEditor(); };
  window.removeSeason=(si)=>{ seasons.splice(si,1); renderSeasonsEditor(); };
  window.resizeSeason=(si,n)=>{
    n=Math.max(1,parseInt(n)||1);
    const cur=seasons[si].episodes;
    while(cur.length<n) cur.push({seen:false,title:'',airdate:''});
    while(cur.length>n) cur.pop();
    renderSeasonsEditor();
  };
  window.toggleSameDay=(si,checked)=>{ seasons[si]._sameDay=checked; if(checked) seasons[si]._weekly=false; renderSeasonsEditor(); };
  window.toggleWeekly=(si,checked)=>{ seasons[si]._weekly=checked; if(checked) seasons[si]._sameDay=false; renderSeasonsEditor(); };

  window.setEpDate = (si, ei, val) => {
    const season = seasons[si];
    const iso = displayToIso(val);
    if(val.trim() && !iso) {
      // Invalid format typed — keep raw text so user can fix it, don't crash cascade logic
      season.episodes[ei].airdate = '';
      alert('Format de date invalide. Utilisez JJ-MM-AAAA (ex: 11-06-2026).');
      renderSeasonsEditor();
      return;
    }
    season.episodes[ei].airdate = iso;
    if(!isValidDate(iso)) { renderSeasonsEditor(); return; }

    if(season._sameDay) {
      const apply = () => {
        season.episodes.forEach(ep=>{ ep.airdate = iso; });
        renderSeasonsEditor();
      };
      const hasOtherDates = season.episodes.some((ep,idx)=>idx!==ei && ep.airdate && ep.airdate!==iso);
      if(hasOtherDates) {
        if(confirm('Certains épisodes ont déjà une date différente. Les écraser avec cette date pour toute la saison ?')) apply();
        else renderSeasonsEditor();
      } else apply();
      return;
    }

    if(season._weekly) {
      let cascade = (fromIdx, overwriteThrough) => {
        let curDate = season.episodes[fromIdx].airdate;
        for(let idx=fromIdx+1; idx<season.episodes.length; idx++) {
          const next = season.episodes[idx];
          const computed = addWeek(curDate);
          if(next.airdate && isValidDate(next.airdate) && next.airdate !== computed && !overwriteThrough) {
            if(confirm(`L'épisode E${idx+1} a déjà une date (${isoToDisplay(next.airdate)}). Continuer en l'écrasant avec la cascade hebdomadaire ?`)) {
              cascade(fromIdx, true);
            }
            return;
          }
          next.airdate = computed;
          curDate = computed;
        }
      };
      cascade(ei, false);
      renderSeasonsEditor();
      return;
    }
    renderSeasonsEditor();
  };

  createModal(serie?'Modifier la série':'Ajouter une série', `
    <div id="sm-tmdb-box"></div>
    <div class="form-group"><label class="form-label">Titre *</label><input class="form-input" id="sm-title" value="${esc(serie?.title||'')}"></div>
    <div class="form-group">
      <label class="form-label">Créateur(s) * <small style="color:var(--text-dim)">(Entrée)</small></label>
      <div class="tag-input-wrap" id="sm-creators-wrap" onclick="document.getElementById('sm-creators-input').focus()"><input class="tag-input" id="sm-creators-input" placeholder="Ajouter un nom..."></div>
    </div>
    <div class="form-row">
      <div class="form-group"><label class="form-label">Année(s) * <small style="color:var(--text-dim)">"2020-..." si en cours</small></label><input class="form-input" id="sm-years" value="${esc(serie?.years||'')}"></div>
      <div class="form-group"><label class="form-label">Statut *</label>
        <select class="form-select" id="sm-status">
          <option value="">–</option>
          <option value="encours" ${serie?.status==='encours'?'selected':''}>En cours</option>
          <option value="terminee" ${serie?.status==='terminee'?'selected':''}>Terminée</option>
          <option value="annulee" ${serie?.status==='annulee'?'selected':''}>Annulée</option>
        </select>
      </div>
    </div>
    <div class="form-group">
      <label class="form-label">Chaîne / Plateforme(s) * <small style="color:var(--text-dim)">(Entrée)</small></label>
      <div class="tag-input-wrap" id="sm-platforms-wrap" style="position:relative" onclick="document.getElementById('sm-platforms-input').focus()">
        <input class="tag-input" id="sm-platforms-input" placeholder="Netflix, HBO..." autocomplete="off">
      </div>
    </div>
    <div class="form-group">
      <label class="form-label">Pays * <small style="color:var(--text-dim)">(Entrée)</small></label>
      <div class="tag-input-wrap" id="sm-countries-wrap" onclick="document.getElementById('sm-countries-input').focus()"><input class="tag-input" id="sm-countries-input" placeholder="Ajouter un pays..."></div>
    </div>
    <div class="form-group">
      <label class="form-label">Genre(s) <small style="color:var(--text-dim)">(optionnel, recommandé — Entrée)</small></label>
      <div class="tag-input-wrap" id="sm-genres-wrap" onclick="document.getElementById('sm-genres-input').focus()">
        <input class="tag-input" id="sm-genres-input" placeholder="Drame, Comédie...">
      </div>
    </div>
    <div class="form-group"><label class="form-label">Durée moy. épisode (min) *</label><input class="form-input" id="sm-dur" type="number" value="${esc(serie?.episodeDuration||'')}"></div>
    <div class="form-group"><label class="form-label">Saisons & Épisodes *</label><div id="fm-seasons-editor"></div></div>
    <div class="form-group">
      <label class="form-label">Poster</label>
      <div style="display:flex;align-items:center;gap:12px">
        <div id="sm-poster-prev" style="width:60px;height:88px;background:var(--surface3);border-radius:6px;display:flex;align-items:center;justify-content:center;color:var(--text-dim);font-size:24px;overflow:hidden">
          ${serie?.poster?`<img src="${serie.poster}" style="width:100%;height:100%;object-fit:cover">`:'📺'}
        </div>
        <label class="btn btn-secondary poster-upload-btn">📷 Choisir<input type="file" accept="image/*" style="display:none" onchange="handlePosterUpload(this,'sm-poster-prev')"></label>
        <button class="btn btn-danger btn-sm" id="sm-poster-del" onclick="clearPosterBtn('sm-poster-prev','sm-poster-del')" style="${serie?.poster?'':'display:none'}">Supprimer</button>
      </div>
    </div>
  `, () => {
    const title=document.getElementById('sm-title').value.trim();
    const years=document.getElementById('sm-years').value.trim();
    const status=document.getElementById('sm-status').value;
    const epDur=document.getElementById('sm-dur').value.trim();
    let valid=true;
    if(!title){ document.getElementById('sm-title').classList.add('invalid'); valid=false; } else document.getElementById('sm-title').classList.remove('invalid');
    if(creators.length===0){ document.getElementById('sm-creators-wrap').classList.add('invalid'); valid=false; } else document.getElementById('sm-creators-wrap').classList.remove('invalid');
    if(!years){ document.getElementById('sm-years').classList.add('invalid'); valid=false; } else document.getElementById('sm-years').classList.remove('invalid');
    if(!status){ document.getElementById('sm-status').classList.add('invalid'); valid=false; } else document.getElementById('sm-status').classList.remove('invalid');
    if(platforms.length===0){ document.getElementById('sm-platforms-wrap').classList.add('invalid'); valid=false; } else document.getElementById('sm-platforms-wrap').classList.remove('invalid');
    if(countries.length===0){ document.getElementById('sm-countries-wrap').classList.add('invalid'); valid=false; } else document.getElementById('sm-countries-wrap').classList.remove('invalid');
    if(!epDur){ document.getElementById('sm-dur').classList.add('invalid'); valid=false; } else document.getElementById('sm-dur').classList.remove('invalid');
    const totalEps=seasons.reduce((a,sn)=>a+sn.episodes.length,0);
    if(totalEps===0){ alert('La série doit avoir au moins un épisode.'); valid=false; }
    if(!valid) return false;

    const cleanSeasons = seasons.map(sn=>({
      name: sn.name||'',
      episodes: sn.episodes.map(ep=>({seen:ep.seen||false,title:ep.title||'',airdate:ep.airdate||''}))
    }));
    const poster=window._capturedPoster!==undefined?window._capturedPoster:(serie?.poster||'');

    if(serie){
      cleanSeasons.forEach((newSn,si)=>{
        const oldSn=serie.seasons&&serie.seasons[si];
        if(oldSn) newSn.episodes.forEach((ep,ei)=>{ if(oldSn.episodes[ei]){ ep.seen=oldSn.episodes[ei].seen; } });
      });
      Object.assign(serie,{title,creators:[...creators],countries:[...countries],platforms:[...platforms],genres:[...genres],tmdbId,years,status,episodeDuration:parseInt(epDur),seasons:cleanSeasons,poster});
    } else {
      DB.series.push({id:uid(),title,creators:[...creators],countries:[...countries],platforms:[...platforms],genres:[...genres],tmdbId,years,status,episodeDuration:parseInt(epDur),seasons:cleanSeasons,poster,abandoned:false,lastInteracted:0});
    }
    saveDB(); closeModal();
    const cur=document.querySelector('.nav-item.active')?.dataset.page||'series';
    if(cur==='series'&&window._seriesPageDraw) window._seriesPageDraw();
    else render(cur);
  });

  renderTags('sm-creators-wrap',creators,'sm-creators-input');
  renderTags('sm-countries-wrap',countries,'sm-countries-input');
  renderTags('sm-platforms-wrap',platforms,'sm-platforms-input');
  renderTags('sm-genres-wrap',genres,'sm-genres-input');
  setupTagInput('sm-creators-input','sm-creators-wrap',creators);
  setupTagInput('sm-countries-input','sm-countries-wrap',countries);
  setupTagInputWithAutocomplete('sm-platforms-input','sm-platforms-wrap',platforms,knownPlatforms);
  setupTagInputWithAutocomplete('sm-genres-input','sm-genres-wrap',genres,knownGenres);
  renderSeasonsEditor();

  // --- TMDB search & full season import ---
  async function onTmdbSeriePick(picked) {
    const box = document.getElementById('sm-tmdb-box');
    box.innerHTML = `<div class="tmdb-search-wrap"><div class="tmdb-progress">Récupération des informations de la série...</div></div>`;
    try {
      const details = await tmdbSeriesDetails(picked.id);
      document.getElementById('sm-title').value = details.title;
      document.getElementById('sm-years').value = details.years;
      document.getElementById('sm-status').value = details.status;
      if(details.episodeDuration) document.getElementById('sm-dur').value = details.episodeDuration;
      creators.length = 0; details.creators.forEach(c=>creators.push(c));
      renderTags('sm-creators-wrap',creators,'sm-creators-input');
      countries.length = 0; details.countries.forEach(c=>countries.push(c));
      renderTags('sm-countries-wrap',countries,'sm-countries-input');
      platforms.length = 0; details.platforms.forEach(p=>platforms.push(p));
      renderTags('sm-platforms-wrap',platforms,'sm-platforms-input');
      genres.length = 0; (details.genres||[]).forEach(g=>genres.push(g));
      renderTags('sm-genres-wrap',genres,'sm-genres-input');
      tmdbId = details.tmdbId;

      // Now fetch every season's episodes — this is the slow part, show progress.
      box.innerHTML = `<div class="tmdb-search-wrap"><div class="tmdb-progress" id="sm-tmdb-progress">Récupération des saisons (0/${details.seasonNumbers.length})...</div></div>`;
      const fetchedSeasons = await tmdbFetchAllSeasons(details.tmdbId, details.seasonNumbers, (done,total)=>{
        const p = document.getElementById('sm-tmdb-progress');
        if(p) p.textContent = `Récupération des saisons (${done}/${total})...`;
      });
      // Preserve any "seen" flags already set for matching season/episode indices
      fetchedSeasons.forEach((newSn,si)=>{
        const oldSn = seasons[si];
        if(oldSn) newSn.episodes.forEach((ep,ei)=>{ if(oldSn.episodes[ei]) ep.seen = oldSn.episodes[ei].seen; });
      });
      seasons.length = 0;
      fetchedSeasons.forEach(sn=>seasons.push(sn));
      renderSeasonsEditor();

      renderTmdbSearchBox('sm-tmdb-box', 'tv', onTmdbSeriePick);
      document.getElementById('sm-tmdb-box').insertAdjacentHTML('afterbegin', `<div style="font-size:12px;color:var(--green);margin-bottom:8px">✓ Série, saisons et épisodes pré-remplis depuis TMDB — vérifiez avant d'enregistrer.</div>`);
    } catch(e) {
      box.innerHTML = `<div class="tmdb-search-wrap"><div style="color:var(--red);font-size:12px">Erreur lors de la récupération des détails.</div></div>`;
    }
  }
  renderTmdbSearchBox('sm-tmdb-box', 'tv', onTmdbSeriePick);
}

function watchlistPage(el, actions) {
  if(!window._wlTab) window._wlTab='films';

  actions.innerHTML = `
    <button class="btn btn-secondary" onclick="openWatchlistForm('film')" style="margin-right:4px">＋ Film</button>
    <button class="btn btn-primary" onclick="openWatchlistForm('serie')">＋ Série</button>`;

  function draw() {
    const tab=window._wlTab;
    const wFilms=(DB.watchlist||[]).filter(w=>w.type==='film');
    const wSeries=(DB.watchlist||[]).filter(w=>w.type==='serie');
    const list=tab==='films'?wFilms:wSeries;
    el.innerHTML=`
    <div class="tabs">
      <button class="tab-btn ${tab==='films'?'active':''}" onclick="setWLTab('films')">🎬 Films (${wFilms.length})</button>
      <button class="tab-btn ${tab==='series'?'active':''}" onclick="setWLTab('series')">📺 Séries (${wSeries.length})</button>
    </div>
    ${list.length===0?`<div style="text-align:center;padding:60px 20px;color:var(--text-dim)">
      <div style="font-size:40px;margin-bottom:12px">🔖</div>
      <div style="font-size:15px;margin-bottom:6px">Aucun ${tab==='films'?'film':'série'} en watchlist</div>
      <div style="font-size:13px">Ajoutez des titres à regarder prochainement.</div>
    </div>`:`<div class="media-list">${list.map(w=>watchlistRow(w)).join('')}</div>`}`;
  }
  window.setWLTab=(t)=>{ window._wlTab=t; draw(); };
  window._wlDraw=draw;
  draw();
}

function watchlistRow(w) {
  const meta=[];
  if(w.year) meta.push(w.year);
  if(w.creators && w.creators.length) meta.push(joinNames(w.creators));
  else if(w.director) meta.push(w.director);
  if(w.platforms && w.platforms.length) meta.push(joinNames(parseNames(w.platforms)));
  else if(w.platform) meta.push(w.platform);
  return `<div class="media-row" id="wrow-${w.id}">
    <div class="media-row-main" style="cursor:default">
      <div class="media-poster-thumb" style="font-size:20px">${w.type==='film'?'🎬':'📺'}</div>
      <div class="media-info" style="margin-left:12px">
        <div class="media-title">${esc(w.title)}</div>
        <div class="media-meta">${meta.map(esc).join(' • ')||'–'}</div>
        ${w.notes?`<div style="font-size:11px;color:var(--text-dim);margin-top:3px;font-style:italic">${esc(w.notes)}</div>`:''}
      </div>
      <div class="media-actions">
        <button class="btn btn-green btn-xs" onclick="convertWatchlist('${w.id}')">✓ Vu</button>
        <button class="btn btn-secondary btn-xs" onclick="editWatchlist('${w.id}')">✏️</button>
        <button class="btn btn-danger btn-xs" onclick="deleteWatchlist('${w.id}')">🗑</button>
      </div>
    </div>
  </div>`;
}

    </div>
    ${t==='serie'?`<div class="form-group">
      <label class="form-label">Chaîne / Plateforme(s) <small style="color:var(--text-dim)">(optionnel, Entrée)</small></label>
      <div class="tag-input-wrap" id="wl-platforms-wrap" style="position:relative" onclick="document.getElementById('wl-platforms-input').focus()"><input class="tag-input" id="wl-platforms-input" placeholder="Netflix..."></div>
    </div>`:''}
    <div class="form-group"><label class="form-label">Note <small style="color:var(--text-dim)">(optionnel)</small></label><input class="form-input" id="wl-notes" value="${esc(item?.notes||'')}" placeholder="Recommandé par..."></div>

    const year=document.getElementById('wl-year')?.value?.trim();

    if(item){ Object.assign(item,{title,year,creators:[...wlCreators],platforms:[...wlPlatforms],notes}); }
    else { DB.watchlist.push({id:uid(),type:t,title,year,creators:[...wlCreators],platforms:[...wlPlatforms],notes}); }
    saveDB(); closeModal();
    if(window._wlDraw) window._wlDraw();
  });
  renderTags('wl-creators-wrap',wlCreators,'wl-creators-input');

    renderTags('wl-platforms-wrap',wlPlatforms,'wl-platforms-input');

function editWatchlist(id) {
  const w=(DB.watchlist||[]).find(x=>x.id===id);
  if(w) openWatchlistForm(w.type,id);
}
function deleteWatchlist(id) {
  if(!confirm('Supprimer de la watchlist ?')) return;
  DB.watchlist=(DB.watchlist||[]).filter(w=>w.id!==id);
  saveDB(); if(window._wlDraw) window._wlDraw();
}

// "Marquer vu" depuis la watchlist : l'item est retiré temporairement, mais
// restauré si l'utilisateur clique Annuler ou ✕ sans valider le formulaire.
function convertWatchlist(id) {
  const w=(DB.watchlist||[]).find(x=>x.id===id); if(!w) return;
  window._wlPendingConvert = {id, item: JSON.parse(JSON.stringify(w))};
  DB.watchlist=DB.watchlist.filter(x=>x.id!==id);
  saveDB();
  if(w.type==='film'){
    document.querySelectorAll('.nav-item').forEach(x=>x.classList.remove('active'));
    document.querySelector('[data-page="films"]').classList.add('active');
    document.getElementById('topbar-title').textContent='Films';
    render('films');
    setTimeout(()=>openWatchlistToFilmForm(w),50);
  } else {
    document.querySelectorAll('.nav-item').forEach(x=>x.classList.remove('active'));
    document.querySelector('[data-page="series"]').classList.add('active');
    document.getElementById('topbar-title').textContent='Séries';
    render('series');
    setTimeout(()=>openWatchlistToSerieForm(w),50);
  }
}

function restoreWatchlistIfPending() {
  if(window._wlPendingConvert) {
    const {item} = window._wlPendingConvert;
    if(!DB.watchlist.find(w=>w.id===item.id)) {
      DB.watchlist.push(item);
      saveDB();
    }
    window._wlPendingConvert = null;
  }
}

function wrappedPage(el, actions) {
  const now = new Date();
  const currentYear = now.getFullYear();
  // Available only from Dec 31 onward for the current year's recap generation,
  // but past saved wrappeds remain viewable any time.
  const canGenerateToday = (now.getMonth()===11 && now.getDate()===31);

  let viewingYear = null; // null = list view

  function draw() {
    if(viewingYear !== null) { drawSingleWrapped(viewingYear); return; }
    drawList();
  }

  function drawList() {
    actions.innerHTML = '';
    const saved = [...(DB.wrappeds||[])].sort((a,b)=>b.year-a.year);
    const hasCurrentYearData = watchLogForYear(currentYear).length > 0;
    const alreadyGenerated = saved.some(w=>w.year===currentYear);

    el.innerHTML = `
    <div class="film-strip" style="margin-bottom:20px"></div>
    ${canGenerateToday && hasCurrentYearData && !alreadyGenerated ? `
      <div class="card" style="margin-bottom:20px;border-color:var(--gold-dim)">
        <div class="card-title">🎁 Votre bilan ${currentYear} est prêt !</div>
        <div style="color:var(--text-dim);font-size:13px;margin-bottom:14px">Générez votre bilan annuel maintenant. Les données de visionnage de l'année seront ensuite réinitialisées pour ${currentYear+1}.</div>
        <button class="btn btn-primary" onclick="generateWrapped(${currentYear})">✨ Générer mon bilan ${currentYear}</button>
      </div>` : ''}
    ${saved.length===0 ? `
      <div style="text-align:center;padding:80px 20px;color:var(--text-dim)">
        <div style="font-size:48px;margin-bottom:16px">🎁</div>
        <div style="font-size:17px;margin-bottom:8px;color:var(--text)">Aucun bilan pour le moment</div>
        <div style="font-size:14px">Le prochain sera disponible le 31 décembre.</div>
      </div>
    ` : `
      <div class="card-title" style="font-size:16px;margin-bottom:14px">📚 Bilans disponibles</div>
      <div style="display:flex;flex-direction:column;gap:10px">
        ${saved.map(w=>`
          <div class="saga-header-row" onclick="viewWrapped(${w.year})" style="cursor:pointer">
            <div>
              <div style="font-family:var(--font-display);font-size:17px;color:var(--gold)">Bilan annuel ${w.year}</div>
              <div style="font-size:12px;color:var(--text-dim);margin-top:2px">${w.data.filmCount} film(s) • ${w.data.totalEpisodesThisYear} épisode(s) • généré le ${new Date(w.generatedAt).toLocaleDateString('fr-FR')}</div>
            </div>
            <span style="color:var(--gold)">▶</span>
          </div>
        `).join('')}
      </div>
    `}`;
  }

  function drawSingleWrapped(year) {
    const saved = (DB.wrappeds||[]).find(w=>w.year===year);
    if(!saved) { viewingYear=null; drawList(); return; }
    actions.innerHTML = `<button class="btn btn-secondary" onclick="backToWrappedList()">← Retour</button>`;
    el.innerHTML = renderWrappedReport(saved.data, saved.narrative);
  }

  window.viewWrapped = (year)=>{ viewingYear=year; draw(); };
  window.backToWrappedList = ()=>{ viewingYear=null; draw(); };
  window.generateWrapped = (year)=>{
    const data = buildWrappedData(year);
    if(!data){ alert("Pas assez de données pour générer un bilan cette année."); return; }
    const narrative = buildWrappedNarrative(data);
    if(!confirm(`Générer le bilan ${year} ? Les dates de visionnage de l'année seront ensuite réinitialisées (vos films/séries restent intacts).`)) return;
    DB.wrappeds.push({ year, generatedAt: new Date().toISOString(), data, narrative });
    // Reset only this year's watch log entries — never touches films/series/sagas data.
    DB.watchLog = DB.watchLog.filter(e=>new Date(e.date).getFullYear() !== year);
    saveDB();
    viewingYear = year;
    draw();
  };

  draw();
}

function statPill(label, value) {
  if(value===null || value===undefined || value==='') return '';
  return `<div class="stat-card"><div class="stat-val" style="font-size:22px">${value}</div><div class="stat-label">${esc(label)}</div></div>`;
}

function wrappedSection(title, innerHTML) {
  if(!innerHTML || !innerHTML.trim()) return '';
  return `<div class="card" style="margin-bottom:16px">
    <div class="card-title">${title}</div>
    ${innerHTML}
  </div>`;
}

function renderWrappedReport(d, narrative) {
  const sections = [];

  // ---- Header / Vue globale ----
  sections.push(`
    <div style="text-align:center;padding:30px 20px;margin-bottom:24px;background:linear-gradient(135deg, var(--surface2), var(--surface3));border-radius:var(--radius-lg);border:1px solid var(--gold-dim)">
      <div style="font-size:13px;letter-spacing:3px;text-transform:uppercase;color:var(--gold-dim);margin-bottom:6px">CinéTV</div>
      <div style="font-family:var(--font-display);font-size:32px;color:var(--gold);margin-bottom:14px">Bilan annuel ${d.year}</div>
      ${narrative.opening ? `<div style="font-size:15px;color:var(--text);max-width:560px;margin:0 auto;font-style:italic">"${esc(narrative.opening)}"</div>` : ''}
    </div>
  `);

  // ---- 1) Vue globale, résumé immédiat ----
  let globalStats = '<div class="stats-grid" style="display:grid;grid-template-columns:repeat(auto-fit,minmax(120px,1fr));gap:12px">';
  globalStats += statPill('Films vus', d.filmCount);
  globalStats += statPill('Séries suivies', d.seriesCount);
  globalStats += statPill('Épisodes vus', d.totalEpisodesThisYear);
  globalStats += '</div>';
  if(d.comparison) {
    const c = d.comparison;
    let compLines = '<div style="margin-top:14px;font-size:13px;color:var(--text-dim);display:flex;flex-direction:column;gap:4px">';
    if(c.filmCountPct!==null) compLines += `<div>Films : ${c.filmCountDelta>=0?'+':''}${c.filmCountDelta} (${c.filmCountPct>=0?'+':''}${c.filmCountPct}%) vs ${d.year-1}</div>`;
    if(c.seriesCountPct!==null) compLines += `<div>Séries : ${c.seriesCountDelta>=0?'+':''}${c.seriesCountDelta} (${c.seriesCountPct>=0?'+':''}${c.seriesCountPct}%) vs ${d.year-1}</div>`;
    compLines += '</div>';
    globalStats += compLines;
  }
  sections.push(wrappedSection('📊 Résumé de l\'année', globalStats));

  // ---- 2) Consommation brute ----
  let consoHTML = '<table class="data-table"><tbody>';
  consoHTML += `<tr><td>Films vus</td><td>${d.filmCount}</td></tr>`;
  consoHTML += `<tr><td>Durée totale (films)</td><td>${fmtDuration(d.filmTotalMin)}</td></tr>`;
  if(d.shortestFilm) consoHTML += `<tr><td>Film le plus court</td><td>${esc(d.shortestFilm.title)} (${fmtH(parseInt(d.shortestFilm.duration)||0)})</td></tr>`;
  if(d.longestFilm) consoHTML += `<tr><td>Film le plus long</td><td>${esc(d.longestFilm.title)} (${fmtH(parseInt(d.longestFilm.duration)||0)})</td></tr>`;
  consoHTML += `<tr><td>Séries suivies</td><td>${d.seriesCount}</td></tr>`;
  consoHTML += `<tr><td>Épisodes vus</td><td>${d.totalEpisodesThisYear}</td></tr>`;
  consoHTML += `<tr><td>Saisons touchées</td><td>${d.seasonsTouchedCount}</td></tr>`;
  consoHTML += `<tr><td>Durée totale (séries)</td><td>${fmtDuration(d.totalEpisodeMin)}</td></tr>`;
  if(d.mostWatchedSerie) consoHTML += `<tr><td>Série la plus consommée</td><td>${esc(d.mostWatchedSerie.title)} (${d.mostWatchedSerieEps} ép. — ${fmtDuration(d.mostWatchedSerieMin)})</td></tr>`;
  consoHTML += '</table>';
  sections.push(wrappedSection('🎬 Consommation brute', consoHTML));

  // ---- 3) Temps de visionnage ----
  let tempsHTML = `<div class="stats-grid" style="display:grid;grid-template-columns:repeat(auto-fit,minmax(140px,1fr));gap:12px;margin-bottom:14px">`;
  tempsHTML += statPill('Temps total', fmtDuration(d.totalMin));
  tempsHTML += statPill('Films', d.filmPct+'%');
  tempsHTML += statPill('Séries', d.seriesPct+'%');
  tempsHTML += '</div>';
  if(d.maxMonth!==null) tempsHTML += `<div style="font-size:13px;color:var(--text-dim);margin-top:8px">Mois le plus actif : <b style="color:var(--gold)">${MONTH_NAMES_FR[d.maxMonth]}</b> (${d.peakMonthShare}% du visionnage annuel)</div>`;
  if(d.minMonth!==null) tempsHTML += `<div style="font-size:13px;color:var(--text-dim);margin-top:4px">Mois le moins actif : <b>${MONTH_NAMES_FR[d.minMonth]}</b></div>`;
  sections.push(wrappedSection('⏱ Temps de visionnage', tempsHTML));

  // ---- 4) Genres ----
  if(d.top5Genres.length) {
    const maxG = d.top5Genres[0][1];
    let genresHTML = '<div style="display:flex;flex-direction:column;gap:8px">';
    d.top5Genres.forEach(([g,n])=>{
      const pct = Math.round(n/maxG*100);
      genresHTML += `<div>
        <div style="display:flex;justify-content:space-between;font-size:13px;margin-bottom:3px"><span>${esc(g)}</span><span style="color:var(--text-dim)">${n}</span></div>
        <div class="progress-bar"><div class="progress-fill gold" style="width:${pct}%"></div></div>
      </div>`;
    });
    genresHTML += '</div>';
    if(d.dominantGenre) genresHTML += `<div style="font-size:13px;color:var(--text-dim);margin-top:12px">Genre dominant : <b style="color:var(--gold)">${esc(d.dominantGenre)}</b></div>`;
    sections.push(wrappedSection('🎭 Genres', genresHTML));
  }

  // ---- 5) Géographie ----
  if(d.top5Countries.length) {
    let geoHTML = `<div class="stats-grid" style="display:grid;grid-template-columns:repeat(auto-fit,minmax(140px,1fr));gap:12px;margin-bottom:14px">`;
    geoHTML += statPill('Pays différents', d.countriesUniqueCount);
    geoHTML += statPill('Pays dominant', d.top5Countries[0][0]+' ('+d.dominantCountryPct+'%)');
    geoHTML += '</div>';
    geoHTML += '<table class="data-table"><thead><tr><th>Pays</th><th>Œuvres</th></tr></thead><tbody>';
    d.top5Countries.forEach(([c,n])=>{ geoHTML += `<tr><td>${esc(c)}</td><td>${n}</td></tr>`; });
    geoHTML += '</tbody></table>';
    if(d.newCountries.length) geoHTML += `<div style="font-size:13px;color:var(--text-dim);margin-top:12px">Nouveaux pays découverts : ${d.newCountries.map(esc).join(', ')}</div>`;
    sections.push(wrappedSection('🌍 Géographie', geoHTML));
  }

  // ---- 6) Réalisateurs ----
  if(d.top5Directors.length) {
    let dirHTML = '<table class="data-table"><thead><tr><th>Réalisateur</th><th>Films</th></tr></thead><tbody>';
    d.top5Directors.forEach(([dr,n])=>{ dirHTML += `<tr><td>${esc(dr)}</td><td>${n}</td></tr>`; });
    dirHTML += '</tbody></table>';
    dirHTML += `<div style="font-size:13px;color:var(--text-dim);margin-top:12px">Réalisateur(s) de l'année : <b style="color:var(--gold)">${d.topDirectors.map(esc).join(', ')}</b></div>`;
    dirHTML += `<div style="font-size:13px;color:var(--text-dim);margin-top:4px">${d.uniqueDirectorsCount} réalisateur(s) unique(s) — le top 3 représente ${d.top3DirConcentration}% de vos films</div>`;
    sections.push(wrappedSection('🎥 Réalisateurs', dirHTML));
  }

  // ---- 7) Séries (focus) ----
  if(d.seriesCount>0) {
    let seriesHTML = '<table class="data-table"><tbody>';
    if(d.mostWatchedSerie) seriesHTML += `<tr><td>Série la plus regardée</td><td>${esc(d.mostWatchedSerie.title)} (${d.mostWatchedSerieEps} ép.)</td></tr>`;
    seriesHTML += `<tr><td>Séries commencées</td><td>${d.seriesStartedCount}</td></tr>`;
    seriesHTML += `<tr><td>Séries terminées (100%)</td><td>${d.seriesCompletedCount}</td></tr>`;
    seriesHTML += `<tr><td>Séries abandonnées</td><td>${d.seriesAbandonedCount}</td></tr>`;
    seriesHTML += `<tr><td>Longueur moyenne (épisodes)</td><td>${d.avgSeriesLength}</td></tr>`;
    seriesHTML += '</table>';
    sections.push(wrappedSection('📺 Focus séries', seriesHTML));
  }

  // ---- 8) Sagas ----
  if(d.sagasTouchedCount>0) {
    let sagaHTML = '<table class="data-table"><tbody>';
    sagaHTML += `<tr><td>Sagas vues cette année</td><td>${d.sagasTouchedCount}</td></tr>`;
    sagaHTML += `<tr><td>Sagas complétées</td><td>${d.sagasCompletedCount}</td></tr>`;
    sagaHTML += `<tr><td>Sagas commencées (non terminées)</td><td>${d.sagasStartedNotCompletedCount}</td></tr>`;
    sagaHTML += `<tr><td>Films isolés vs films de saga</td><td>${d.isolatedFilmsCount} / ${d.sagaFilmsCount}</td></tr>`;
    if(d.biggestSaga) sagaHTML += `<tr><td>Plus grande saga vue</td><td>${sagaLabel(d.biggestSaga)} ${esc(d.biggestSaga.name)} (${sagaFilmCount(d.biggestSaga)} films)</td></tr>`;
    if(d.mostTimeSaga) sagaHTML += `<tr><td>Saga la plus "consommée" en temps</td><td>${sagaLabel(d.mostTimeSaga)} ${esc(d.mostTimeSaga.name)} (${fmtDuration(d.mostTimeSagaMin)})</td></tr>`;
    sagaHTML += '</table>';
    sections.push(wrappedSection('🎞️ Sagas & franchises', sagaHTML));
  }

  // ---- 9) Diversité / concentration ----
  let divHTML = `<div class="stats-grid" style="display:grid;grid-template-columns:repeat(auto-fit,minmax(120px,1fr));gap:12px">`;
  divHTML += statPill('Genres différents', d.genresUniqueCount);
  divHTML += statPill('Pays différents', d.countriesUniqueCount);
  divHTML += statPill('Réalisateurs uniques', d.uniqueDirectorsCount);
  divHTML += '</div>';
  sections.push(wrappedSection('🧩 Diversité', divHTML));

  // ---- 10) Insights automatiques ----
  if(narrative.insights && narrative.insights.length) {
    let insightsHTML = '<div style="display:flex;flex-direction:column;gap:10px">';
    narrative.insights.forEach(ins=>{
      insightsHTML += `<div style="padding:10px 14px;background:var(--surface2);border-left:3px solid var(--gold);border-radius:6px;font-size:13px">${esc(ins)}</div>`;
    });
    insightsHTML += '</div>';
    sections.push(wrappedSection('💡 Insights', insightsHTML));
  }

  // ---- 11) Faits marquants ----
  if(narrative.highlights && narrative.highlights.length) {
    let hlHTML = '<div style="display:flex;flex-direction:column;gap:10px">';
    narrative.highlights.forEach(h=>{
      hlHTML += `<div style="padding:10px 14px;background:rgba(232,196,106,.08);border:1px solid rgba(232,196,106,.2);border-radius:8px;font-size:13px">⭐ ${esc(h)}</div>`;
    });
    hlHTML += '</div>';
    sections.push(wrappedSection('🌟 Faits marquants', hlHTML));
  }

  // ---- 13) Résumé final / closing ----
  if(narrative.closing) {
    sections.push(`
      <div style="text-align:center;padding:26px 20px;margin-top:8px;background:var(--surface2);border-radius:var(--radius-lg);border:1px solid var(--border)">
        <div style="font-family:var(--font-display);font-size:18px;color:var(--gold);font-style:italic">"${esc(narrative.closing)}"</div>
      </div>
    `);
  }

  return sections.join('');
}

// Retroactively fetch genres for films/series that don't have any yet.
// Sequential requests (one title lookup per item) with a visible progress log,
// so the person can see it's working without hammering TMDB all at once.
async function backfillGenres(kind) {
  const log = document.getElementById('genre-backfill-log');
  const items = kind==='films'
    ? DB.films.filter(f=>!parseNames(f.genres).length)
    : DB.series.filter(s=>!parseNames(s.genres).length);

  if(!items.length) { log.innerHTML = `<span style="color:var(--text-dim)">Rien à compléter — tout a déjà un genre.</span>`; return; }

  let done=0, found=0, notFound=0;
  log.innerHTML = `<div class="tmdb-progress">0 / ${items.length} traité(s)...</div>`;

  for(const item of items) {
    try {
      const genres = kind==='films'
        ? await tmdbFetchMovieGenres(item.title, item.year)
        : await tmdbFetchSerieGenres(item.title, item.years);
      if(genres && genres.length) { item.genres = genres; found++; }
      else { notFound++; }
    } catch(e) { notFound++; }
    done++;
    log.innerHTML = `<div class="tmdb-progress">${done} / ${items.length} traité(s) — ${found} complété(s), ${notFound} non trouvé(s)</div>`;
    saveDB();
  }
  log.innerHTML = `<span style="color:var(--green)">✓ Terminé : ${found} film(s)/série(s) complété(s)${notFound?`, ${notFound} non trouvé(s) sur TMDB`:''}.</span>`;
  const cur = document.querySelector('.nav-item.active')?.dataset.page;
  if(cur==='dashboard') render('dashboard');
}

function setupDrop(dropId,inputId,handler){
  const drop=document.getElementById(dropId); if(!drop) return;
  drop.addEventListener('dragover',e=>{e.preventDefault();drop.style.borderColor='var(--gold)';});
  drop.addEventListener('dragleave',()=>{drop.style.borderColor='';});
  drop.addEventListener('drop',e=>{e.preventDefault();drop.style.borderColor='';const f=e.dataTransfer.files[0];if(f)handler(f);});
}
function importFilms(input){if(input.files[0])importFilmsFromFile(input.files[0]);}
function importSeries(input){if(input.files[0])importSeriesFromFile(input.files[0]);}

function readXLSX(file,cb){
  const reader=new FileReader();
  reader.onload=e=>{
    const wb=XLSX.read(e.target.result,{type:'binary'});
    const ws=wb.Sheets[wb.SheetNames[0]];
    const data=XLSX.utils.sheet_to_json(ws,{header:1,defval:''});
    cb(data);
  };
  reader.readAsBinaryString(file);
}

function importFilmsFromFile(file){
  const log=document.getElementById('film-import-log');
  log.innerHTML='<span style="color:var(--text-dim)">Lecture...</span>';
  readXLSX(file,rows=>{
    let added=0,skipped=0;
    const dataRows=rows.filter(r=>r.some(c=>String(c).trim()));
    const start=(String(dataRows[0]?.[0])||'').toLowerCase().includes('titre')?1:0;
    for(let i=start;i<dataRows.length;i++){
      const [title,director,year,country,duration]=dataRows[i];
      const t=String(title||'').trim(); if(!t){skipped++;continue;}
      DB.films.push({id:uid(),title:t,directors:parseNames(String(director||'')),year:String(year||'').trim(),countries:parseNames(String(country||'')),genres:[],duration:parseInt(duration)||0,notes:'',poster:''});
      added++;
    }
    saveDB();
    log.innerHTML=`<span style="color:var(--green)">✓ ${added} film(s) importé(s)</span>${skipped?` <span style="color:var(--text-dim)">(${skipped} ignorée(s))</span>`:''}`;
  });
}

function importSeriesFromFile(file){
  const log=document.getElementById('serie-import-log');
  log.innerHTML='<span style="color:var(--text-dim)">Lecture...</span>';
  readXLSX(file,rows=>{
    let queue=[];
    const dataRows=rows.filter(r=>r.some(c=>String(c).trim()));
    const start=(String(dataRows[0]?.[0])||'').toLowerCase().includes('titre')?1:0;
    for(let i=start;i<dataRows.length;i++){
      const [title,creator,years,platform,country,nbSeasons,nbEpisodes,epDur,status]=dataRows[i];
      const t=String(title||'').trim(); if(!t) continue;
      queue.push({id:uid(),title:t,creators:parseNames(String(creator||'')),years:String(years||'').trim(),platforms:parseNames(String(platform||'')),countries:parseNames(String(country||'')),genres:[],nbSeasons:parseInt(nbSeasons)||1,nbEpisodes:parseInt(nbEpisodes)||0,episodeDuration:parseInt(epDur)||0,status:normalizeStatus(String(status||'')),seasons:[],poster:'',abandoned:false,lastInteracted:0});
    }
    if(!queue.length){log.innerHTML='<span style="color:var(--red)">Aucune donnée.</span>';return;}
    log.innerHTML=`<span style="color:var(--text-dim)">${queue.length} série(s) à configurer...</span>`;
    processSerieQueue(queue,0,log);
  });
}

function processSerieQueue(queue,idx,log){
  if(idx>=queue.length){queue.forEach(s=>DB.series.push(s));saveDB();log.innerHTML=`<span style="color:var(--green)">✓ ${queue.length} série(s) importée(s)</span>`;return;}
  const s=queue[idx];
  if(s.nbSeasons===1){s.seasons=[{name:'',episodes:Array(s.nbEpisodes).fill(null).map(()=>({seen:false,title:'',airdate:''}))}];processSerieQueue(queue,idx+1,log);return;}
  openSeasonDistribModal(s,()=>processSerieQueue(queue,idx+1,log));
}

function openSeasonDistribModal(s,onDone){
  let inputs=[];
  function renderInputs(){
    const wrap=document.getElementById('sd-inputs'); if(!wrap) return;
    wrap.innerHTML=inputs.map((v,i)=>`
      <div style="display:flex;align-items:center;gap:10px;margin-bottom:8px">
        <span style="width:80px;font-size:13px">Saison ${i+1}</span>
        <input type="number" min="0" class="form-input" style="width:100px;padding:7px 10px" value="${v}" data-si="${i}" oninput="updateSDInput(${i},this.value)">
        <span style="font-size:12px;color:var(--text-dim)">épisodes</span>
      </div>`).join('')+`<div id="sd-total-check" style="font-size:13px;margin-top:8px"></div>`;
    updateSDCheck();
  }
  window.updateSDInput=(i,v)=>{inputs[i]=parseInt(v)||0;updateSDCheck();};
  window.updateSDCheck=()=>{
    const total=inputs.reduce((a,b)=>a+b,0);
    const el=document.getElementById('sd-total-check'); if(!el) return;
    const ok=total===s.nbEpisodes;
    el.innerHTML=`Total : <b style="color:${ok?'var(--green)':'var(--red)'}">${total}/${s.nbEpisodes}</b> ${ok?'✓':'— doit correspondre'}`;
  };
  inputs=Array(s.nbSeasons).fill(0); if(s.nbSeasons>0) inputs[0]=s.nbEpisodes;
  createModal(`Configurer : ${s.title}`,`
    <div style="color:var(--text-dim);margin-bottom:14px;font-size:13px">Répartissez les <b style="color:var(--gold)">${s.nbEpisodes} épisodes</b> sur <b style="color:var(--gold)">${s.nbSeasons} saisons</b>.</div>
    <div id="sd-inputs"></div>
  `,()=>{
    const total=inputs.reduce((a,b)=>a+b,0);
    if(total!==s.nbEpisodes){alert(`Total (${total}) ≠ épisodes (${s.nbEpisodes}).`);return false;}
    s.seasons=inputs.map(n=>({name:'',episodes:Array(n).fill(null).map(()=>({seen:false,title:'',airdate:''}))}));
    closeModal(); onDone();
  },false);
  renderInputs();
}

function normalizeStatus(s){
  s=s.toLowerCase().trim();
  if(s.includes('cours')||s.includes('ongoing')||s.includes('running')) return 'encours';
  if(s.includes('annul')||s.includes('cancel')) return 'annulee';
  return 'terminee';
}
function exportDB(){const blob=new Blob([JSON.stringify(DB,null,2)],{type:'application/json'});const a=document.createElement('a');a.href=URL.createObjectURL(blob);a.download='cinetv_backup.json';a.click();}
function restoreDB(input){if(!input.files[0]) return;if(!confirm('Remplacer toutes les données ?')) return;const r=new FileReader();r.onload=e=>{try{DB=JSON.parse(e.target.result);saveDB();alert('Données restaurées.');render('dashboard');}catch(ex){alert('Fichier invalide.');}};r.readAsText(input.files[0]);}
function clearDB(){if(!confirm('Effacer définitivement toutes les données ?')) return;DB={films:[],series:[],watchlist:[],sagas:[],watchLog:[],wrappeds:[]};saveDB();render('import');}

      </div>` :
    `<div style="display:flex;flex-direction:column;gap:12px">${sagas.map(sg=>sagaCard(sg)).join('')}</div>`}`;

    wireSearchBar('saga-search', search, v=>{ search=v; draw(); });
    const menu = document.getElementById('saga-type-menu');
    if(menu && window._sagaTypeMenuOpen) menu.style.display='flex';

    if(window._scrollToSaga) {
      const target = document.getElementById('saga-'+window._scrollToSaga);
      if(target) setTimeout(()=>target.scrollIntoView({behavior:'smooth',block:'start'}),100);
      window._scrollToSaga = null;
    }
  }

  window.setSagaSort = m=>{ sortMode=m; draw(); };
  window.toggleSagaTypeMenu = ()=>{ window._sagaTypeMenuOpen = !window._sagaTypeMenuOpen; draw(); };
  window.setSagaTypeFilter = t=>{ typeFilter=t; window._sagaTypeMenuOpen=true; draw(); };
  window._sagasPageDraw = draw;
  draw();
}

function sagaCard(sg) {
  const label = sagaLabel(sg);
  const films = sg.films||[];
  const seenCount = films.filter(sf=>DB.films.find(f=>f.id===sf.id)).length;
  const total = films.length;
  const pct = total ? Math.round(seenCount/total*100) : 0;
  const isOpen = window._openSagaCards.has(sg.id);

  const filmItems = films.map((sf,idx)=>{
    const seenFilm = DB.films.find(f=>f.id===sf.id);
    const isSeen = !!seenFilm;
    return `<div class="saga-film-row" id="sfrow-${sg.id}-${idx}">
      <div class="saga-film-poster">
        ${(seenFilm?.poster)||sf.poster ? `<img src="${(seenFilm?.poster)||sf.poster}" alt="">` : '🎬'}
      </div>
      <div class="saga-film-info">
        <div class="saga-film-title">${esc(sf.title)} ${isSeen?'<span class="badge badge-green" style="font-size:10px">Vu</span>':'<span class="badge badge-gray" style="font-size:10px">Non vu</span>'}</div>
        <div class="saga-film-meta">${esc(joinNames(sf.directors||[]))} • ${esc(sf.year||'?')} • ${sf.duration?sf.duration+' min':'–'}</div>
      </div>
      <div style="display:flex;gap:4px;flex-shrink:0;align-items:center">
        <button class="btn ${isSeen?'btn-secondary':'btn-green'} btn-xs" onclick="event.stopPropagation();toggleSagaFilmSeen('${sg.id}','${sf.id}')">${isSeen?'Non vu':'✓ Vu'}</button>
        <button class="btn btn-secondary btn-xs" onclick="event.stopPropagation();moveSagaFilm('${sg.id}',${idx},-1)" ${idx===0?'disabled':''}>↑</button>
        <button class="btn btn-secondary btn-xs" onclick="event.stopPropagation();moveSagaFilm('${sg.id}',${idx},1)" ${idx===films.length-1?'disabled':''}>↓</button>
        <button class="btn btn-danger btn-xs" onclick="event.stopPropagation();removeSagaFilm('${sg.id}','${sf.id}')">🗑</button>
      </div>
    </div>`;
  }).join('');

  return `<div class="card" id="saga-${sg.id}" style="padding:0;overflow:hidden">
    <div class="saga-header-row" onclick="toggleSagaCard('${sg.id}')">
      <div style="display:flex;align-items:center;gap:10px;flex:1">
        <span style="color:var(--gold)">${isOpen?'▼':'▶'}</span>
        <div>
          <div style="font-family:var(--font-display);font-size:17px;color:var(--gold)">${label} ${esc(sg.name)}</div>
          <div style="font-size:12px;color:var(--text-dim);margin-top:2px">${seenCount}/${total} film(s) vus</div>
        </div>
      </div>
      <div style="display:flex;gap:6px" onclick="event.stopPropagation()">
        <button class="btn btn-secondary btn-sm" onclick="openAddFilmToSaga('${sg.id}')">＋ Film</button>
        <button class="btn btn-secondary btn-sm" onclick="openSagaForm('${sg.id}')">✏️ Renommer</button>
        <button class="btn btn-danger btn-sm" onclick="deleteSaga('${sg.id}')">🗑</button>
      </div>
    </div>
    ${isOpen ? `<div style="padding:0 16px 16px">
      <div class="progress-bar" style="margin-bottom:12px"><div class="progress-fill ${pct===100?'green':'gold'}" style="width:${pct}%"></div></div>
      <div style="display:flex;flex-direction:column;gap:8px">${filmItems}</div>
    </div>` : ''}
  </div>`;
}

function toggleSagaCard(id) {
  if(window._openSagaCards.has(id)) window._openSagaCards.delete(id);
  else window._openSagaCards.add(id);
  // Preserve the card's position on screen instead of letting the page jump to top
  const cardEl = document.getElementById('saga-'+id);
  const offsetBefore = cardEl ? cardEl.getBoundingClientRect().top : null;
  if(window._sagasPageDraw) window._sagasPageDraw();
  if(offsetBefore !== null) {
    const cardAfter = document.getElementById('saga-'+id);
    if(cardAfter) {
      const offsetAfter = cardAfter.getBoundingClientRect().top;
      const scrollContainer = document.getElementById('content');
      scrollContainer.scrollTop += (offsetAfter - offsetBefore);
    }
  }
}

function openSagaForm(id) {
  const saga = id ? (DB.sagas||[]).find(sg=>sg.id===id) : null;
  createModal(saga?'Renommer la saga':'Créer une saga', `
    <div class="form-group">
      <label class="form-label">Nom de la saga *</label>
      <input class="form-input" id="saga-name" value="${esc(saga?.name||'')}" placeholder="Ex: Pirates des Caraïbes, Retour vers le futur...">
    </div>
    ${!saga ? `<div style="color:var(--text-dim);font-size:13px;margin-top:-8px">Après création, vous pourrez ajouter des films immédiatement.</div>` : ''}
  `, ()=>{
    const name = document.getElementById('saga-name').value.trim();
    if(!name){ document.getElementById('saga-name').classList.add('invalid'); return false; }
    let newId = null;
    if(saga){ saga.name=name; }
    else {
      if(!DB.sagas) DB.sagas=[];
      newId = uid();
      DB.sagas.push({id:newId, name, films:[]});
    }
    saveDB(); closeModal();
    if(newId) {
      window._openSagaCards.add(newId);
      setTimeout(()=>openAddFilmToSaga(newId, true), 50);
    } else {
      render('sagas');
    }
  });
}

function deleteSaga(id) {
  if(!confirm('Supprimer cette saga ? Les films restent dans votre cinémathèque.')) return;
  DB.sagas=(DB.sagas||[]).filter(sg=>sg.id!==id);
  saveDB(); render('sagas');
}

function openAddFilmToSaga(sagaId, isNewlyCreatedSaga) {

  // If this modal is shown right after creating a brand-new saga, remember its id

  createModal(`Ajouter un film — ${esc(saga.name)}`, `
    <div class="tabs" style="margin-bottom:16px">

      <div style="color:var(--text-dim);font-size:13px;margin-bottom:14px">Ce film ne sera pas comptabilisé dans les statistiques tant qu'il n'est pas marqué comme vu.</div>

// Toggle vu/non vu replaces the old single "marquer comme vu" button.
// Marking unseen removes the film from DB.films (and stats); marking
// seen re-adds it using the data snapshot kept on the saga entry.
function toggleSagaFilmSeen(sagaId, filmId) {
  const saga=(DB.sagas||[]).find(sg=>sg.id===sagaId); if(!saga) return;
  const sf=saga.films.find(f=>f.id===filmId); if(!sf) return;
  const existing = DB.films.find(f=>f.id===filmId);
  if(existing) {
    // Seen -> Non vu: remove from main films list
    if(!confirm(`Marquer "${sf.title}" comme non vu ? Il sera retiré de votre liste de films et des statistiques.`)) return;
    sf.title = existing.title; sf.year = existing.year; sf.directors = existing.directors;
    sf.countries = existing.countries; sf.duration = existing.duration; sf.poster = existing.poster;
    DB.films = DB.films.filter(f=>f.id!==filmId);
    sf.unseen = true;
    saveDB();
    if(window._sagasPageDraw) window._sagasPageDraw(); else render('sagas');
  } else {
    // Non vu -> Vu: open the normal film form, pre-filled, so missing required
    // fields (pays, durée...) get completed before it enters the cinémathèque.
    openSagaFilmCompletionForm(sagaId, filmId);
  }
}

      <label class="form-label">Pays * <small style="color:var(--text-dim)">(Entrée pour ajouter)</small></label>

      <label class="form-label">Notes</label>
      <textarea class="form-textarea" id="fm-notes"></textarea>

          ${sf.poster?`<img src="${sf.poster}" style="width:100%;height:100%;object-fit:cover">`:'🎬'}
        </div>

    const duration = document.getElementById('fm-duration').value.trim();

    if(!title){ document.getElementById('fm-title').classList.add('invalid'); valid=false; } else document.getElementById('fm-title').classList.remove('invalid');
    if(dirs.length===0){ document.getElementById('fm-dirs-wrap').classList.add('invalid'); valid=false; } else document.getElementById('fm-dirs-wrap').classList.remove('invalid');
    if(!year){ document.getElementById('fm-year').classList.add('invalid'); valid=false; } else document.getElementById('fm-year').classList.remove('invalid');
    if(!duration){ document.getElementById('fm-duration').classList.add('invalid'); valid=false; } else document.getElementById('fm-duration').classList.remove('invalid');

function removeSagaFilm(sagaId, filmId) {
  const saga=(DB.sagas||[]).find(sg=>sg.id===sagaId); if(!saga) return;
  saga.films=saga.films.filter(f=>f.id!==filmId);
  saveDB();
  if(window._sagasPageDraw) window._sagasPageDraw(); else render('sagas');
}

function moveSagaFilm(sagaId, idx, dir) {
  const saga=(DB.sagas||[]).find(sg=>sg.id===sagaId); if(!saga) return;
  const newIdx=idx+dir;
  if(newIdx<0||newIdx>=saga.films.length) return;
  [saga.films[idx],saga.films[newIdx]]=[saga.films[newIdx],saga.films[idx]];
  saveDB();
  if(window._sagasPageDraw) window._sagasPageDraw(); else render('sagas');
}

function buildFilmSagaSection(filmId) {
  const sagas=DB.sagas||[];

window.onFilmSagaChange=(val,filmId)=>{

// ============================================================
// MODAL HELPER — close button (✕) behaves exactly like Annuler,
// and restores a pending watchlist conversion if any.
// ============================================================
function createModal(title,bodyHTML,onSave,autoClose=true){
  document.getElementById('modal-container').innerHTML=`
  <div class="modal-overlay" id="modal-overlay" onclick="overlayClick(event)">
    <div class="modal">
      <div class="modal-header"><div class="modal-title">${esc(title)}</div><button class="close-btn" onclick="cancelModal()">✕</button></div>
      <div class="modal-body">${bodyHTML}</div>
      <div class="modal-footer"><button class="btn btn-secondary" onclick="cancelModal()">Annuler</button><button class="btn btn-primary" onclick="handleModalSave()">Enregistrer</button></div>
    </div>
  </div>`;
  window._modalSave=onSave; window._modalAutoClose=autoClose;
}
window.handleModalSave=function(){
  const result=window._modalSave&&window._modalSave();
  if(result===false) return;
  if(window._modalAutoClose!==false) closeModal();
};
function overlayClick(e){if(e.target.id==='modal-overlay') cancelModal();}
function cancelModal(){
  restoreWatchlistIfPending();
  discardEmptyPendingSaga();
  closeModal();
  if(window._wlDraw) {
    const cur = document.querySelector('.nav-item.active')?.dataset.page;
    if(cur==='watchlist') window._wlDraw();
  }
  if(window._sagasPageDraw) {
    const cur = document.querySelector('.nav-item.active')?.dataset.page;
    if(cur==='sagas') window._sagasPageDraw();
  }
}
// If a saga was just created and the "add films" step is cancelled before any
// film was added, delete that saga — it should never exist with 0 films.
// Existing sagas are never touched by this (window._pendingNewSagaId is only
// set right after a brand-new saga creation, and cleared once a film is added).
function discardEmptyPendingSaga(){
  if(window._pendingNewSagaId){
    const sg = (DB.sagas||[]).find(x=>x.id===window._pendingNewSagaId);
    if(sg && (!sg.films || sg.films.length===0)){
      DB.sagas = DB.sagas.filter(x=>x.id!==window._pendingNewSagaId);
      saveDB();
    }
    window._pendingNewSagaId = null;
  }
}
function closeModal(){document.getElementById('modal-container').innerHTML='';}

// TAG INPUT SYSTEM

function renderTags(wrapId,arr,inputId){
  const wrap=document.getElementById(wrapId); if(!wrap) return;
  wrap.querySelectorAll('.tag').forEach(t=>t.remove());
  const input=document.getElementById(inputId); if(!input) return;
  arr.forEach((name,i)=>{
    const tag=document.createElement('span'); tag.className='tag';
    tag.innerHTML=`${esc(name)} <span class="tag-remove" data-idx="${i}">×</span>`;
    tag.querySelector('.tag-remove').addEventListener('click',()=>{ arr.splice(i,1); renderTags(wrapId,arr,inputId); });
    wrap.insertBefore(tag,input);
  });
}

function setupTagInput(inputId,wrapId,arr){
  const input=document.getElementById(inputId); if(!input) return;
  input.addEventListener('keydown',e=>{
    if(e.key==='Enter'||e.key===','){
      e.preventDefault();
      const val=input.value.trim().replace(/,$/,'').trim();
      if(val){arr.push(val);input.value='';renderTags(wrapId,arr,inputId);}
    } else if(e.key==='Backspace'&&!input.value&&arr.length){
      arr.pop(); renderTags(wrapId,arr,inputId);
    }
  });
  input.addEventListener('blur',()=>{
    const val=input.value.trim();
    if(val){arr.push(val);input.value='';renderTags(wrapId,arr,inputId);}
  });
}

function setupTagInputWithAutocomplete(inputId,wrapId,arr,getSuggestions){
  setupTagInput(inputId,wrapId,arr);
  const input=document.getElementById(inputId); if(!input) return;
  const wrap=document.getElementById(wrapId); if(!wrap) return;

  function showAC(list){
    removeAC();
    if(!list.length) return;
    const ac=document.createElement('div'); ac.className='autocomplete-list'; ac.id=inputId+'-ac';
    list.forEach(s=>{
      const item=document.createElement('div'); item.className='autocomplete-item'; item.textContent=s;
      item.addEventListener('mousedown',e=>{
        e.preventDefault();
        if(!arr.includes(s)){arr.push(s);renderTags(wrapId,arr,inputId);}
        input.value=''; removeAC();
      });
      ac.appendChild(item);
    });
    wrap.appendChild(ac);
  }
  function removeAC(){ const el=document.getElementById(inputId+'-ac'); if(el) el.remove(); }

  input.addEventListener('input',()=>{
    const val=input.value.trim().toLowerCase();
    if(!val){removeAC();return;}
    const sugs=getSuggestions().filter(s=>s.toLowerCase().includes(val)&&!arr.includes(s));
    showAC(sugs.slice(0,6));
  });
  input.addEventListener('blur',()=>setTimeout(removeAC,150));
}

// GOOGLE DRIVE SYNC
// Manual, button-triggered sync. Stores the entire DB as a single JSON
// file named "cinetv_data.json" in the app's private Drive space (scope
// drive.file — this app can only ever see files it created itself, never
// the rest of your Drive).
//
// Behavior: on click, compares the timestamp on Drive vs. the local
// lastModified timestamp. Whichever is newer "wins" and overwrites the
// other side. This is a simple last-write-wins sync, not a merge — fine
// for a single person using one device at a time and syncing in between.
// ============================================================
const DRIVE_CLIENT_ID = '1014223255936-ab930sfjnsuc5j372368kci3ktka8k78.apps.googleusercontent.com';
const DRIVE_SCOPE = 'https://www.googleapis.com/auth/drive.file';
const DRIVE_FILENAME = 'cinetv_data.json';

let _driveTokenClient = null;
let _driveAccessToken = null;
let _driveFileId = null; // cached once found, to avoid re-searching every sync

function driveStatusEl() { return document.getElementById('drive-sync-status'); }
function setDriveStatus(text, cls) {
  const el = driveStatusEl();
  if(!el) return;
  el.textContent = text;
  el.className = 'drive-sync-status' + (cls ? ' '+cls : '');
}

function driveConfigured() { return !!DRIVE_CLIENT_ID; }

function ensureDriveTokenClient() {
  if(_driveTokenClient) return _driveTokenClient;
  if(typeof google === 'undefined' || !google.accounts) return null;
  _driveTokenClient = google.accounts.oauth2.initTokenClient({
    client_id: DRIVE_CLIENT_ID,
    scope: DRIVE_SCOPE,
    callback: () => {} // overridden per-call below
  });
  return _driveTokenClient;
}

// Wraps the token client's popup flow in a Promise for easier async use.
function driveRequestToken() {
  return new Promise((resolve, reject) => {
    const client = ensureDriveTokenClient();
    if(!client) { reject(new Error('Google Identity Services indisponible.')); return; }
    client.callback = (resp) => {
      if(resp.error) { reject(new Error(resp.error)); return; }
      _driveAccessToken = resp.access_token;
      resolve(resp.access_token);
    };
    client.requestAccessToken({ prompt: _driveAccessToken ? '' : 'consent' });
  });
}

async function driveApiFetch(url, options) {
  options = options || {};
  options.headers = Object.assign({}, options.headers, { 'Authorization': 'Bearer ' + _driveAccessToken });
  const res = await fetch(url, options);
  if(res.status === 401) {
    // Token expired — force a fresh one and retry once.
    _driveAccessToken = null;
    await driveRequestToken();
    options.headers['Authorization'] = 'Bearer ' + _driveAccessToken;
    return fetch(url, options);
  }
  return res;
}

// Find (and cache) the id of our data file on Drive, if it already exists.
async function driveFindFile() {
  if(_driveFileId) return _driveFileId;
  const q = encodeURIComponent(`name='${DRIVE_FILENAME}' and trashed=false`);
  const res = await driveApiFetch(`https://www.googleapis.com/drive/v3/files?q=${q}&fields=files(id,modifiedTime)&spaces=drive`);
  const data = await res.json();
  if(data.files && data.files.length) {
    _driveFileId = data.files[0].id;
    return _driveFileId;
  }
  return null;
}

async function driveGetFileMeta() {
  const id = await driveFindFile();
  if(!id) return null;
  const res = await driveApiFetch(`https://www.googleapis.com/drive/v3/files/${id}?fields=id,modifiedTime`);
  return res.json();
}

async function driveDownloadContent() {
  const id = await driveFindFile();
  if(!id) return null;
  const res = await driveApiFetch(`https://www.googleapis.com/drive/v3/files/${id}?alt=media`);
  return res.json();
}

async function driveUploadContent(payload) {
  const id = await driveFindFile();
  const metadata = { name: DRIVE_FILENAME, mimeType: 'application/json' };
  const boundary = 'cinetv_boundary_' + Date.now();
  const body =
    `--${boundary}\r\nContent-Type: application/json; charset=UTF-8\r\n\r\n${JSON.stringify(id?{}:metadata)}\r\n` +
    `--${boundary}\r\nContent-Type: application/json\r\n\r\n${JSON.stringify(payload)}\r\n` +
    `--${boundary}--`;

  const url = id
    ? `https://www.googleapis.com/upload/drive/v3/files/${id}?uploadType=multipart`
    : `https://www.googleapis.com/upload/drive/v3/files?uploadType=multipart`;

  const res = await driveApiFetch(url, {
    method: id ? 'PATCH' : 'POST',
    headers: { 'Content-Type': `multipart/related; boundary=${boundary}` },
    body
  });
  const data = await res.json();
  if(data.id) _driveFileId = data.id;
  return data;
}

// Main entry point — called by the sidebar button.
// Rough "size" of a DB snapshot, used to detect when a sync would replace
// richer data with poorer data — this is what guards against ever silently
// wiping out a real collection with an empty/smaller one.
function dbItemCount(db) {
  if(!db) return 0;
  return (db.films?.length||0) + (db.series?.length||0) + (db.sagas?.length||0) + (db.watchlist?.length||0);
}

async function handleDriveSyncClick() {
  if(!driveConfigured()) {
    setDriveStatus('Synchro non configurée', 'error');
    alert("La synchronisation Google Drive n'est pas encore configurée dans cette installation (Client ID manquant).");
    return;
  }
  const btn = document.getElementById('drive-sync-btn');
  if(btn) btn.disabled = true;
  setDriveStatus('Connexion...', 'busy');
  try {
    if(!_driveAccessToken) await driveRequestToken();
    setDriveStatus('Synchronisation...', 'busy');

    const remoteMeta = await driveGetFileMeta();
    const localTimestamp = DB._lastModified || 0;
    const remoteTimestamp = remoteMeta ? new Date(remoteMeta.modifiedTime).getTime() : 0;
    const localCount = dbItemCount(DB);

    if(!remoteMeta) {
      // Nothing on Drive yet — push local data. Safe by definition: there's
      // nothing to lose on the Drive side.
      await pushLocalToDrive();
      setDriveStatus(`Envoyé sur Drive ✓ (${localCount} éléments)`, 'ok');
      return;
    }

    // Always fetch the remote content itself (not just its date) so we can
    // compare actual item counts, not just timestamps — timestamps alone
    // were the root cause of a real data loss bug here.
    const remoteData = await driveDownloadContent();
    const remoteCount = dbItemCount(remoteData);

    const remoteIsNewer = remoteTimestamp > localTimestamp;
    const remoteIsSignificantlySmaller = localCount > 0 && remoteCount < localCount * 0.8;

    if(remoteIsSignificantlySmaller) {
      // Drive has noticeably less data than what's on this device — never
      // auto-apply this. Always ask explicitly, with exact counts shown,
      // regardless of which timestamp looks newer.
      const proceed = confirm(
        `⚠️ Attention : la version sur Drive contient moins d'éléments (${remoteCount}) que vos données actuelles (${localCount}).\n\n` +
        `Écraser vos données locales avec celles de Drive ferait perdre des films/séries.\n\n` +
        `Cliquez OK pour ENVOYER vos données locales vers Drive à la place (recommandé), ou Annuler pour ne rien faire.`
      );
      if(proceed) {
        await pushLocalToDrive();
        setDriveStatus(`Envoyé sur Drive ✓ (${localCount} éléments)`, 'ok');
      } else {
        setDriveStatus('Synchro annulée — aucune donnée modifiée', '');
      }
      return;
    }

    if(remoteIsNewer && remoteCount >= localCount) {
      // Drive genuinely looks like a newer, equal-or-richer snapshot —
      // likely synced from another device. Confirm with explicit counts.
      if(confirm(`Une version plus récente a été trouvée sur Drive (${remoteCount} éléments, contre ${localCount} ici). Remplacer les données locales par celle-ci ?`)) {
        DB = remoteData;
        saveDB();
        setDriveStatus(`Données reçues de Drive ✓ (${remoteCount} éléments)`, 'ok');
        render(document.querySelector('.nav-item.active')?.dataset.page || 'dashboard');
      } else {
        setDriveStatus('Synchro annulée', '');
      }
    } else {
      // Local is newer or at least as rich — push.
      await pushLocalToDrive();
      setDriveStatus(`Envoyé sur Drive ✓ (${localCount} éléments)`, 'ok');
    }
  } catch(e) {
    console.error(e);
    setDriveStatus('Erreur de synchro', 'error');
  } finally {
    if(btn) btn.disabled = false;
  }
}

async function pushLocalToDrive() {
  saveDB();
  await driveUploadContent(DB);
}

// Reflect connection state in the sidebar on load (best-effort, silent).
(function initDriveStatusDisplay() {
  if(!driveConfigured()) { setDriveStatus('Synchro non configurée'); return; }
  setDriveStatus('Non connecté — appuyez sur Synchroniser');
})();

</script>
